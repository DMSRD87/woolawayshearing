/* ════════════════════════════════════════════════════════════════════
   v4.6.2 — CACHE-FLIP BOOT GUARD
   ════════════════════════════════════════════════════════════════════
   Catches the case where the wrong contractor's cached app loads at
   this URL — e.g. Lachlan tapped his Woolaway bookmark but his browser
   served Darby's cached SW. The PIN screen rejected him; he had to
   close-and-reopen the app to get the right one.

   This boot guard compares window.location.hostname against the
   CONTRACTOR_URL baked into this code. If they don't match, we are
   running the wrong contractor's app — unregister all service workers,
   purge all caches, and force a reload from the network.

   Safety: sessionStorage flag prevents an infinite reload loop. If the
   cleanup-and-reload still doesn't fix it (some edge case), the user
   sees a clear error message instead of a reload loop.

   Data safety: localStorage is NOT touched. Only the asset cache (the
   app HTML/JS shell) is cleared. Queued offline writes and pending tally
   cells in localStorage survive intact.
   ════════════════════════════════════════════════════════════════════ */
(function checkContractorIdentity(){
  try{
    const expected=(CONTRACTOR_URL||'').replace(/^https?:\/\//,'').replace(/\/$/,'').toLowerCase();
    const actual=(window.location.hostname||'').toLowerCase();
    if(!actual||actual==='localhost'||actual==='127.0.0.1')return;
    if(!expected)return;
    if(actual===expected)return;
    /* MISMATCH — the wrong contractor's cached app is loaded for this URL */
    const reloadKey='mg_cache_flip_recovery';
    if(sessionStorage.getItem(reloadKey)){
      /* Already tried cleanup once this session — don't loop. Show error. */
      document.body.innerHTML='<div style="padding:32px;font-family:-apple-system,system-ui,sans-serif;max-width:480px;margin:60px auto;text-align:center"><h2 style="color:#c00;margin-bottom:16px">App load problem</h2><p style="line-height:1.5;color:#444">This page is showing the wrong contractor app from a cached copy on your phone. Try one of these:</p><ol style="text-align:left;line-height:1.6;color:#444"><li>Close this tab completely (swipe it away)</li><li>Reopen from your home-screen bookmark</li></ol><p style="line-height:1.5;color:#444;margin-top:16px">If it still happens, contact Dale.</p></div>';
      return;
    }
    sessionStorage.setItem(reloadKey,'1');
    console.warn('[myGang] Cache mismatch: this code is for',expected,'but URL is',actual,'— cleaning up and reloading');
    document.body.innerHTML='<div style="padding:32px;font-family:-apple-system,system-ui,sans-serif;max-width:480px;margin:60px auto;text-align:center"><h2 style="color:#111;margin-bottom:16px">Loading correct app…</h2><p style="line-height:1.5;color:#444">Refreshing from server. One moment.</p></div>';
    const cleanup=[];
    if('serviceWorker' in navigator){
      cleanup.push(navigator.serviceWorker.getRegistrations().then(regs=>
        Promise.all(regs.map(r=>r.unregister()))
      ).catch(()=>{}));
    }
    if(typeof caches!=='undefined'){
      cleanup.push(caches.keys().then(keys=>
        Promise.all(keys.map(k=>caches.delete(k)))
      ).catch(()=>{}));
    }
    Promise.all(cleanup).finally(()=>{
      window.location.reload();
    });
  }catch(e){
    /* Boot guard must never break the app — fail silent */
    console.warn('[myGang] Cache flip check failed:',e);
  }
})();

const lsGet=k=>{try{return JSON.parse(localStorage.getItem(k)||'null');}catch{return null;}};
const lsSet=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch(e){console.warn('localStorage full',e);}};
const lsRemove=k=>{try{localStorage.removeItem(k);}catch(e){}};

function queueWrite(type,id,data){
  const q=lsGet(LS_QUEUE)||[];
  const filtered=q.filter(x=>!(x.type===type&&x.id===id));
  filtered.push({type,id,data,ts:Date.now()});
  lsSet(LS_QUEUE,filtered);
}
function dequeue(type,id){
  const q=lsGet(LS_QUEUE)||[];
  lsSet(LS_QUEUE,q.filter(x=>!(x.type===type&&x.id===id)));
}
async function flushQueue(){
  const q=lsGet(LS_QUEUE)||[];
  if(!q.length)return 0;
  let flushed=0;
  const failed=[];
  for(const item of q){
    try{
      let call;
      if(item.type==='job'){
        /* v4.6.3 FIX: strip tally fields here too. Previous versions wrote
           item.data raw, which meant any job that ever entered the queue
           (offline saves, goOnline preserveDirty path, dbSaveJob catch
           fallback) bypassed the tally strip and could carry stale tally
           counts back into jobs.data on flush. */
        const strippedData=(typeof buildStrippedJobBlob==='function')
          ?buildStrippedJobBlob(item.data)
          :item.data;
        call=sb.from('jobs').upsert({id:item.id,contractor_slug:CONTRACTOR_SLUG,data:strippedData,updated_at:new Date().toISOString()},{onConflict:'id'});
      }
      else if(item.type==='farm')call=sb.from('farms').upsert({id:item.id,contractor_slug:CONTRACTOR_SLUG,data:item.data},{onConflict:'id'});
      else if(item.type==='crew')call=sb.from('crew_members').upsert({id:item.id,contractor_slug:CONTRACTOR_SLUG,data:item.data},{onConflict:'id'});
      /* Cap each upsert at 5s — prevents one hanging item from stalling
         the whole queue flush. */
      const res=await withTimeout(call,5000,'flush_timeout');
      /* Check for Supabase error in response body — don't count as flushed if error */
      if(res&&res.error){
        failed.push(item);
        logSaveFailure('error',item.type+':'+item.id,res.error.message);
      }
      else{flushed++;}
    }catch(e){
      failed.push(item);
      logSaveFailure(e.message==='flush_timeout'?'timeout':'error',item.type+':'+item.id,e.message);
    }
  }
  lsSet(LS_QUEUE,failed);
  return flushed;
}

/* ════════════════════════════════════════════════════════════════════
   TALLY ENTRIES — per-cell storage layer (v4.6.0)
   ════════════════════════════════════════════════════════════════════
   Each tally cell is its own row in the `tally_entries` table. This is
   the source of truth for tally values. jobs.data still holds the run/mob
   STRUCTURE (mob ids, types, descriptions, rate overrides) but tally
   COUNTS live here.

   Why: the old whole-job-blob save model races when two devices have
   different React states. The loser overwrites the winner. No flag-based
   reconciliation has fixed this in 5 attempts (v4.5.0 → v4.5.5). The
   structural fix is to write cells individually so there's nothing to
   race on at the cell level.

   Conflict resolution: ON CONFLICT in the DB uses updated_at — later
   write wins. In practice only one lead is editing tallies on a job at
   a time (confirmed with Dale 2026-05-18), so conflicts are rare.
   ════════════════════════════════════════════════════════════════════ */

/* tallyKey — produces a stable string key for a cell. Used for queue
   dedup and for the per-cell debounce timer map (currently unused — we
   don't debounce per-cell writes since the per-keystroke volume is fine
   for shearing-tally usage). */
function tallyKey(r){
  return [r.job_id,r.cell_date,r.kind,r.run_id||'',r.mob_id||'',r.crew_id].join('|');
}

function queueTallyCell(row){
  const q=lsGet(LS_TALLY_QUEUE)||[];
  const k=tallyKey(row);
  /* Dedup: a queued cell write for the same cell is replaced by the newer one.
     The user's latest typed value is the only one that matters. */
  const filtered=q.filter(x=>tallyKey(x)!==k);
  filtered.push(row);
  lsSet(LS_TALLY_QUEUE,filtered);
}

/* writeTallyCell — upserts a single cell to Supabase, or queues it if offline.
   This is fired on every tally-cell change. No debounce; the volume is fine. */
async function writeTallyCell({jobId,kind,runId,mobId,crewId,date,value,mobType,mobDesc}){
  const row={
    contractor_slug:CONTRACTOR_SLUG,
    job_id:jobId,
    cell_date:date,
    kind:kind,
    run_id:runId||'',
    mob_id:mobId||'',
    crew_id:crewId,
    value:value,
    updated_at:new Date().toISOString()
  };
  /* v4.6.4 — carry mob metadata on count rows so tally_entries is the source
     of truth for mob type/desc, not just counts. This closes the Shearing-flip
     class (pilot contractor 16 Jun): self-heal previously had to invent type='Shearing'
     because metadata had no authoritative home. Only count rows carry a mob;
     other kinds leave these null. mobType is NOT NULL-constrained out — a
     legitimately-empty desc is '' not null. */
  if(kind==='count'){
    if(mobType!=null)row.mob_type=mobType;
    if(mobDesc!=null)row.mob_desc=mobDesc;
  }
  if(!navigator.onLine){
    queueTallyCell(row);
    return;
  }
  try{
    const result=await withTimeout(
      sb.from('tally_entries').upsert(row,{
        onConflict:'contractor_slug,job_id,cell_date,kind,run_id,mob_id,crew_id'
      }),
      5000,
      'tally_upsert_timeout'
    );
    if(result&&result.error)throw new Error(result.error.message);
  }catch(e){
    queueTallyCell(row);
    logSaveFailure(
      e.message==='tally_upsert_timeout'?'timeout':'error',
      'tally:'+jobId+':'+kind+':'+crewId,
      e.message
    );
  }
}

async function flushTallyQueue(){
  const q=lsGet(LS_TALLY_QUEUE)||[];
  if(!q.length)return 0;
  let flushed=0;
  const failed=[];
  for(const row of q){
    try{
      /* v4.6.3g — strip internal bookkeeping field before sending to DB */
      const {_dead_tries,...dbRow}=row;
      const result=await withTimeout(
        sb.from('tally_entries').upsert(dbRow,{
          onConflict:'contractor_slug,job_id,cell_date,kind,run_id,mob_id,crew_id'
        }),
        5000,
        'tally_flush_timeout'
      );
      if(result&&result.error){
        /* v4.6.3g — distinguish PERMANENT rejections (constraint/validation —
           will never succeed on retry) from TRANSIENT ones (timeout/network).
           A permanent failure is quarantined to LS_TALLY_DEAD instead of being
           re-queued forever, so one bad row can't pin the queue and strand the
           banner (Darby mess-kind constraint case, 15 Jun). Transient failures
           re-queue and the background drain retries them. */
        const msg=result.error.message||'';
        if(/violates check constraint|invalid input|column .* does not exist|violates not-null/i.test(msg)){
          /* v4.6.3g — carry _dead_tries through the requeue→reflush→requarantine
             cycle so the boot-replay cap (3) actually holds for a genuinely-bad
             row instead of resetting each round. */
          const tries=row._dead_tries||0;
          const cleanRow={...row};delete cleanRow._dead_tries;
          const dead=lsGet(LS_TALLY_DEAD)||[];dead.push({row:cleanRow,err:msg,at:new Date().toISOString(),tries});lsSet(LS_TALLY_DEAD,dead);
          logSaveFailure('error','tally_flush_quarantined:'+row.job_id+':'+row.kind,msg);
        }else{
          const cleanRow={...row};delete cleanRow._dead_tries;
          failed.push(cleanRow);
          logSaveFailure('error','tally_flush:'+row.job_id+':'+row.kind,msg);
        }
      }else{
        flushed++;
      }
    }catch(e){
      failed.push(row);
      logSaveFailure(
        e.message==='tally_flush_timeout'?'timeout':'error',
        'tally_flush:'+row.job_id+':'+row.kind,
        e.message
      );
    }
  }
  lsSet(LS_TALLY_QUEUE,failed);
  return flushed;
}

/* v4.6.4 — flushTallyMetaQueue: drains queued mob metadata (type/desc) updates
   to existing count cells. Separate from the cell-value queue because these are
   bulk UPDATEs keyed on mob_id, not per-cell upserts. Idempotent: re-applying
   the same patch is harmless. Failures re-queue (transient) and are retried by
   the same paths that call flushTallyQueue. Capped to avoid unbounded growth. */
async function flushTallyMetaQueue(){
  const q=lsGet(LS_TALLY_META_QUEUE)||[];
  if(!q.length)return 0;
  let flushed=0;
  const failed=[];
  for(const item of q){
    if(!item||!item.mob_id||!item.patch){flushed++;continue;}
    try{
      const r=await withTimeout(
        sb.from('tally_entries').update(item.patch)
          .eq('contractor_slug',CONTRACTOR_SLUG).eq('job_id',item.job_id)
          .eq('mob_id',item.mob_id).eq('kind','count'),
        5000,'meta_flush_timeout');
      if(r&&r.error){
        const msg=r.error.message||'';
        /* permanent (column missing etc.) — drop rather than pin the queue;
           metadata is non-critical vs the cell value and will be re-supplied
           on the next type/desc edit. Log so it's visible SRD-side. */
        if(/column .* does not exist|invalid input/i.test(msg)){
          logSaveFailure('error','meta_flush_dropped:'+item.job_id+':'+item.mob_id,msg);
          flushed++;
        }else{
          failed.push(item);
          logSaveFailure('error','meta_flush:'+item.job_id+':'+item.mob_id,msg);
        }
      }else{flushed++;}
    }catch(e){
      failed.push(item);
      logSaveFailure(e.message==='meta_flush_timeout'?'timeout':'error','meta_flush:'+item.job_id+':'+item.mob_id,e.message);
    }
  }
  lsSet(LS_TALLY_META_QUEUE,failed.slice(-500));
  return flushed;
}

/* loadTalliesForJobs — single query fetching all tally_entries for the
   given job ids. Returns rows; caller applies them via hydrateTallies. */
async function loadTalliesForJobs(jobIds){
  if(!jobIds||!jobIds.length)return [];
  /* v4.6.4 FIX (pilot contractor 17 Jun): Supabase/PostgREST caps a select at 1000 rows
     by default. This query fetches cells across ALL of a contractor's jobs at
     once; once tally_entries passes 1000 rows, the cap silently truncates the
     result. With order('updated_at' ascending) the OLDEST rows are returned and
     the NEWEST (today's counts) fall off the end — so recent tallies hydrate as
     0 even though they're in the table. (The ascending order was added in 4.6.4
     for mob-metadata last-write-wins; it made the truncation hit recent data
     specifically.) Fix: page through with .range() until the server returns a
     SHORT page relative to what we asked for.
     CAP-INDEPENDENT: we must NOT assume the server returns a full PAGE whenever
     more rows exist — the project's max-rows can be lower than PAGE (e.g. 500),
     in which case the first page is already "short" and a naive
     page.length<PAGE test would stop after one page and under-fetch. So we
     advance by the number of rows ACTUALLY returned and only stop when a page
     comes back EMPTY. Ordering by (updated_at,id) keeps paging deterministic and
     preserves the oldest-first apply order hydrate/self-heal rely on. */
  const PAGE=1000;
  const all=[];
  try{
    let from=0;
    for(let guard=0; guard<200; guard++){ /* 200*1000 = 200k cell safety ceiling */
      const result=await withTimeout(
        sb.from('tally_entries')
          .select('job_id,cell_date,kind,run_id,mob_id,crew_id,value,mob_type,mob_desc')
          .eq('contractor_slug',CONTRACTOR_SLUG)
          .in('job_id',jobIds)
          .order('updated_at',{ascending:true})
          /* tiebreak on real identity columns — tally_entries has NO 'id'
             column (composite natural key), so ordering by 'id' 400s the whole
             query and returns zero rows. These columns exist and together make
             the per-cell order deterministic so .range() paging can't skip or
             duplicate rows that share an updated_at. */
          .order('crew_id',{ascending:true})
          .order('run_id',{ascending:true})
          .order('mob_id',{ascending:true})
          .order('cell_date',{ascending:true})
          .order('kind',{ascending:true})
          .range(from,from+PAGE-1),
        8000,
        'tally_load_timeout'
      );
      if(result&&result.error){
        logSaveFailure('error','tally_load',result.error.message);
        return all; /* return what we have, not nothing */
      }
      const page=result.data||[];
      if(page.length===0)break;        /* empty page = definitively done */
      all.push(...page);
      from+=page.length;               /* advance by ACTUAL rows returned, not PAGE */
      /* A short page (page.length<PAGE) may mean the last page OR a server cap
         below PAGE. We don't decide here — we loop again; if it was the last
         page the next request returns empty and we stop. One extra round-trip,
         correct for any server max-rows. */
    }
    return all;
  }catch(e){
    logSaveFailure(
      e.message==='tally_load_timeout'?'timeout':'error',
      'tally_load',
      e.message
    );
    return all; /* partial beats a zeroed UI */
  }
}

/* hydrateTallies — mutates a job object, replacing tally fields with
   the truth from tally_entries rows. The mob/run STRUCTURE in
   jobs.data.runs is preserved; only the counts within each mob are reset
   and repopulated. shedTallies, baleTallies, travelTallies are wholesale
   replaced.

   This is called on EVERY load (mountLoad, goOnline refetch, visibility
   revalidate) so the user always sees the canonical tally data, never
   the potentially-stale copy embedded in jobs.data. */
function hydrateTallies(job,tallyRows){
  /* Reset every count-bearing field. Mob structure stays. */
  if(job.runs){
    Object.values(job.runs).forEach(dayRuns=>{
      (dayRuns||[]).forEach(run=>{
        (run.mobs||[]).forEach(mob=>{mob.counts={};});
      });
    });
  }
  job.shedTallies={};
  job.baleTallies={};
  job.baleWeights={};
  job.travelTallies={};
  job.messTallies={}; /* v4.6.3f: kind='mess' multiplier per (crew,date): 0 / 0.5 / 1 */

  /* Apply each row */
  (tallyRows||[]).forEach(row=>{
    const v=Number(row.value)||0;
    if(row.kind==='count'){
      const dayRuns=(job.runs||{})[row.cell_date];
      if(!dayRuns)return;
      const run=dayRuns.find(r=>r.id===row.run_id);
      if(!run)return;
      const mob=(run.mobs||[]).find(m=>m.id===row.mob_id);
      if(!mob)return;
      mob.counts[row.crew_id]=v;
      /* v4.6.4 — tally_entries is now authoritative for mob type/desc, not just
         counts. A corrupted blob arriving from any device (e.g. pilot contractor 16 Jun
         Shearing-flip) is overwritten here from the row metadata, exactly as the
         counts already are. Only apply when the row actually carries metadata —
         legacy rows written before v4.6.4 have mob_type==null, and for those we
         keep whatever the blob structure says (no worse than pre-v4.6.4). A
         blank desc IS a real value ('') and is allowed to win; a null is not. */
      if(row.mob_type!=null&&row.mob_type!=='')mob.type=row.mob_type;
      if(row.mob_desc!=null)mob.desc=row.mob_desc;
    }else if(row.kind==='shed_runs'){
      if(!job.shedTallies[row.crew_id])job.shedTallies[row.crew_id]={};
      job.shedTallies[row.crew_id][row.cell_date]=v;
    }else if(row.kind==='bales'){
      if(!job.baleTallies[row.crew_id])job.baleTallies[row.crew_id]={};
      job.baleTallies[row.crew_id][row.cell_date]=v;
    }else if(row.kind==='bale_kg'){
      if(!job.baleWeights[row.crew_id])job.baleWeights[row.crew_id]={};
      job.baleWeights[row.crew_id][row.cell_date]=v;
    }else if(row.kind==='travel'){
      if(!job.travelTallies[row.crew_id])job.travelTallies[row.crew_id]={};
      job.travelTallies[row.crew_id][row.cell_date]=v>0;
    }else if(row.kind==='mess'){ /* v4.6.3f */
      if(!job.messTallies[row.crew_id])job.messTallies[row.crew_id]={};
      job.messTallies[row.crew_id][row.cell_date]=v;
    }
  });
  return job;
}

/* ── DB HELPERS ── */
async function dbLoad(){
  try{
    /* Cap each select at 8s — if Supabase hangs we fall through to cache.
       Without this, dbLoad can sit forever on a marginal connection,
       blocking app startup. */
    const [jr,fr,cr]=await withTimeout(Promise.all([
      sb.from('jobs').select('id,data').eq('contractor_slug',CONTRACTOR_SLUG).order('updated_at',{ascending:false}),
      sb.from('farms').select('id,data').eq('contractor_slug',CONTRACTOR_SLUG),
      sb.from('crew_members').select('id,data').eq('contractor_slug',CONTRACTOR_SLUG),
    ]),8000,'load_timeout');
    /* CRITICAL: if any of the three calls returned an error (or the SW
       offline stub returned fake-200-with-error), DO NOT trust the result.
       Treat as offline — fall through to cache. Without this check, a
       marginal connection could overwrite localStorage with empty arrays
       and destroy unsaved local state. */
    if((jr&&jr.error)||(fr&&fr.error)||(cr&&cr.error)){
      logSaveFailure('error','dbLoad',
        'jr.error='+(jr?.error?.message||'')+';fr.error='+(fr?.error?.message||'')+';cr.error='+(cr?.error?.message||'')
      );
      return{
        jobs:lsGet(LS_JOBS)||[],
        farms:lsGet(LS_FARMS)||[],
        crew:lsGet(LS_CREW)||[],
        fromCache:true,
      };
    }
    const result={
      jobs:(jr.data||[]).map(r=>r.data),
      farms:(fr.data||[]).map(r=>r.data),
      crew:(cr.data||[]).map(r=>r.data),
      fromCache:false,
    };
    /* v4.6.0 — hydrate tallies from the dedicated table. This is the
       source of truth for tally values; jobs.data tally fields are
       legacy/redundant and ignored on read. */
    const tallyRows=await loadTalliesForJobs(result.jobs.map(j=>j.id));
    const byJob={};
    tallyRows.forEach(r=>{(byJob[r.job_id]||(byJob[r.job_id]=[])).push(r);});
    result.jobs.forEach(j=>hydrateTallies(j,byJob[j.id]||[]));
    /* v4.6.3f — hydrate sundries from sundries_entries. Null result = load
       failed (offline/timeout): keep whatever the cached job already had
       rather than wiping a previously-loaded list. */
    await Promise.all(result.jobs.map(async j=>{
      const s=await loadSundriesForJob(j.id);
      if(s!==null)j.sundries=s;
      else if(!Array.isArray(j.sundries))j.sundries=[];
    }));
    /* v4.6.3 — self-heal step. If tally_entries has run_ids or (date,run,mob)
       combos that aren't in the job's runs structure, the cells are
       orphaned: present in the DB, invisible in the UI. This happens when
       a stale device wrote a truncated runs structure (the Woolaway 21 May
       incident). Synthesize the missing run/mob entries from tally_entries
       so the orphan data renders.
       v4.6.4 — synthesized mobs now take type/desc from the row metadata
       (mob_type/mob_desc) instead of the old hardcoded type='Shearing'/desc:''.
       That hardcode was the pilot contractor 16 Jun Shearing-flip: a crutching mob
       rebuilt by self-heal silently became a $4.80 shearing mob. Faithful
       reconstruction removes the invention. Fallbacks (j.type, '') only apply
       to legacy rows with null metadata; a mob synthesized purely from legacy
       rows is flagged via _synth so the UI/operator knows the label is a guess. */
    result.jobs.forEach(j=>{
      const rows=byJob[j.id]||[];
      if(!rows.length)return;
      if(!j.runs)j.runs={};
      let healed=0;
      rows.forEach(row=>{
        if(row.kind!=='count')return;
        if(!row.run_id||!row.mob_id||!row.cell_date)return;
        if(!j.runs[row.cell_date])j.runs[row.cell_date]=[];
        let run=j.runs[row.cell_date].find(r=>r.id===row.run_id);
        if(!run){
          run={id:row.run_id,mobs:[]};
          j.runs[row.cell_date].push(run);
          healed++;
        }
        if(!run.mobs)run.mobs=[];
        let mob=run.mobs.find(m=>m.id===row.mob_id);
        if(!mob){
          const hasMeta=(row.mob_type!=null&&row.mob_type!=='');
          mob={
            id:row.mob_id,
            desc:(row.mob_desc!=null?row.mob_desc:''),
            type:(hasMeta?row.mob_type:(j.type||'Shearing')),
            counts:{}
          };
          if(!hasMeta)mob._synth=true; /* label is a fallback guess, not from data */
          run.mobs.push(mob);
          healed++;
        }else{
          /* mob already present (from blob or earlier row) — rows are applied
             oldest-first, so let newer non-null metadata correct it, matching
             hydrate's authoritative behaviour. */
          if(row.mob_type!=null&&row.mob_type!=='')mob.type=row.mob_type;
          if(row.mob_desc!=null)mob.desc=row.mob_desc;
        }
        /* Counts already populated by hydrateTallies — don't overwrite */
        if(mob.counts[row.crew_id]==null){
          mob.counts[row.crew_id]=Number(row.value)||0;
        }
      });
      if(healed>0){
        try{logSaveFailure('diag_load','self_heal','job='+j.id+';synthesized='+healed);}catch(e){}
      }
    });
    /* Only overwrite local cache if no pending offline writes — 
       if queue has items, local data is newer than Supabase.
       v4.6.3e: ALSO check the per-cell tally queue. Previously only LS_QUEUE
       (whole-job) was checked, so a day of offline cells + a silently-failed
       flush meant the server's EMPTY hydration overwrote the local day
       ("worked all day, lost it at night" chain). Because flushTallyQueue
       keeps only failed rows, a non-empty tally queue here = flush did not
       fully succeed = local must win for those jobs. */
    const pendingQ=lsGet(LS_QUEUE)||[];
    const pendingT=lsGet(LS_TALLY_QUEUE)||[];
    if(pendingQ.length===0&&pendingT.length===0){
      lsSet(LS_JOBS,result.jobs);
      lsSet(LS_FARMS,result.farms);
      lsSet(LS_CREW,result.crew);
    } else {
      /* Merge: use local cache for jobs in EITHER queue, Supabase for others */
      const qJobIds=new Set(pendingQ.filter(x=>x.type==='job').map(x=>x.id));
      pendingT.forEach(row=>{if(row&&row.job_id)qJobIds.add(row.job_id);});
      try{logSaveFailure('diag_load','merge_kept_local','jobs='+[...qJobIds].join(',')+';tallyQ='+pendingT.length);}catch(e){}
      const localJobs=lsGet(LS_JOBS)||[];
      const merged=result.jobs.map(j=>qJobIds.has(j.id)?localJobs.find(lj=>lj.id===j.id)||j:j);
      result.jobs=merged;
      lsSet(LS_JOBS,merged);
      lsSet(LS_FARMS,result.farms);
      lsSet(LS_CREW,result.crew);
    }
    return result;
  }catch(e){
    /* Offline or load_timeout — serve from cache */
    if(e.message==='load_timeout')logSaveFailure('timeout','dbLoad',e.message);
    return{
      jobs:lsGet(LS_JOBS)||[],
      farms:lsGet(LS_FARMS)||[],
      crew:lsGet(LS_CREW)||[],
      fromCache:true,
    };
  }
}
/* withTimeout — race a promise against a setTimeout. Used to cap Supabase
   calls that can hang silently on poor signal. If the timeout wins, the
   returned promise rejects with a labelled error so callers can route it
   to queue + log. The original work may still complete in the background;
   that's fine — at worst we have a duplicate write to localStorage which
   the queue dedupes by id. */
function withTimeout(promise,ms,label){
  let timer;
  const timeout=new Promise((_,reject)=>{
    timer=setTimeout(()=>reject(new Error(label||'timeout')),ms);
  });
  return Promise.race([promise,timeout]).finally(()=>clearTimeout(timer));
}

/* logSaveFailure — best-effort forensic insert. Captures save failures so
   we can investigate later. The log call itself has its OWN short timeout
   and any failure is swallowed — logging must NEVER affect the save flow. */
function logSaveFailure(reason,jobId,details){
  try{
    const payload={
      contractor_slug:CONTRACTOR_SLUG,
      job_id:jobId||null,
      reason:reason||'unknown',
      details:(details||'').toString().slice(0,1000), /* cap long stack traces */
      user_agent:(navigator.userAgent||'').slice(0,500),
      online_status:navigator.onLine,
      queue_length:(lsGet(LS_QUEUE)||[]).length
    };
    /* Fire and forget. 3s timeout. Errors silently ignored. */
    withTimeout(
      sb.from('save_failures').insert(payload).then(()=>{}),
      3000,
      'log_timeout'
    ).catch(()=>{});
  }catch(e){ /* never break the save flow */ }
}

/* buildStrippedJobBlob — produces a tally-free copy of a job suitable for
   writing to the `jobs` table. Tally cells live in `tally_entries` now;
   writing them again in the blob just re-creates the multi-device wipe
   vector (a stale device could overwrite the blob with empty tallies
   and "win" — until hydration reads on next load corrected it; better to
   not write the stale data at all).

   IMPORTANT: deep clones the runs structure rather than mutating the input.
   The caller's `job` reference comes straight from React state via
   jobsRef.current; mutating it would corrupt React's own state and is
   exactly the kind of silent corruption bug that's been biting us. */
function buildStrippedJobBlob(job){
  const out={...job};
  if(job.runs){
    out.runs=Object.fromEntries(
      Object.entries(job.runs).map(([date,dayRuns])=>[
        date,
        (dayRuns||[]).map(run=>({
          ...run,
          /* v4.6.4 — strip _synth (transient self-heal "label is a guess" marker)
             so it never lands in the persisted blob; counts emptied as before. */
          mobs:(run.mobs||[]).map(mob=>{const {_synth,...m}=mob;return {...m,counts:{}};})
        }))
      ])
    );
  }
  out.shedTallies={};
  out.baleTallies={};
  out.baleWeights={};
  out.travelTallies={};
  out.messTallies={}; /* v4.6.3f: tally_entries kind='mess' is source of truth */
  out.sundries=[];    /* v4.6.3f: sundries_entries table is source of truth — never duplicate into blob */
  return out;
}

/* ── v4.6.3f SUNDRIES (itemised per-person deductions, own table) ── */
/* v4.6.3g — session flag: once we learn the table is absent (migration not yet
   run on this contractor), stop re-querying it every load. Avoids the per-load
   error spam seen on Darby and a pointless round-trip. Reset on full reload. */
let _sundriesTableMissing=false;
async function loadSundriesForJob(jobId){
  if(_sundriesTableMissing)return [];
  try{
    const r=await withTimeout(sb.from('sundries_entries')
      .select('id,crew_id,occurred_date,description,amount,updated_at')
      .eq('contractor_slug',CONTRACTOR_SLUG)
      .eq('job_id',jobId).order('occurred_date',{ascending:true}),5000,'sundries_load_timeout');
    if(r&&r.error){
      const m=r.error.message||'';
      if(/sundries_entries/i.test(m)&&/schema cache|does not exist|not find/i.test(m)){
        if(!_sundriesTableMissing){_sundriesTableMissing=true;logSaveFailure('error','sundries_table_missing','migration_not_run');}
      }else{logSaveFailure('error','sundries_load',m);}
      return null;
    }
    return (r.data||[]);
  }catch(e){logSaveFailure(e.message==='sundries_load_timeout'?'timeout':'error','sundries_load',e.message);return null;}
}
async function addSundryEntry(jobId,crewId,date,desc,amount){
  const r=await withTimeout(sb.from('sundries_entries').insert({
    contractor_slug:CONTRACTOR_SLUG,job_id:jobId,crew_id:crewId,
    occurred_date:date,description:desc,amount:Number(amount)||0,
  }).select().single(),5000,'sundries_add_timeout');
  if(r&&r.error)throw new Error(r.error.message);
  return r.data;
}
async function updateSundryEntry(id,date,desc,amount){
  const r=await withTimeout(sb.from('sundries_entries').update({
    occurred_date:date,description:desc,amount:Number(amount)||0,
    updated_at:new Date().toISOString(),
  }).eq('id',id),5000,'sundries_upd_timeout');
  if(r&&r.error)throw new Error(r.error.message);
}
async function deleteSundryEntry(id){
  const r=await withTimeout(sb.from('sundries_entries').delete().eq('id',id),5000,'sundries_del_timeout');
  if(r&&r.error)throw new Error(r.error.message);
}

async function dbSaveJob(job){
  /* LS_JOBS — keep FULL job (tallies included). This is the offline
     fallback when tally_entries can't be queried. Stripping here would
     leave offline users with empty cells. */
  const jobs=lsGet(LS_JOBS)||[];
  const updated=jobs.find(j=>j.id===job.id)?jobs.map(j=>j.id===job.id?job:j):[job,...jobs];
  lsSet(LS_JOBS,updated);
  /* Supabase write — STRIPPED. tally_entries is the source of truth for
     tally cells; jobs.data only carries structure. */
  const jobForBlob=buildStrippedJobBlob(job);
  /* Skip Supabase entirely if offline — avoids SW stub returning fake 200 */
  if(!navigator.onLine){
    queueWrite('job',job.id,jobForBlob);
    return;
  }
  /* Online path: cap the upsert at 5 seconds to prevent silent hangs.
     A hanging upsert on poor signal that never resolves is the EXACT
     bug pattern that wiped Cutting Edge job 002125 — without a timeout
     the await never returns, the catch block never fires, and the data
     never makes it to the queue. */
  try{
    /* v4.6.3 — Save-time guard against shrinking runs.
       Before writing jobs.data to Supabase, check tally_entries for the
       distinct run_ids that have cell data for this job. If the
       about-to-save blob is MISSING any of those run_ids, that means our
       React state has a runs structure that's truncated relative to
       reality. Refuse the save, queue for retry, log.

       This is the structural fix for the Woolaway 21 May 2026 incident
       where Dale's laptop wrote a 3-run blob over a 10-run state, leaving
       Wed and Thu cells orphaned in tally_entries with no run structure
       to display them under. */
    try{
      const tallyRunIdsResult=await withTimeout(
        sb.from('tally_entries')
          .select('run_id')
          .eq('contractor_slug',CONTRACTOR_SLUG)
          .eq('job_id',job.id)
          .eq('kind','count')
          .not('run_id','eq',''),
        3000,
        'guard_runids_timeout'
      ).catch(err=>({error:{message:'guard_runids_failed:'+err.message}}));
      if(tallyRunIdsResult&&!tallyRunIdsResult.error&&Array.isArray(tallyRunIdsResult.data)){
        const tallyRunIds=new Set(tallyRunIdsResult.data.map(r=>r.run_id).filter(Boolean));
        if(tallyRunIds.size>0){
          const blobRunIds=new Set();
          Object.values((jobForBlob&&jobForBlob.runs)||{}).forEach(dayRuns=>{
            (dayRuns||[]).forEach(run=>{if(run&&run.id)blobRunIds.add(run.id);});
          });
          const missing=[...tallyRunIds].filter(rid=>!blobRunIds.has(rid));
          if(missing.length>0){
            logSaveFailure(
              'guard_rejected_shrink_save',
              job.id,
              'missing_run_ids='+missing.join(',')+';blob_count='+blobRunIds.size+';tally_count='+tallyRunIds.size
            );
            /* Queue the FULL job (with all original structure preserved from
               React state) so the next save attempt retries. Don't write
               this incomplete state to Supabase. */
            queueWrite('job',job.id,jobForBlob);
            return;
          }
        }
      }
    }catch(guardErr){
      /* Guard query itself failed (network, timeout). Don't block the save
         on a failed guard — fall through to the legacy pre-save guard and
         normal upsert. We'd rather risk a partial save than refuse every
         save on a flaky network. */
      logSaveFailure('guard_query_error',job.id,(guardErr&&guardErr.message)||'unknown');
    }
    /* PATCH v4.5.0 — Pre-save guard (preserved). Now operates on stripped
       blob, but the run-DATE keys are unchanged by stripping (only the
       counts within mobs are emptied), so the guard still functions as
       designed: rejects writes that would shrink the run-date history. */
    const incomingRunDates=Object.keys((jobForBlob&&jobForBlob.runs)||{}).length;
    if(incomingRunDates>0){
      const guardCheck=await withTimeout(
        sb.from('jobs').select('data').eq('id',job.id).eq('contractor_slug',CONTRACTOR_SLUG).maybeSingle(),
        3000,
        'guard_timeout'
      ).catch(err=>({error:{message:'guard_check_failed:'+err.message}}));
      if(guardCheck&&!guardCheck.error&&guardCheck.data&&guardCheck.data.data){
        const supabaseRunDates=Object.keys((guardCheck.data.data.runs)||{}).length;
        if(supabaseRunDates>incomingRunDates){
          logSaveFailure(
            'guard_rejected_save',
            job.id,
            'incoming_dates='+incomingRunDates+';supabase_dates='+supabaseRunDates+';refused'
          );
          queueWrite('job',job.id,jobForBlob);
          return;
        }
      }
    }
    const upsertCall=sb.from('jobs').upsert(
      {id:job.id,contractor_slug:CONTRACTOR_SLUG,data:jobForBlob,updated_at:new Date().toISOString()},
      {onConflict:'id'}
    );
    const result=await withTimeout(upsertCall,5000,'upsert_timeout');
    if(result&&result.error)throw new Error(result.error.message);
    dequeue('job',job.id);
    /* PATCH A — Snapshot system. Snapshots use the FULL job (including
       tallies from React state) as a recovery option. Yesterday and
       earlier snapshots remain frozen and intact. */
    try{
      const snapPayload={
        contractor_slug:CONTRACTOR_SLUG,
        job_id:job.id,
        snapshot_date:localToday(),
        data:job, /* full job — tallies included for recovery */
        updated_at:new Date().toISOString()
      };
      withTimeout(
        sb.from('job_snapshots').upsert(snapPayload,{onConflict:'contractor_slug,job_id,snapshot_date'}).then(r=>{
          if(r&&r.error)logSaveFailure('snapshot_error',job.id,r.error.message);
        }),
        3000,
        'snapshot_timeout'
      ).catch(err=>{
        logSaveFailure(err.message==='snapshot_timeout'?'snapshot_timeout':'snapshot_error',job.id,err.message);
      });
    }catch(snapErr){ /* never break the save flow */ }
  }catch(e){
    /* Queue for retry on next online event or mountLoad */
    queueWrite('job',job.id,jobForBlob);
    /* Log forensically — fire-and-forget, never throws */
    logSaveFailure(
      e.message==='upsert_timeout'?'timeout':'error',
      job.id,
      e.message
    );
  }
}
async function dbDeleteJob(jobId){
  const jobs=lsGet(LS_JOBS)||[];
  lsSet(LS_JOBS,jobs.filter(j=>j.id!==jobId));
  /* Clear any pending queued upsert for this job — without this, a queued
     write from before the delete would resurrect the job on next flushQueue. */
  dequeue('job',jobId);
  try{await sb.from('jobs').delete().eq('id',jobId).eq('contractor_slug',CONTRACTOR_SLUG);}catch(e){}
}
async function dbSaveFarm(farm){
  const farms=lsGet(LS_FARMS)||[];
  const updated=farms.find(f=>f.id===farm.id)?farms.map(f=>f.id===farm.id?farm:f):[farm,...farms];
  lsSet(LS_FARMS,updated);
  if(!navigator.onLine){queueWrite('farm',farm.id,farm);return;}
  try{
    const upsertCall=sb.from('farms').upsert({id:farm.id,contractor_slug:CONTRACTOR_SLUG,data:farm},{onConflict:'id'});
    const result=await withTimeout(upsertCall,5000,'upsert_timeout');
    if(result&&result.error)throw new Error(result.error.message);
    dequeue('farm',farm.id);
  }catch(e){
    queueWrite('farm',farm.id,farm);
    logSaveFailure(e.message==='upsert_timeout'?'timeout':'error','farm:'+farm.id,e.message);
  }
}

     If this ever shows ✗, a pay-calc branch added later has drifted.
     v4.6.3f: when deductions exist, the check extends through to net. */
  const expectedTotal=totalShEarn+totalTeamLoad+totalShedEarn+totalTravel+totalStand;
  const matchOk=Math.abs(expectedTotal-jobTotal)<0.005;
  const parts=['$'+totalShEarn.toFixed(2)];
  if(totalTeamLoad>0)parts.push('$'+totalTeamLoad.toFixed(2));
  parts.push('$'+totalShedEarn.toFixed(2));
  parts.push('$'+totalTravel.toFixed(2));
  if(totalStand>0.005)parts.push('$'+totalStand.toFixed(2));
  if(totalMess>0.005||totalSundries>0.005){
    const net=jobTotal-totalMess-totalSundries;
    L.push((matchOk?'\u2713':'\u2717 MISMATCH')+' Math check: '+parts.join(' + ')+' = $'+expectedTotal.toFixed(2)+' gross - $'+totalMess.toFixed(2)+' mess - $'+totalSundries.toFixed(2)+' sundries = $'+net.toFixed(2)+' net');
  }else{
    L.push((matchOk?'\u2713':'\u2717 MISMATCH')+' Math check: '+parts.join(' + ')+' = $'+expectedTotal.toFixed(2));
  }
  /* v4.6.5 - Super Guarantee summary. Employer obligation on superable gross.
     Informational: does not change JOB TOTAL, deductions, or NET. */
  if(totalSuperable>0.005){
    L.push('');L.push('SUPER GUARANTEE (employer, '+(SUPER_RATE*100).toFixed(0)+'%)');
    L.push('Total superable earnings: $'+totalSuperable.toFixed(2));
    L.push('Total super payable:      $'+(totalSuperable*SUPER_RATE).toFixed(2));
  }
  return L.join('\n');
}

/* ============ v4.6.7 PAY WEEK REPORT (cross-job, per-worker) ============ */
function payWeekJobData(job,period){
  const rates=job.rates||{};
  const shed=(gf(job.farmId)||{}).name||job.jobName||'Job';
  const inP=d=>d>=period.start&&d<=period.end;
  const out={};
  const W=id=>{if(!out[id]){const c=gc(id);out[id]={id,name:c?c.name:'Unknown',role:getJobRole(job,id)||(c?c.role:'')||'',lines:[],piece:0,teamLoad:0,staffEarn:0,travel:0,stand:0,standSuper:0,tax:0,mess:0,sundries:0,hasTeam:false};}return out[id];};
  const shIds=job.crew.filter(id=>{const r=getJobRole(job,id);return r==='Shearer'||r==='Crutcher';});
  const stIds=job.crew.filter(id=>{const r=getJobRole(job,id);return r&&r!=='Shearer'&&r!=='Crutcher';});
  const dEt=id=>((rates.crewDetails||{})[id])||{};
  /* piecework: per date x type x effective rate (overrides + individual loadings baked in) */
  const agg={};const daysSet={};
  Object.entries(job.runs||{}).forEach(([date,rs])=>{if(!inP(date))return;(rs||[]).forEach(run=>{mobsOf(run).forEach(mob=>{
    const hasO=mob.rateOverride!=null;
    const br=hasO?mob.rateOverride:(mob.type==='Shearing'?rates.shearingPerHead:rates.crutchingPerHead)||0;
    shIds.forEach(id=>{const cnt=(mob.counts||{})[id]||0;if(!cnt)return;
      (daysSet[id]=daysSet[id]||{})[date]=1;
      const load=(rates.shearerLoadings||{})[id]||0;
      const lt=(rates.loadingType||{})[id]||'individual';
      const eff=lt==='team'?br:(br+load);
      const k=id+'|'+date+'|'+mob.type+'|'+eff.toFixed(4);
      if(!agg[k])agg[k]={id,date,type:mob.type,rate:eff,cnt:0};
      agg[k].cnt+=cnt;});
  });});});
  Object.values(agg).sort((a,b)=>a.date<b.date?-1:a.date>b.date?1:b.rate-a.rate).forEach(g=>{
    const earn=g.cnt*g.rate;const w=W(g.id);w.piece+=earn;
    w.lines.push({date:g.date,shed,item:g.cnt.toLocaleString()+' '+(g.type==='Shearing'?'shorn':'crutched'),units:g.cnt,rate:g.rate,amount:earn,superable:true});
  });
  /* team loading - mirrors generateSummary: base x total team heads in period, per team-loaded shearer */
  const teamTotal=(()=>{let t=0;Object.entries(job.runs||{}).forEach(([date,rs])=>{if(!inP(date))return;(rs||[]).forEach(run=>mobsOf(run).forEach(mob=>{shIds.forEach(sid=>{t+=(mob.counts||{})[sid]||0;});}));});return t;})();
  shIds.forEach(id=>{const lt=(rates.loadingType||{})[id];const base=(rates.shearerLoadings||{})[id]||0;
    if(lt==='team'&&base>0&&teamTotal>0){const earn=base*teamTotal;const w=W(id);w.teamLoad+=earn;w.hasTeam=true;
      w.lines.push({date:'',shed,item:'Team loading '+teamTotal.toLocaleString()+' head',units:teamTotal,rate:base,amount:earn,superable:true});}});
  /* shed staff per day - role rate + per-person override; presser day rules (threshold / cpk, union of dates) */
  stIds.forEach(id=>{const role=getJobRole(job,id);const d=dEt(id);
    const ov=(rates.crewOverrides||{})[id];
    const defR=role==='Wool Classer'?rates.classerPerRun:role==='Penner'?rates.pennerPerRun:role==='Presser'?rates.presserPerRun:rates.woolHandlerPerRun;
    const rpr=ov||defR||80;
    if(role==='Presser'){
      const mode=d.pressMode||'standard';
      const dates=new Set([].concat(Object.keys((job.shedTallies||{})[id]||{}),Object.keys((job.baleTallies||{})[id]||{}),Object.keys(((job.baleWeights||{})[id])||{})));
      Array.from(dates).filter(inP).sort().forEach(date=>{
        if(mode==='cpk'){
          const kg=(((job.baleWeights||{})[id])||{})[date]||0;
          if(kg>0){const earn=kg*(rates.pressCpk||0);const w=W(id);w.staffEarn+=earn;
            w.lines.push({date,shed,item:kg.toLocaleString()+' kg',units:kg,rate:rates.pressCpk||0,amount:earn,superable:true});}
        }else{
          const bales=((job.baleTallies||{})[id]||{})[date]||0;
          const runs=((job.shedTallies||{})[id]||{})[date]||0;
          const thr=rates.baleThreshold||13;
          if(bales>thr){const pb=rates.presserPerBale||14.20;const earn=bales*pb;const w=W(id);w.staffEarn+=earn;
            w.lines.push({date,shed,item:bales+' bales',units:bales,rate:pb,amount:earn,superable:true});}
          else if(runs>0){const earn=runs*rpr;const w=W(id);w.staffEarn+=earn;
            w.lines.push({date,shed,item:runs+' runs',units:runs,rate:rpr,amount:earn,superable:true});}
        }
      });
    }else{
      Object.entries((job.shedTallies||{})[id]||{}).filter(x=>inP(x[0])).sort((a,b)=>a[0]<b[0]?-1:1).forEach(x=>{
        const date=x[0],runs=x[1];
        if(!runs)return;const earn=runs*rpr;const w=W(id);w.staffEarn+=earn;
        w.lines.push({date,shed,item:runs+' runs',units:runs,rate:rpr,amount:earn,superable:true});
      });
    }
  });
  /* travel (mode-aware) */
  job.crew.forEach(id=>{
    const d=dEt(id);
    const tDays=Object.entries((job.travelTallies||{})[id]||{}).filter(x=>x[1]&&inP(x[0])).length;
    if(tDays>0){
      let earn,item,rate;
      if((d.travelMode||'day')==='km'){
        const km=d.driverKm!=null?d.driverKm:(rates.shedKm||0);
        rate=d.travelKmRate!=null?d.travelKmRate:(rates.travelKmDefault||0);
        earn=tDays*km*rate;item='Travel '+tDays+' day'+(tDays===1?'':'s')+' x '+km+'km';
      }else{
        rate=((rates.travelRate||{})[id]||0);earn=tDays*rate;item='Travel '+tDays+' day'+(tDays===1?'':'s');
      }
      if(earn>0){const w=W(id);w.travel+=earn;w.lines.push({date:'',shed,item,units:tDays,rate,amount:earn,superable:false});}
    }
  });
  /* stand fee (BYO) - superable per rates.standFeeSuper (default ON) */
  if(job.evos==='BYO'&&(rates.standFeePerDay||0)>0){
    const superFlag=rates.standFeeSuper!==false;
    shIds.forEach(id=>{if((((rates.crewDetails||{})[id])||{}).standFee===false)return;const n=Object.keys(daysSet[id]||{}).length;if(!n)return;
      const earn=n*(rates.standFeePerDay||0);const w=W(id);w.stand+=earn;if(superFlag)w.standSuper+=earn;
      w.lines.push({date:'',shed,item:'Stand fee (BYO) '+n+' day'+(n===1?'':'s'),units:n,rate:rates.standFeePerDay||0,amount:earn,superable:superFlag});});
  }
  /* mess + sundries (deduction-only workers still appear) */
  job.crew.forEach(id=>{
    const mult=Object.entries((job.messTallies||{})[id]||{}).filter(x=>x[1]&&inP(x[0])).reduce((a,x)=>a+(Number(x[1])||0),0);
    if(mult>0)W(id).mess+=mult*resolveMessRate(job,id);
    let sd=0;(job.sundries||[]).forEach(s=>{if(s.crew_id===id&&(!s.occurred_date||inP(s.occurred_date)))sd+=Number(s.amount)||0;});
    if(sd>0)W(id).sundries+=sd;
  });
  /* tax per job slice */
  Object.values(out).forEach(w=>{
    const gross=w.piece+w.teamLoad+w.staffEarn+w.travel+w.stand;
    const taxPct=parseFloat(dEt(w.id).taxRate||0)||0;
    if(taxPct>0&&gross>0)w.tax+=gross*(taxPct/100);
  });
  return out;
}
function generatePayWeekReport(jobs,period,contractorName){
  const dn=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const fdate=d=>{if(!d)return'         ';const p=d.split('-').map(Number);const dt=new Date(p[0],p[1]-1,p[2]);return dn[dt.getDay()]+' '+String(p[2]).padStart(2,'0')+'/'+String(p[1]).padStart(2,'0');};
  const per={};const checks=[];const sheds=[];
  (jobs||[]).forEach(job=>{
    const data=payWeekJobData(job,period);
    const ids=Object.keys(data);if(!ids.length)return;
    let jobGross=0,team=false,any=false;
    ids.forEach(id=>{const w=data[id];jobGross+=w.piece+w.teamLoad+w.staffEarn+w.travel+w.stand;if(w.hasTeam)team=true;if(w.lines.length)any=true;
      if(!per[id])per[id]={id,name:w.name,role:w.role,lines:[],piece:0,teamLoad:0,staffEarn:0,travel:0,stand:0,standSuper:0,tax:0,mess:0,sundries:0};
      const p=per[id];p.lines=p.lines.concat(w.lines);
      ['piece','teamLoad','staffEarn','travel','stand','standSuper','tax','mess','sundries'].forEach(k=>{p[k]+=w[k]||0;});
    });
    const shedName=(gf(job.farmId)||{}).name||job.jobName||'Job';
    if(any&&sheds.indexOf(shedName)<0)sheds.push(shedName);
    if(jobGross>0.005){
      if(team)checks.push({shed:shedName,skip:true});
      else{const cps=calcPeriodStats(job,period);checks.push({shed:shedName,ok:Math.abs(jobGross-cps.totalEarn)<0.01,a:jobGross,b:cps.totalEarn});}
    }
  });
  const L=[];const dash='\u2500'.repeat(52);
  L.push((contractorName||CONTRACTOR_NAME).toUpperCase()+' \u2014 PAY WEEK REPORT');
  L.push(fmtPeriodLabel(period.start,period.end));
  L.push('Generated: '+localToday());L.push('');
  const workers=Object.values(per).filter(w=>w.lines.length||w.mess>0||w.sundries>0);
  const isSh=w=>w.role==='Shearer'||w.role==='Crutcher';
  const writeSect=(title,list)=>{
    if(!list.length)return;
    L.push(dash);L.push(title);L.push(dash);
    list.sort((a,b)=>a.name.localeCompare(b.name)).forEach(w=>{
      L.push('');L.push(w.name+' \u2014 '+w.role);
      w.lines.slice().sort((a,b)=>{const ad=a.date||'9999',bd=b.date||'9999';return ad<bd?-1:ad>bd?1:0;}).forEach(ln=>{
        L.push('  '+fdate(ln.date)+'  '+pad(ln.shed,14)+' '+ln.item+' @ $'+ln.rate.toFixed(2)+' = $'+ln.amount.toFixed(2));
      });
      const gross=w.piece+w.teamLoad+w.staffEarn+w.travel+w.stand;
      const superable=w.piece+w.teamLoad+w.staffEarn+w.standSuper;
      L.push('  GROSS: $'+gross.toFixed(2)+'   Superable: $'+superable.toFixed(2)+'   Super ('+(SUPER_RATE*100).toFixed(0)+'%): $'+(superable*SUPER_RATE).toFixed(2));
      const ded=[];
      if(w.tax>0)ded.push('Tax -$'+w.tax.toFixed(2));
      if(w.mess>0)ded.push('Mess -$'+w.mess.toFixed(2));
      if(w.sundries>0)ded.push('Sundries -$'+w.sundries.toFixed(2));
      if(ded.length)L.push('  '+ded.join('   '));
      L.push('  NET: $'+(gross-w.tax-w.mess-w.sundries).toFixed(2));
    });
    L.push('');
  };
  writeSect('SHEARERS & CRUTCHERS',workers.filter(isSh));
  writeSect('SHED STAFF',workers.filter(w=>!isSh(w)));
  let tg=0,ts=0,tt=0,tm=0,tsu=0;
  workers.forEach(w=>{const g=w.piece+w.teamLoad+w.staffEarn+w.travel+w.stand;tg+=g;ts+=w.piece+w.teamLoad+w.staffEarn+w.standSuper;tt+=w.tax;tm+=w.mess;tsu+=w.sundries;});
  L.push(dash);L.push('WEEK TOTALS');L.push(dash);
  L.push('Workers: '+workers.length+'   Sheds: '+(sheds.join(', ')||'none'));
  L.push('Gross: $'+tg.toFixed(2)+'   Superable: $'+ts.toFixed(2)+'   Super ('+(SUPER_RATE*100).toFixed(0)+'%): $'+(ts*SUPER_RATE).toFixed(2));
  L.push('Tax: -$'+tt.toFixed(2)+'   Mess: -$'+tm.toFixed(2)+'   Sundries: -$'+tsu.toFixed(2)+'   NET: $'+(tg-tt-tm-tsu).toFixed(2));
  if(checks.length){
    const done=checks.filter(c=>!c.skip);
    const bad=done.filter(c=>!c.ok);
    const skipped=checks.length-done.length;
    if(bad.length)bad.forEach(c=>L.push('\u2717 MISMATCH '+c.shed+': report $'+c.a.toFixed(2)+' vs period calc $'+c.b.toFixed(2)));
    else if(done.length)L.push('\u2713 Cross-check vs per-job period totals ('+done.length+' shed'+(done.length===1?'':'s')+(skipped?'; '+skipped+' skipped: team loading':'')+')');
  }
  if(!workers.length){L.push('');L.push('No pay activity in this period.');}
  return L.join('\n');
}

  Object.values(per).filter(p=>p.lines.length||p.mess>0||p.sundries>0).sort((a,b)=>a.name.localeCompare(b.name)).forEach(p=>{

    const gross=p.piece+p.teamLoad+p.staffEarn+p.travel+p.stand;

    [['GROSS',gross],['SUPERABLE',superable],['SUPER',superable*SUPER_RATE],['TAX',-p.tax],['MESS',-p.mess],['SUNDRIES',-p.sundries],['NET',gross-p.tax-p.mess-p.sundries]].forEach(kv=>rows.push([p.name,p.role,'','',kv[0],'','',kv[1].toFixed(2),'']));
  });
  return rows.map(r=>r.map(esc).join(',')).join('\n');

/* v4.6.10 - job number suggestion: FARM prefix + per-contractor sequence. Legacy 6-digit numbers
   (no '-NNNN' tail) are ignored, so the first new-format job is PREF-0001. */
function suggestJobNumber(jobs,farmName){
  const prefix=(String(farmName||'').replace(/[^A-Za-z]/g,'').slice(0,4).toUpperCase())||'JOB';
  let maxSeq=0;
  (jobs||[]).forEach(j=>{const m=String(j.jobNumber||'').match(/-(\d+)$/);if(m)maxSeq=Math.max(maxSeq,parseInt(m[1],10)||0);});
  return prefix+'-'+String(maxSeq+1).padStart(4,'0');
}
/* v4.6.10 - does a job's PLANNED span touch the date window? Computes the span directly:
   jobDates() appends today for the Tally tab, which would make every job 'touch' today
   and break the crew rolling window - caught in the v4.6.10 audit harness. */
function jobInWindow(job,from,to){
  try{
    if(!job||!job.startDate||!job.daysAllocated)return false;
    const inc=job.includeWeekends!==false;
    let i=0,added=0;
    while(added<job.daysAllocated&&i<job.daysAllocated*3+7){
      const d=addDays(job.startDate,i);
      const p=d.split('-').map(Number);
      const dow=new Date(p[0],p[1]-1,p[2]).getDay();
      if(inc||(dow!==0&&dow!==6)){added++;if(d>=from&&d<=to)return true;}
      i++;
    }
    return false;
  }catch(err){return false;}
}
/* v4.6.9 - TALLY TRENDS: head counts only, no pay figures. Last N pay weeks per worker. */
function generateTallyTrends(jobs,endPeriod,fq,weeksN){
  const N=weeksN||4;const len=(fq==='fortnightly')?14:7;
  const periods=[];for(let i=0;i<N;i++){periods.push({start:addDays(endPeriod.start,-len*i),end:addDays(endPeriod.end,-len*i)});}
  const shear={},staff={};
  (jobs||[]).forEach(job=>{
    if(!job||!job.crew)return;
    const shIds=job.crew.filter(id=>{const r=getJobRole(job,id);return r==='Shearer'||r==='Crutcher';});
    const stIds=job.crew.filter(id=>{const r=getJobRole(job,id);return r&&r!=='Shearer'&&r!=='Crutcher';});
    periods.forEach((p,pi)=>{
      const inP=d=>d>=p.start&&d<=p.end;
      Object.entries(job.runs||{}).forEach(([date,rs])=>{if(!inP(date))return;(rs||[]).forEach(run=>{mobsOf(run).forEach(mob=>{
        shIds.forEach(id=>{const cnt=(mob.counts||{})[id]||0;if(!cnt)return;
          const c=gc(id);if(!shear[id])shear[id]={name:c?c.name:'Unknown',w:{}};
          const w=shear[id].w[pi]=shear[id].w[pi]||{sh:0,cr:0,days:{}};
          if(mob.type==='Shearing')w.sh+=cnt;else w.cr+=cnt;
          w.days[date]=1;});
      });});});
      stIds.forEach(id=>{
        const runs=Object.entries((job.shedTallies||{})[id]||{}).filter(x=>inP(x[0]));
        const bales=Object.entries((job.baleTallies||{})[id]||{}).filter(x=>inP(x[0]));
        if(!runs.length&&!bales.length)return;
        const c=gc(id);if(!staff[id])staff[id]={name:c?c.name:'Unknown',role:getJobRole(job,id)||(c?c.role:'')||'',w:{}};
        const w=staff[id].w[pi]=staff[id].w[pi]||{runs:0,bales:0,days:{}};
        runs.forEach(x=>{w.runs+=Number(x[1])||0;w.days[x[0]]=1;});
        bales.forEach(x=>{w.bales+=Number(x[1])||0;w.days[x[0]]=1;});
      });
    });
  });
  const L=[];const dash='\u2500'.repeat(52);
  const wkLbl=pi=>{const d=periods[pi].end.split('-');return 'Wk end '+d[2]+'/'+d[1];};
  L.push(CONTRACTOR_NAME.toUpperCase()+' \u2014 TALLY TRENDS');
  L.push('Last '+N+' pay weeks to '+fmtPeriodLabel(endPeriod.start,endPeriod.end));
  L.push('Head counts only \u2014 no pay figures. Shorn and crutched kept separate.');L.push('');
  L.push(dash);L.push('SHEARERS & CRUTCHERS');L.push(dash);
  const shList=Object.values(shear).sort((a,b)=>{const t=x=>Object.values(x.w).reduce((s,w)=>s+w.sh+w.cr,0);return t(b)-t(a);});
  shList.forEach(s=>{
    L.push('');L.push(s.name);
    for(let pi=0;pi<N;pi++){const w=s.w[pi];
      if(!w){L.push('  '+wkLbl(pi)+':  \u2014');continue;}
      const parts=[];if(w.sh>0)parts.push(w.sh.toLocaleString()+' shorn');if(w.cr>0)parts.push(w.cr.toLocaleString()+' crutched');
      const days=Object.keys(w.days).length;const tot=w.sh+w.cr;
      L.push('  '+wkLbl(pi)+':  '+parts.join(' + ')+' \u00b7 '+days+' day'+(days===1?'':'s')+' ('+Math.round(tot/days).toLocaleString()+'/day)');}
  });
  if(!shList.length){L.push('');L.push('No shearer tallies in this window.');}
  L.push('');L.push(dash);L.push('SHED STAFF');L.push(dash);
  const stList=Object.values(staff).sort((a,b)=>a.name.localeCompare(b.name));
  stList.forEach(s=>{
    L.push('');L.push(s.name+' \u2014 '+s.role);
    for(let pi=0;pi<N;pi++){const w=s.w[pi];
      if(!w){L.push('  '+wkLbl(pi)+':  \u2014');continue;}
      const parts=[];if(w.runs>0)parts.push(w.runs+' runs');if(w.bales>0)parts.push(w.bales+' bales');
      const days=Object.keys(w.days).length;
      L.push('  '+wkLbl(pi)+':  '+(parts.join(' + ')||'\u2014')+' \u00b7 '+days+' day'+(days===1?'':'s'));}
  });
  if(!stList.length){L.push('');L.push('No staff tallies in this window.');}
  return L.join('\n');
}

/* SHA-256 hash — PINs never stored in plain text */
async function hashPin(pin){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(pin+CONTRACTOR_SLUG));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

/* PIN cache — loaded from Supabase, persisted to localStorage as offline fallback */
const LS_PINS='mg_pins_'+CONTRACTOR_SLUG;
let _pinCache={lead:null,admin:null};
let _pinLoaded=false;

async function loadPins(){
  if(_pinLoaded)return;
  /* Load from localStorage first so PINs work immediately offline */
  const cached=lsGet(LS_PINS);
  if(cached){_pinCache.lead=cached.lead||null;_pinCache.admin=cached.admin||null;}
  try{
    const {data}=await sb.from('contractor_settings').select('lead_pin_hash,admin_pin_hash').eq('contractor_slug',CONTRACTOR_SLUG).single();
    if(data){
      _pinCache.lead=data.lead_pin_hash;
      _pinCache.admin=data.admin_pin_hash;
      /* Keep localStorage in sync */
      lsSet(LS_PINS,{lead:_pinCache.lead,admin:_pinCache.admin});
    }
  }catch(e){}
  _pinLoaded=true;
}

async function checkPin(type,entered){
  if(entered===MASTER_PIN)return true;
  /* Plain text fallback for first login before any PIN has been set */
  const def=type==='admin'?DEFAULT_ADMIN_PIN:DEFAULT_LEAD_PIN;
  if(!_pinCache[type]){
    /* No hash stored yet — accept plain text default OR master */
    return entered===def;
  }
  const hash=await hashPin(entered);
  return hash===_pinCache[type];
}

async function savePin(type,newVal){
  const hash=await hashPin(newVal);
  _pinCache[type]=hash;
  /* Always persist to localStorage so offline access works */
  lsSet(LS_PINS,{lead:_pinCache.lead,admin:_pinCache.admin});
  const update={contractor_slug:CONTRACTOR_SLUG,updated_at:new Date().toISOString()};
  update[type==='admin'?'admin_pin_hash':'lead_pin_hash']=hash;
  await sb.from('contractor_settings').upsert(update,{onConflict:'contractor_slug'});
}

/* ── ACCESS PASSWORD (v4.6.3d) ──
   Perimeter password preventing cross-contractor URL browsing. Distinct from PINs:
   PINs gate ROLES (admin/lead actions); access password gates whether the app
   loads at all for this contractor. Stored as SHA-256(password+slug) in
   contractor_settings.access_password_hash. Null hash = no gate (graceful default).
   Master PIN bypasses for SRD support. Verified flag in localStorage = the hash
   itself, so password rotation invalidates old devices automatically. */
const LS_ACCESS_VERIFIED='mg_access_verified_'+CONTRACTOR_SLUG;
let _accessHash=null;
let _accessLoaded=false;

/* v4.6.11 - contractor default rates: set in contractor_settings.default_rates (SQL for now;
   the dashboard Settings tab becomes the UI in a later build). Field-level seed layer for
   new jobs: contractor default -> last-used sticky -> hardcoded. Cached to localStorage so
   offline job creation keeps the last-known defaults. Missing column/row degrades silently. */
async function loadDefaultRates(){
  try{
    const result=await sb.from('contractor_settings').select('default_rates').eq('contractor_slug',CONTRACTOR_SLUG).maybeSingle();
    if(result&&!result.error&&result.data&&result.data.default_rates&&typeof result.data.default_rates==='object'){
      lsSet(LS_DEFAULT_RATES,result.data.default_rates);
    }
  }catch(e){}
}

async function loadAccessHash(){
  if(_accessLoaded)return;
  try{
    const result=await sb.from('contractor_settings').select('access_password_hash').eq('contractor_slug',CONTRACTOR_SLUG).maybeSingle();
    if(result&&!result.error&&result.data){
      _accessHash=result.data.access_password_hash||null;
    }
    _accessLoaded=true;
  }catch(e){
    /* Network/schema error — leave unloaded so we don't lock out users on
       offline first-load or pre-migration deployments. */
    try{logSaveFailure('error','access_load_failed','err='+(e&&e.message||'unknown'));}catch(_e){}
  }
}

async function checkAccess(entered){
  if(!entered)return false;
  if(entered===MASTER_PIN)return true; /* SRD support bypass */
  if(!_accessHash)return true; /* No password set = no gate */
  const hash=await hashPin(entered);
  return hash===_accessHash;
}

async function saveAccessPassword(newVal){
  const hash=newVal?await hashPin(newVal):null;
  _accessHash=hash;
  await sb.from('contractor_settings').upsert(
    {contractor_slug:CONTRACTOR_SLUG,access_password_hash:hash,updated_at:new Date().toISOString()},
    {onConflict:'contractor_slug'});
  if(hash)lsSet(LS_ACCESS_VERIFIED,hash);
  else{try{localStorage.removeItem(LS_ACCESS_VERIFIED);}catch(e){}}
}

function isAccessVerified(){
  if(!_accessHash)return true;
  return lsGet(LS_ACCESS_VERIFIED)===_accessHash;
}

function markAccessVerified(){
  if(_accessHash)lsSet(LS_ACCESS_VERIFIED,_accessHash);
}

/* ── PIN PAD (reusable) ── */
function PinPad({onSuccess,onCancel,label,subtitle,allowChange,changeLabel,_overridePin,_validateAsync,_startInChangeMode,_pinType,_onChanged}){
  const [entry,setEntry]=useState('');
  const [err,setErr]=useState('');
  const [changing,setChanging]=useState(!!_startInChangeMode);
  const [newPin,setNewPin]=useState('');
  const [step,setStep]=useState(_startInChangeMode?'new1':'enter'); /* enter | verify_current | new1 | new2 */

  const type=label==='Admin PIN'?'admin':'lead';

  const tryPin=async p=>{
    /* If an override PIN is supplied (e.g. a per-job PIN), verify against
       it directly rather than going to Supabase for the role PIN. */
    if(_validateAsync){ /* v4.6.11 - custom async validator (e.g. farm PIN hash) */
      const okv=await _validateAsync(String(p));
      if(okv){setErr('');onSuccess();}
      else{setErr('Incorrect PIN');setEntry('');setTimeout(()=>setErr(''),1500);}
      return;
    }
    if(_overridePin!=null){
      if(String(p)===String(_overridePin)){setErr('');onSuccess();}
      else{setErr('Incorrect PIN');setEntry('');setTimeout(()=>setErr(''),1500);}
      return;
    }
    const ok=await checkPin(type,p);
    if(ok){setErr('');onSuccess();}
    else{setErr('Incorrect PIN');setEntry('');setTimeout(()=>setErr(''),1500);}
  };

  const press=n=>{
    if(changing){
      if(step==='verify_current'){
        const cur=entry+n;
        setEntry(cur);
        if(cur.length===6){
          checkPin(type,cur).then(ok=>{
            if(ok){setStep('new1');setEntry('');setErr('');}
            else{setErr('Incorrect current PIN');setEntry('');setTimeout(()=>setErr(''),1500);}
          });
        }
      } else if(step==='new1'){
        const np=newPin+n;
        if(np.length>6)return; /* cap at 6 digits */
        setNewPin(np);setEntry(np);
      } else {
        const conf=entry+n;
        if(conf.length>6)return; /* cap at 6 digits */
        setEntry(conf);
      }
      return;
    }
    const next=entry+n;
    if(next.length>6)return; /* cap at 6 digits */
    setEntry(next);
    /* Auto-submit ONLY at 6 digits when no override (back-compat with role PINs).
       For shorter PINs (4-5), user taps Submit. With override (job PINs), auto-submit
       at the override's exact length. */
    if(_overridePin!=null){
      if(next.length===String(_overridePin).length)tryPin(next);
    } else if(next.length===6){
      tryPin(next);
    }
  };

  const del=()=>{
    if(changing){
      if(step==='new2'&&entry.length===0){setStep('new1');setNewPin('');}
      else setEntry(e=>e.slice(0,-1));
    } else setEntry(e=>e.slice(0,-1));
  };

  const startChange=()=>{setChanging(true);setStep('verify_current');setEntry('');setNewPin('');setErr('');};

  /* Submit handler for variable-length PINs. Used when user has typed 4-5
     digits and needs to commit (since auto-submit only fires at 6). */
  const submitEntry=()=>{
    if(changing){
      if(step==='new1'){
        if(newPin.length<4){setErr('PIN must be at least 4 digits');setTimeout(()=>setErr(''),1500);return;}
        setStep('new2');setEntry('');
      } else if(step==='new2'){
        if(entry===newPin){
          const pinType=_pinType||type;
          savePin(pinType,newPin).then(()=>{
            setChanging(false);setStep('enter');setNewPin('');setEntry('');setErr('✓ PIN changed — all devices updated!');
            if(_onChanged)setTimeout(_onChanged,1500);
            /* Reset role on PIN change for security */
            lsSet(LS_ROLE,'read_only');lsSet(LS_ROLE_TS,0);
          });
        } else{setErr('PINs do not match');setEntry('');setNewPin('');setStep('new1');setTimeout(()=>setErr(''),1500);}
      }
      return;
    }
    if(entry.length<4){setErr('PIN must be at least 4 digits');setTimeout(()=>setErr(''),1500);return;}
    tryPin(entry);
  };

  const displayEntry=changing?(step==='new1'?newPin:entry):entry;
  const displayLabel=changing?(
    step==='verify_current'?'Enter Current PIN':
    step==='new1'?'Enter New PIN':'Confirm New PIN'
  ):label;
  const displaySub=changing?(
    step==='verify_current'?'Verify your current PIN before changing':
    step==='new1'?'Choose a 4-6 digit PIN':'Re-enter to confirm'
  ):subtitle;

  /* Show a Submit button when:
     - User is verifying a job-override PIN of any length (waits for full PIN)
     - User is changing a PIN (new1/new2 steps need explicit submit since
       length is variable)
     - Always available as a "tap when ready" once 4+ digits typed */
  const canSubmit=displayEntry.length>=4&&!err.includes('changed');

  return e('div',{className:'pin-screen'},
    e('div',{className:'pin-logo'},'my',e('em',null,'Gang')),
    e('div',{className:'pin-subtitle'},displaySub||'Enter your PIN to continue'),
    e('div',{className:'pin-label'},displayLabel||'Enter PIN'),
    e('div',{className:'pin-dots'},
      [0,1,2,3,4,5].map(i=>e('div',{key:i,className:`pin-dot${displayEntry.length>i?' filled':''}${err&&!err.includes('changed')?err?' error':'':''}`}))
    ),
    e('div',{className:'pin-error'},err),
    e('div',{className:'pin-grid'},
      [1,2,3,4,5,6,7,8,9,'',0,'⌫'].map((k,i)=>
        k===''?e('div',{key:i,className:'pin-key empty'}):
        k==='⌫'?e('button',{key:i,className:'pin-key del',onClick:del},'⌫'):
        e('button',{key:i,className:'pin-key',onClick:()=>press(String(k))},k)
      )
    ),
    /* Submit button — visible when 4+ digits typed. Auto-submit at 6 still works for back-compat. */
    canSubmit&&e('button',{
      className:'pin-change-btn',
      style:{background:'var(--green)',color:'#fff',fontWeight:700,marginTop:8},
      onClick:submitEntry
    },'✓ Submit '+displayEntry.length+'-digit PIN'),
    allowChange&&!changing&&e('button',{className:'pin-change-btn',onClick:startChange},changeLabel||'Change PIN'),
    onCancel&&!changing&&e('button',{className:'pin-change-btn',onClick:onCancel},'Cancel'),
    changing&&e('button',{className:'pin-change-btn',onClick:()=>{setChanging(false);setStep('enter');setEntry('');setNewPin('');}}, 'Cancel')
  );
}

/* ── v4.6.11 END-OF-DAY BOOK PHOTO ──
   One slot per job per day. Lead/admin take; lead/admin/farmer view.
   Camera -> canvas compression -> Supabase Storage ('book-photos') + book_photos row.
   REQUIRES SIGNAL by design: no offline queue - honest hold on device. */
const bookPhotoPath=(job,date)=>CONTRACTOR_SLUG+'/'+job.id+'/'+date+'.jpg';
async function compressPhoto(file,maxDim,quality){
  const url=URL.createObjectURL(file);
  try{
    const img=await new Promise((res,rej)=>{const i=new Image();i.onload=()=>res(i);i.onerror=rej;i.src=url;});
    const scale=Math.min(1,maxDim/Math.max(img.width,img.height));
    const w=Math.round(img.width*scale),h=Math.round(img.height*scale);
    const cv=document.createElement('canvas');cv.width=w;cv.height=h;
    cv.getContext('2d').drawImage(img,0,0,w,h);
    const blob=await new Promise(res=>cv.toBlob(res,'image/jpeg',quality));
    if(!blob)throw new Error('compress_failed');
    return blob;
  }finally{URL.revokeObjectURL(url);}
}
function BookPhotoPanel({job,viewDate,role}){
  const canSee=role==='admin'||role==='shed_lead'||role==='farmer';
  const canTake=role==='admin'||role==='shed_lead';
  const [rec,setRec]=useState(null);
  const [busy,setBusy]=useState(false);
  const [msg,setMsg]=useState('');
  const fileRef=useRef();
  useEffect(()=>{
    if(!canSee)return;
    let alive=true;setRec(null);setMsg('');
    if(!navigator.onLine)return;
    (async()=>{try{
      const {data,error}=await sb.from('book_photos').select('*').eq('contractor_slug',CONTRACTOR_SLUG).eq('job_id',job.id).eq('cell_date',viewDate).maybeSingle();
      if(alive&&!error&&data)setRec(data);
    }catch(err){}})();
    return()=>{alive=false;};
  },[job.id,viewDate,canSee]);
  if(!canSee)return null;
  const NOSIG="No signal \u2014 hold the phone, take it when you've got bars.";
  const doPick=()=>{if(!navigator.onLine){setMsg(NOSIG);return;}fileRef.current&&fileRef.current.click();};
  const onFile=async ev=>{
    const file=ev.target.files&&ev.target.files[0];
    ev.target.value='';
    if(!file)return;
    if(!navigator.onLine){setMsg(NOSIG);return;}
    setBusy(true);setMsg('');
    try{
      const blob=await compressPhoto(file,1600,0.72);
      const path=bookPhotoPath(job,viewDate);
      const up=await sb.storage.from('book-photos').upload(path,blob,{upsert:true,contentType:'image/jpeg',cacheControl:'60'});
      if(up.error)throw up.error;
      const row={contractor_slug:CONTRACTOR_SLUG,job_id:job.id,cell_date:viewDate,taken_at:new Date().toISOString(),path};
      const ins=await sb.from('book_photos').upsert(row,{onConflict:'contractor_slug,job_id,cell_date'});
      if(ins.error)throw ins.error;
      setRec(row);
    }catch(err){
      setMsg('Upload failed \u2014 check signal and take it again. Nothing was saved.');
    }
    setBusy(false);
  };
  const pubUrl=rec?sb.storage.from('book-photos').getPublicUrl(rec.path).data.publicUrl+'?t='+encodeURIComponent(rec.taken_at):null;
  return e('div',{className:'notes-wrap',style:{marginTop:10}},
    e('div',{className:'notes-lbl'},'📓 End of day book \u2014 '+fmtDateLong(viewDate)),
    rec&&pubUrl&&e('a',{href:pubUrl,target:'_blank',rel:'noopener'},
      e('img',{src:pubUrl,alt:'Tally book photo',style:{width:'100%',maxHeight:260,objectFit:'contain',borderRadius:10,border:'1px solid var(--border)',background:'#000'}})),
    rec&&e('div',{style:{color:'var(--muted)',fontSize:12,margin:'6px 0'}},'Taken '+new Date(rec.taken_at).toLocaleString('en-AU',{day:'numeric',month:'short',hour:'numeric',minute:'2-digit'})),
    !rec&&!busy&&e('div',{style:{color:'var(--muted)',fontSize:13,margin:'6px 0'}},canTake?'Snap the tally book at knock-off \u2014 one photo per day.':'No book photo for this day yet.'),
    busy&&e('div',{style:{color:'var(--muted)',fontSize:13,margin:'6px 0'}},'Uploading\u2026'),
    msg&&e('div',{style:{color:'var(--amber)',fontSize:13,margin:'6px 0',fontWeight:700}},msg),
    canTake&&e('button',{className:'btn-g',style:{width:'100%',marginTop:6},disabled:busy,onClick:doPick},rec?'Re-take photo':'📷 Take book photo'),
    canTake&&e('input',{type:'file',accept:'image/*',capture:'environment',style:{display:'none'},ref:fileRef,onChange:onFile})
  );
}

function TallyTab({job,setJob,role,viewDate,setViewDate}){
  const canEdit=role==='shed_lead'||role==='admin';
  const isAdmin=role==='admin';
  const todayStr=localToday();

/* v4.6.3f — SundriesPanel. Itemised per-person deductions (combs, fuel
   advances, gear). Stored in sundries_entries table — source of truth, never
   in the job blob. Lead can add; admin can edit/delete. Online-only: CRUD
   surfaces an error rather than silently failing offline. */
function SundriesPanel({job,setJob,isAdmin}){
  const [modal,setModal]=useState(null); /* {mode:'add'}|{mode:'edit',entry} */
  const [busy,setBusy]=useState(false);
  const sundries=job.sundries||[];
  const byCrew={};
  sundries.forEach(s=>{(byCrew[s.crew_id]||(byCrew[s.crew_id]=[])).push(s);});
  const openAdd=()=>setModal({mode:'add',crewId:job.crew[0]||'',date:localToday(),desc:'',amount:''});
  const openEdit=s=>setModal({mode:'edit',entry:s,crewId:s.crew_id,date:s.occurred_date||localToday(),desc:s.description||'',amount:String(s.amount??'')});
  const upd=(k,v)=>setModal(m=>({...m,[k]:v}));
  const close=()=>{if(!busy)setModal(null);};
  const fail=e=>{alert('Couldn\u2019t save sundry \u2014 '+((e&&e.message)||'no connection')+'. Check signal and try again.');};
  const doAdd=async()=>{
    if(!modal.crewId||!modal.desc.trim()||!(Number(modal.amount)>0))return alert('Need person, description and amount.');
    setBusy(true);
    try{
      const created=await addSundryEntry(job.id,modal.crewId,modal.date,modal.desc.trim(),modal.amount);
      setJob(prev=>({...prev,sundries:[...(prev.sundries||[]),created]}));
      setModal(null);
    }catch(e){fail(e);}finally{setBusy(false);}
  };
  const doSaveEdit=async()=>{
    if(!modal.desc.trim()||!(Number(modal.amount)>0))return alert('Need description and amount.');
    setBusy(true);
    try{
      await updateSundryEntry(modal.entry.id,modal.date,modal.desc.trim(),modal.amount);
      setJob(prev=>({...prev,sundries:(prev.sundries||[]).map(s=>s.id===modal.entry.id?{...s,occurred_date:modal.date,description:modal.desc.trim(),amount:Number(modal.amount)||0}:s)}));
      setModal(null);
    }catch(e){fail(e);}finally{setBusy(false);}
  };
  const doDelete=async()=>{
    if(!confirm('Delete this sundry entry?'))return;
    setBusy(true);
    try{
      await deleteSundryEntry(modal.entry.id);
      setJob(prev=>({...prev,sundries:(prev.sundries||[]).filter(s=>s.id!==modal.entry.id)}));
      setModal(null);
    }catch(e){fail(e);}finally{setBusy(false);}
  };
  const total=sundries.reduce((a,s)=>a+(Number(s.amount)||0),0);
  const fmtD=d=>d?d.slice(8,10)+'/'+d.slice(5,7):'\u2014';
  const inpStyle={width:'100%',padding:'10px 12px',borderRadius:8,border:'1px solid var(--border)',background:'var(--card2)',color:'var(--text)',fontSize:14};
  return e('div',{className:'admin-section',style:{margin:'14px 16px'}},
    e('div',{className:'admin-sec-hdr',style:{display:'flex',alignItems:'center',justifyContent:'space-between'}},
      e('div',null,
        e('div',{className:'admin-sec-title'},'Sundries'),
        e('div',{className:'admin-sec-sub'},'Itemised deductions \u2014 combs, fuel advances, gear. Deducted from pay.'+(total>0?' Total: -$'+total.toFixed(2):''))
      ),
      e('button',{className:'btn-copy',style:{padding:'6px 12px'},onClick:openAdd},'+ Add')
    ),
    sundries.length===0
      ?e('div',{style:{padding:'10px 0',fontSize:13,color:'var(--dim)'}},'No sundries on this job.')
      :job.crew.filter(id=>byCrew[id]&&byCrew[id].length).map(id=>{
        const c=gc(id);if(!c)return null;
        const items=byCrew[id];
        const sub=items.reduce((a,s)=>a+(Number(s.amount)||0),0);
        return e('div',{key:id,style:{padding:'8px 0',borderBottom:'1px solid var(--border)'}},
          e('div',{style:{display:'flex',alignItems:'center',gap:8,marginBottom:4}},
            e(Av,{name:c.name,size:26}),
            e('div',{style:{fontWeight:700,fontSize:14}},c.name),
            e('div',{style:{marginLeft:'auto',fontWeight:700,fontSize:13,color:'var(--red)'}},'-$'+sub.toFixed(2))
          ),
          items.map(s=>e('div',{key:s.id,
            onClick:isAdmin?()=>openEdit(s):undefined,
            style:{display:'flex',gap:10,padding:'4px 0 4px 34px',fontSize:13,cursor:isAdmin?'pointer':'default',alignItems:'center'}},
            e('span',{style:{color:'var(--dim)',fontFamily:'var(--m)',fontSize:12}},fmtD(s.occurred_date)),
            e('span',{style:{flex:1}},s.description),
            e('span',{style:{color:'var(--red)'}},'-$'+(Number(s.amount)||0).toFixed(2)),
            isAdmin&&e('span',{style:{color:'var(--dim)',fontSize:11}},'\u270e')
          ))
        );
      }),
    modal&&e('div',{className:'pin-modal'},
      e('div',{className:'pin-modal-box',style:{maxWidth:340,textAlign:'left'}},
        e('div',{className:'pmb-title'},modal.mode==='add'?'Add Sundry':'Edit Sundry'),
        modal.mode==='add'&&e('div',{style:{margin:'10px 0'}},
          e('div',{style:{fontSize:12,color:'var(--dim)',marginBottom:4}},'Person'),
          e('select',{style:inpStyle,value:modal.crewId,onChange:ev=>upd('crewId',ev.target.value)},
            job.crew.map(id=>{const c=gc(id);return c?e('option',{key:id,value:id},c.name):null;})
          )
        ),
        e('div',{style:{margin:'10px 0'}},
          e('div',{style:{fontSize:12,color:'var(--dim)',marginBottom:4}},'Date'),
          e('input',{type:'date',style:inpStyle,value:modal.date,onChange:ev=>upd('date',ev.target.value)})
        ),
        e('div',{style:{margin:'10px 0'}},
          e('div',{style:{fontSize:12,color:'var(--dim)',marginBottom:4}},'Description'),
          e('input',{type:'text',style:inpStyle,placeholder:'e.g. Combs, Fuel advance',value:modal.desc,onChange:ev=>upd('desc',ev.target.value)})
        ),
        e('div',{style:{margin:'10px 0'}},
          e('div',{style:{fontSize:12,color:'var(--dim)',marginBottom:4}},'Amount ($)'),
          e('input',{type:'number',onWheel:ev=>ev.currentTarget.blur(),style:inpStyle,placeholder:'0.00',step:'5',value:modal.amount,onChange:ev=>upd('amount',ev.target.value)})
        ),
        e('div',{style:{display:'flex',gap:8,marginTop:14}},
          e('button',{className:'btn-copy',style:{background:'var(--card2)',color:'var(--text)',flex:1},disabled:busy,onClick:close},'Cancel'),
          modal.mode==='edit'&&e('button',{className:'btn-copy',style:{background:'var(--red)',flex:1},disabled:busy,onClick:doDelete},'Delete'),
          e('button',{className:'btn-copy',style:{flex:1},disabled:busy,onClick:modal.mode==='add'?doAdd:doSaveEdit},busy?'\u2026':(modal.mode==='add'?'Add':'Save'))
        )
      )
    )
  );
}
function SummaryTab({job,setJob,role}){
  const rates=job.rates||{};
  const payDayOfWeek=rates.payDayOfWeek!=null?rates.payDayOfWeek:5;
  const payFrequency=rates.payFrequency||'weekly';
  const todayStr=localToday();
  const periodLen=payFrequency==='fortnightly'?14:7;
  const canSeePay=role==='admin';
  const canShare=role==='admin'||role==='shed_lead';

  /* Find the offset of the most recent period that actually has data */
  function findBestOffset(){
    if(payFrequency==='shed')return 0;
    const dateDates=Object.keys(job.runs||{}).filter(d=>(job.runs[d]||[]).length>0).sort();
    if(!dateDates.length)return 0;
    const latestDate=dateDates[dateDates.length-1];
    const latestPeriod=getPeriodForDate(latestDate,payDayOfWeek);
    const basePeriod=getPeriodForDate(todayStr,payDayOfWeek);
    const diffDays=(new Date(latestPeriod.start+'T00:00:00')-new Date(basePeriod.start+'T00:00:00'))/(1000*60*60*24);
    return Math.round(diffDays/periodLen);
  }

  const [offset,setOffset]=useState(()=>findBestOffset());
  const [view,setView]=useState(canSeePay?'crew':'record');
  const [copied,setCopied]=useState(false);
  const [copiedRec,setCopiedRec]=useState(false);
  const [shared,setShared]=useState(false);

  const period=payFrequency==='shed'?null:getPeriodByOffset(todayStr,payDayOfWeek,offset,payFrequency);

      '<style>body{font-family:"Courier New","Lucida Console",monospace;font-size:13px;padding:30px;max-width:640px;margin:0 auto;line-height:1.55;color:#1a1e2e;background:#fff}'+
      'pre{white-space:pre-wrap;word-wrap:break-word;margin:0;font-family:inherit}'+

      e('button',{className:`sum-tab${view==='record'?' on':''}`,onClick:()=>setView('record')},'📄 Farm Record')
