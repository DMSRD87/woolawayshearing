function WhiteboardTab({job,role}){
  const [entries,setEntries]=useState([]);
  const [loading,setLoading]=useState(true);
  const [text,setText]=useState('');
  const [authorRole,setAuthorRole]=useState(role==='farmer'?'Farmer':'Shearer'); /* v4.6.11 */
  const [saving,setSaving]=useState(false);
  const ROLES=['Farmer','Lead','Shearer','Staff'];

  const load=async()=>{
    try{
      const {data}=await sb.from('job_whiteboard')
        .select('*')
        .eq('job_id',job.id)
        .eq('contractor_slug',CONTRACTOR_SLUG)
        .order('created_at',{ascending:false});
      if(data)setEntries(data);
    }catch(e){}
    setLoading(false);
  };

  useEffect(()=>{load();},[job.id]);

  const doAdd=async()=>{
    if(!text.trim())return;
    setSaving(true);
    const entry={
      id:'wb'+Date.now(),
      contractor_slug:CONTRACTOR_SLUG,
      job_id:job.id,
      author_role:authorRole,
      note:text.trim(),
      created_at:new Date().toISOString()
    };
    try{
      await sb.from('job_whiteboard').insert(entry);
      setEntries(p=>[entry,...p]);
      setText('');
    }catch(e){}
    setSaving(false);
  };

  const doDelete=async(id)=>{
    try{
      await sb.from('job_whiteboard').delete().eq('id',id).eq('contractor_slug',CONTRACTOR_SLUG);
      setEntries(p=>p.filter(e=>e.id!==id));
    }catch(e){}
  };

  const fmtTs=ts=>{
    const d=new Date(ts);
    return d.toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short'})+' · '+d.toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit',hour12:true});
  };

  const ROLE_COLORS={Farmer:'#0ea5e9',Lead:'var(--amber)',Shearer:'var(--green)',Staff:'#8b5cf6'};

  return e('div',{style:{padding:'0 0 100px 0'}},
    /* Add note box — visible to all roles */
    e('div',{style:{margin:'12px 16px',background:'var(--card)',borderRadius:12,padding:16,border:'1px solid var(--border)'}},
      e('div',{style:{fontFamily:'var(--h)',fontSize:16,fontWeight:800,marginBottom:10}},'📋 Add to Whiteboard'),
      e('div',{style:{display:'flex',gap:6,flexWrap:'wrap',marginBottom:10}},
        ROLES.map(r=>e('button',{key:r,type:'button',
          onClick:()=>setAuthorRole(r),
          style:{padding:'4px 12px',borderRadius:20,fontSize:12,fontWeight:700,cursor:'pointer',border:'none',
            background:authorRole===r?ROLE_COLORS[r]:'var(--card2)',
            color:authorRole===r?'#fff':'var(--muted)'}
        },r))
      ),
      e('textarea',{
        rows:3,
        placeholder:'Add a note visible to everyone on this job...',
        value:text,
        onChange:ev=>setText(ev.target.value),
        style:{width:'100%',padding:'10px 12px',border:'1.5px solid var(--border)',borderRadius:8,
          fontSize:14,lineHeight:1.6,background:'var(--bg)',color:'var(--text)',resize:'none',outline:'none',
          boxSizing:'border-box'}
      }),
      e('button',{
        type:'button',
        onClick:doAdd,
        disabled:saving||!text.trim(),
        style:{marginTop:8,width:'100%',padding:'11px',background:text.trim()?ROLE_COLORS[authorRole]:'var(--card2)',
          border:'none',borderRadius:8,color:text.trim()?'#fff':'var(--muted)',fontWeight:700,fontSize:14,cursor:'pointer',
          transition:'.15s',opacity:saving?0.6:1}
      },saving?'Saving...':'Post Note')
    ),

    /* Entries */
    loading&&e('div',{style:{textAlign:'center',padding:'40px',color:'var(--muted)'}},'Loading...'),
    !loading&&entries.length===0&&e('div',{style:{textAlign:'center',padding:'40px 24px',color:'var(--muted)'}},
      e('div',{style:{fontSize:36,marginBottom:8}},'📋'),
      e('div',{style:{fontWeight:700,marginBottom:4}},'Whiteboard is empty'),
      e('div',{style:{fontSize:13}},'Add notes, observations or instructions above — visible to everyone on this job')
    ),
    !loading&&entries.map(entry=>e('div',{key:entry.id,
      style:{margin:'0 16px 10px',background:'var(--card)',borderRadius:12,padding:14,
        border:'1px solid var(--border)',borderLeft:'3px solid '+(ROLE_COLORS[entry.author_role]||'var(--border)')}},
      e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}},
        e('div',{style:{display:'flex',alignItems:'center',gap:8}},
          e('span',{style:{fontSize:11,fontWeight:700,padding:'2px 8px',borderRadius:10,
            background:ROLE_COLORS[entry.author_role]||'var(--muted)',color:'#fff'}},
            entry.author_role),
          e('span',{style:{fontSize:11,color:'var(--muted)'}},fmtTs(entry.created_at))
        ),
        (role==='admin'||role==='shed_lead')&&e('button',{
          type:'button',
          onClick:()=>doDelete(entry.id),

        },'×')
      ),
      e('div',{style:{fontSize:14,lineHeight:1.7,whiteSpace:'pre-wrap',color:'var(--text)'}},entry.note)

function fmtViewed(ts){
  const diff=Math.floor((Date.now()-new Date(ts))/1000);
  if(diff<60)return 'just now';
  if(diff<3600)return Math.floor(diff/60)+'m ago';
  if(diff<86400)return Math.floor(diff/3600)+'h ago';
  return Math.floor(diff/86400)+'d ago';
}

    const _farmNm=(((farmList||[]).find(f=>f.id===farmId))||{}).name||'';
    const jnFinal=((((rJobNum.current&&rJobNum.current.value)||'').trim().toUpperCase())||suggestJobNumber(jobs,_farmNm));

          e('div',{className:'farm-list',style:{borderRadius:'0 0 8px 8px'}},
            ...(farmQuery?farmList.filter(f=>f.name.toLowerCase().includes(farmQuery)||f.address.toLowerCase().includes(farmQuery)):farmList).length>0
              ?(farmQuery?farmList.filter(f=>f.name.toLowerCase().includes(farmQuery)||f.address.toLowerCase().includes(farmQuery)):farmList).map(f=>e('div',{key:f.id,className:`farm-opt${farmId===f.id?' sel':''}`,onClick:()=>setFarmId(f.id)},e('div',{className:'fo-name'},f.name),e('div',{className:'fo-addr'},f.address)))
              :[e('div',{key:'nf',style:{padding:'12px',color:'var(--dim)',fontSize:'13px',textAlign:'center'}},'No farms match — add one below')]),
          !showAddFarm&&e('button',{className:'add-inline-btn',onClick:()=>setShowAddFarm(true)},'+ Add New Farm'),

        )

          e('button',{key:t,className:`tog-opt${type===t?' on':''}`,onClick:()=>setType(t)},t)

/* ── HOME ── */
function HomeScreen({jobs,role,setRole,onJob,onNew,onDatabase,onSchedule,contractorName}){
  const [search,setSearch]=useState('');
  const [sort,setSort]=useState('date'); /* date | name | size | progress */
  const [showArchive,setShowArchive]=useState(false);
  const [archiveMonth,setArchiveMonth]=useState(null); /* null = show all archive months */
  /* v4.6.7 - pay week report sheet */
  const [showPayWeek,setShowPayWeek]=useState(false);
  const [pwOffset,setPwOffset]=useState(0);
  const [pwCopied,setPwCopied]=useState(false);
  const [pwCsv,setPwCsv]=useState(false);
  const [pwView,setPwView]=useState('pay'); /* v4.6.9 - pay | tallies */
  /* v4.6.10 - whiteboard unread counts for job cards (per-device seen) */
  const [wbCounts,setWbCounts]=useState({});
  useEffect(()=>{let alive=true;(async()=>{try{
    const since=new Date(Date.now()-14*24*3600*1000).toISOString();
    const {data}=await sb.from('job_whiteboard').select('job_id,created_at').eq('contractor_slug',CONTRACTOR_SLUG).gt('created_at',since).limit(500);
    if(!alive||!data)return;
    const seen=lsGet(LS_WB_SEEN)||{};const cutoff=new Date(Date.now()-48*3600*1000).toISOString();
    const m={};data.forEach(r=>{const s=seen[r.job_id]||cutoff;if(r.created_at>s)m[r.job_id]=(m[r.job_id]||0)+1;});
    setWbCounts(m);
  }catch(err){}})();return()=>{alive=false;};},[]);
  /* v4.6.10 - crew identity (read_only devices): visibility filter, not authentication */
  const [myId,setMyId]=useState(lsGet(LS_MY_ID)||null);
  const [crewSearch,setCrewSearch]=useState('');

  const jobName=j=>{const f=gf(j.farmId);return j.jobName||(f?f.name:'Unknown');};
  const jobProg=j=>calcProg(j).pct;

  const sortFn=(a,b)=>{
    if(sort==='name')return jobName(a).localeCompare(jobName(b));
    if(sort==='size')return b.totalSheep-a.totalSheep;
    if(sort==='progress')return jobProg(b)-jobProg(a);
    return new Date(b.startDate)-new Date(a.startDate); /* date default */
  };

  const q=search.toLowerCase().trim();
  const matches=j=>!q||jobName(j).toLowerCase().includes(q)||j.type.toLowerCase().includes(q);

  const drafts=jobs.filter(j=>j.status==='Draft'&&matches(j));
  const active=jobs.filter(j=>j.status==='Active'&&matches(j)).sort(sortFn);
  const completed=jobs.filter(j=>j.status==='Completed'&&matches(j)).sort(sortFn);
  const charged=jobs.filter(j=>j.status==='Charged Out'&&matches(j)).sort(sortFn);
  const isEmpty=jobs.length===0;

  /* Archive: group charged-out jobs by month */
  const archiveByMonth=charged.reduce((acc,j)=>{
    const d=new Date(j.startDate);
    const key=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    const label=d.toLocaleDateString('en-AU',{month:'long',year:'numeric'});
    if(!acc[key])acc[key]={label,jobs:[]};
    acc[key].jobs.push(j);
    return acc;
  },{});
  const archiveMonths=Object.entries(archiveByMonth).sort((a,b)=>b[0].localeCompare(a[0]));

  const SortBtn=({v,lbl})=>e('button',{onClick:()=>setSort(v),style:{padding:'5px 10px',borderRadius:6,border:'1px solid var(--border)',background:sort===v?'var(--amber)':'var(--card)',color:sort===v?'#000':'var(--muted)',fontWeight:700,fontSize:11,cursor:'pointer',whiteSpace:'nowrap'}},lbl);
  const Sec=({title,items,badge})=>items.length===0?null:e('div',null,
    e('div',{className:'slbl',style:{display:'flex',alignItems:'center',gap:8}},
      title,
      badge&&e('span',{style:{background:'var(--amber)',color:'#000',borderRadius:10,padding:'1px 7px',fontSize:11,fontWeight:700}},badge)
    ),
    items.map(j=>e(JLC,{key:j.id,job:j,wb:wbCounts[j.id]||0,onClick:()=>onJob(j.id)}))
  );

  return e('div',null,
    e(TopBar,{role,setRole,onSchedule}),
    /* v4.6.11 - FARMER VIEW: farmer devices see only their farm's jobs */
    role==='farmer'&&e('div',{style:{position:'fixed',top:58,left:0,right:0,bottom:0,background:'var(--bg)',zIndex:150,overflowY:'auto',WebkitOverflowScrolling:'touch',padding:'16px'}},
      (function(){
        const fid=lsGet(LS_FARMER_ID)||null;
        const myFarm=(FARMS||[]).find(f=>f.id===fid);
        if(!myFarm)return e('div',{style:{textAlign:'center',padding:'40px 0',color:'var(--muted)'}},'No farm linked to this device. Use the role switch (top right) to sign in again.');
        const fjobs=jobs.filter(j=>j.status!=='Draft'&&j.farmId===fid)
          .sort((a,b)=>String(b.startDate||'').localeCompare(String(a.startDate||'')));
        return e('div',null,
          e('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',margin:'6px 0 2px'}},

            e('button',{onClick:()=>{lsSet(LS_FARMER_ID,'');setRole('read_only');},style:{background:'none',border:'none',color:'var(--muted)',fontSize:12,cursor:'pointer',textDecoration:'underline'}},'Sign out')),
          e('div',{style:{color:'var(--muted)',fontSize:13,marginBottom:12}},myFarm.name+' \u2014 your sheds'),

            :fjobs.map(j=>e(JLC,{key:j.id,job:j,wb:wbCounts[j.id]||0,onClick:()=>onJob(j.id)}))
        );
      })()
    ),
    /* v4.6.10 - CREW VIEW: read_only devices see only their own jobs. Lead/Admin via role switch unlock the full app. */
    role==='read_only'&&e('div',{style:{position:'fixed',top:58,left:0,right:0,bottom:0,background:'var(--bg)',zIndex:150,overflowY:'auto',WebkitOverflowScrolling:'touch',padding:'16px'}},
      !myId?e('div',null,
        e('div',{style:{fontFamily:'var(--h)',fontSize:20,fontWeight:800,margin:'8px 0 4px'}},'Who are you?'),
        e('div',{style:{color:'var(--muted)',fontSize:13,marginBottom:12}},'Pick your name to see your jobs. Leads and admins: use the role switch top-right.'),
        e('input',{type:'text',placeholder:'Search name…',value:crewSearch,onChange:ev=>setCrewSearch(ev.target.value),className:'fi',style:{marginBottom:10}}),
        (CREW||[]).filter(c=>!crewSearch.trim()||(c.name||'').toLowerCase().includes(crewSearch.trim().toLowerCase())).map(c=>
          e('button',{key:c.id,onClick:()=>{lsSet(LS_MY_ID,c.id);setMyId(c.id);},style:{display:'block',width:'100%',textAlign:'left',background:'var(--card)',border:'1px solid var(--border)',borderRadius:10,padding:'12px 14px',color:'inherit',fontWeight:700,marginBottom:8,cursor:'pointer'}},c.name,e('span',{style:{color:'var(--muted)',fontWeight:400,marginLeft:8,fontSize:12}},c.role||''))
        )
      ):(function(){
        const me=(CREW||[]).find(c=>c.id===myId);
        const from=addDays(localToday(),-2),to=addDays(localToday(),7);
        const mine=jobs.filter(j=>j.status!=='Draft'&&(j.crew||[]).includes(myId)&&jobInWindow(j,from,to))
          .sort((a,b)=>String(a.startDate||'').localeCompare(String(b.startDate||'')));
        return e('div',null,
          e('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',margin:'6px 0 2px'}},
            e('div',{style:{fontFamily:'var(--h)',fontSize:20,fontWeight:800}},"G'day "+((me&&me.name.split(' ')[0])||'')),
            e('button',{onClick:()=>{lsSet(LS_MY_ID,'');setMyId(null);},style:{background:'none',border:'none',color:'var(--muted)',fontSize:12,cursor:'pointer',textDecoration:'underline'}},'Not you?')),
          e('div',{style:{color:'var(--muted)',fontSize:13,marginBottom:12}},'Your jobs — recent and the week ahead'),
          mine.length===0?e('div',{style:{textAlign:'center',color:'var(--muted)',padding:'40px 0'}},'No jobs on your board for this window.'):
          mine.map(j=>e(JLC,{key:j.id,job:j,wb:wbCounts[j.id]||0,onClick:()=>onJob(j.id),wb:wbCounts[j.id]||0}))
        );
      })()
    ),
    e('div',{className:'screen'},
      e(WeekBanner,{jobs,contractorName}),

      /* Search + Sort bar */
      !isEmpty&&e('div',{style:{padding:'0 16px 8px'}},
        e('input',{type:'text',placeholder:'🔍 Search jobs...',value:search,onChange:ev=>setSearch(ev.target.value),
          style:{width:'100%',padding:'9px 12px',border:'1.5px solid var(--border)',borderRadius:8,fontSize:15,marginBottom:8,background:'var(--card)',color:'var(--text)',outline:'none'}}),
        e('div',{style:{display:'flex',gap:6,flexWrap:'wrap'}},
          e('span',{style:{fontSize:11,color:'var(--muted)',fontWeight:600,alignSelf:'center'}},'Sort:'),
          e(SortBtn,{v:'date',lbl:'📅 Date'}),
          e(SortBtn,{v:'name',lbl:'🔤 Name'}),
          e(SortBtn,{v:'size',lbl:'🐑 Size'}),
          e(SortBtn,{v:'progress',lbl:'📊 Progress'})
        )
      ),

      /* Drafts pill — only shown if drafts exist; directs to Schedule. Hidden for read-only role. */
      drafts.length>0&&onSchedule&&role!=='read_only'&&e('div',{className:'drafts-pill',onClick:onSchedule},
        e('div',{className:'drafts-pill-ic'},'◌'),
        e('div',{className:'drafts-pill-body'},
          e('div',{className:'drafts-pill-t'},drafts.length+' draft'+(drafts.length>1?'s':'')+' planned'),
          e('div',{className:'drafts-pill-s'},'Tap to open Schedule and publish')

        e('div',{className:'drafts-pill-arr'},'›')
      ),

      isEmpty&&e('div',{style:{margin:'32px 16px 0',padding:'32px 24px',background:'var(--card)',border:'2px dashed var(--border)',borderRadius:'var(--r)',textAlign:'center'}},
        e('div',{style:{fontSize:48,marginBottom:12}},'🐑'),
        e('div',{style:{fontFamily:'var(--h)',fontSize:24,fontWeight:800,color:'var(--text)',marginBottom:8}},'Welcome to myGang'),
        e('div',{style:{fontSize:14,color:'var(--muted)',lineHeight:1.7,marginBottom:20}},'Your digital tally book for shearing contractors.\nTap the + button below to create your first job.'),
        e('div',{style:{display:'flex',flexDirection:'column',gap:10,textAlign:'left',background:'var(--card2)',borderRadius:10,padding:'14px 16px'}},
          ...[['📋','Record runs and mob tallies per shearer'],['💰','Auto-calculate crew pays by pay period'],['🧾','Generate farmer invoices instantly'],['📱','Send job cards to crew via SMS'],['🚗','Track vehicles, travel and accommodation']].map(([ic,txt])=>
            e('div',{key:txt,style:{display:'flex',alignItems:'center',gap:10,fontSize:13,color:'var(--muted)'}},e('span',{style:{fontSize:18}},ic),txt)
          )
        )

        e('div',{style:{padding:'8px 16px'}},
          e('button',{onClick:()=>setShowArchive(p=>!p),style:{display:'flex',alignItems:'center',gap:8,background:'none',border:'none',cursor:'pointer',padding:0}},
            e('div',{className:'slbl',style:{margin:0}},'📦 Archive'),
            e('span',{style:{background:'var(--muted)',color:'#fff',borderRadius:10,padding:'1px 7px',fontSize:11,fontWeight:700}},charged.length),
            e('span',{style:{fontSize:12,color:'var(--muted)',marginLeft:4}},'Charged Out jobs — tap to '+(showArchive?'hide':'show'))
          )
        ),
        showArchive&&e('div',null,
          /* Month picker if no month selected */
          !archiveMonth&&archiveMonths.map(([key,{label,jobs:mj}])=>
            e('div',{key,style:{margin:'0 16px 8px',padding:'12px 14px',background:'var(--card)',border:'1px solid var(--border)',borderRadius:10,display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer'},onClick:()=>setArchiveMonth(key)},
              e('div',null,
                e('div',{style:{fontWeight:700,fontSize:15}},label),

              e('span',{style:{color:'var(--muted)',fontSize:18}},'›')
            )

          /* Jobs in selected month */

            e('div',{style:{padding:'8px 16px'},
              },e('button',{onClick:()=>setArchiveMonth(null),style:{background:'none',border:'none',color:'var(--amber)',fontWeight:700,fontSize:13,cursor:'pointer'}},'← All months')),

      (role==='admin'||role==='shed_lead')&&e('button',{className:'fab',onClick:onNew},'+')
    ),
    /* v4.6.7 - Pay Week Report sheet (admin) */
    showPayWeek&&(function(){
      var last=lsGet(LS_LAST_RATES)||{};

      var srcJob=(jobs||[]).filter(function(j){return j&&j.rates&&j.rates.payDayOfWeek!=null&&j.status!=='Draft';})
        .sort(function(a,b){return String(b.startDate||'').localeCompare(String(a.startDate||''));})[0];
      var srcRates=srcJob?srcJob.rates:{};
      var pd=srcRates.payDayOfWeek!=null?srcRates.payDayOfWeek:(last.payDayOfWeek!=null?last.payDayOfWeek:5);
      var fq=(srcRates.payFrequency&&srcRates.payFrequency!=='shed')?srcRates.payFrequency
        :((last.payFrequency&&last.payFrequency!=='shed')?last.payFrequency:'weekly');
      var period=getPeriodByOffset(localToday(),pd,pwOffset,fq);
      var txt=(pwView==='tallies')?generateTallyTrends(jobs,period,fq,4):generatePayWeekReport(jobs,period,contractorName);

          e('button',{onClick:function(){setPwView('tallies');},style:Object.assign({},navBtn,{background:pwView==='tallies'?'var(--amber)':'var(--card)',color:pwView==='tallies'?'#000':'var(--muted)'})},'Tally Trends')),
        e('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',gap:12,padding:'12px'}},

          e('button',{onClick:doPrint,style:ftBtn},'Print')));
    })(),
    e('div',{style:{position:'fixed',bottom:8,left:0,right:0,textAlign:'center',fontSize:11,color:'var(--muted)',fontFamily:'var(--m)',letterSpacing:'.5px',pointerEvents:'none',fontWeight:600,opacity:.7}},'myGang '+APP_VERSION)
  );

    if(idx>=0)FARMS.splice(idx,1,f);else FARMS.push(f);
    setFarmList(p=>{const n=p.find(x=>x.id===f.id)?p.map(x=>x.id===f.id?f:x):[...p,f];syncLookups(n,CREW);return n;});
    dbSaveFarm(f).catch(()=>{}); /* v4.6.11a - same fix as OverviewTab handleSaveFarm */
    setEditFarm(null);setShowAddFarm(false);
  };
  const handleSaveCrew=c=>{
    const idx=CREW.findIndex(x=>x.id===c.id);
    if(idx>=0)CREW.splice(idx,1,c);else CREW.push(c);
    setCrewList(p=>{const n=p.find(x=>x.id===c.id)?p.map(x=>x.id===c.id?c:x):[...p,c];syncLookups(FARMS,n);return n;});

/* ════════════════════════
   SCHEDULE SCREEN
   Full-screen calendar with month + week views.
   Week starts Monday always.
═══════════════════════ */
function ScheduleScreen({jobs,role,setRole,onBack,onJob,onNew,onNewDraft}){
  const today=localToday();
  /* v4.6.10 - crew view: read_only devices with an identity see only their own jobs */
  const myIdSched=(role==='read_only')?(lsGet(LS_MY_ID)||null):null;
  const visJobs=myIdSched?jobs.filter(j=>j.status!=='Draft'&&(j.crew||[]).includes(myIdSched)):jobs;
  /* v4.6.10 - filter bar */
  const [fStatus,setFStatus]=useState('All');
  const [fType,setFType]=useState('All');
  const [fFarm,setFFarm]=useState('');
  const filtJobs=visJobs.filter(j=>{
    if(fStatus!=='All'&&j.status!==fStatus)return false;
    if(fType!=='All'&&j.type!==fType)return false;
    if(fFarm.trim()){const q=fFarm.trim().toLowerCase();const f=gf(j.farmId);const nm=((j.jobName||'')+' '+(f?f.name:'')).toLowerCase();if(!nm.includes(q))return false;}
    return true;
  });
  const [view,setView]=useState('week'); /* 'week' | 'month' */
  const [anchor,setAnchor]=useState(today); /* anchor date → determines visible window */

  /* Build a map: date → list of jobs overlapping that date (with isStart flag) */
  const jobsByDate=(()=>{
    const map={};
    filtJobs.forEach(job=>{
      if(!job.startDate||!job.daysAllocated)return;
      const days=jobDates(job);
      days.forEach((d,idx)=>{
        if(!map[d])map[d]=[];
        map[d].push({job,isStart:idx===0,dayIdx:idx});
      });
    });
    return map;
  })();

  const mondayStr=mondayOfWeek(anchor);
  const weekDays=weekDatesFromMonday(mondayStr);

  const [ay,am]=anchor.split('-').map(Number);
  const monthCells=monthCellsFor(ay,am);

  /* Range-wide jobs for stats strip */
  const rangeStart=view==='week'?mondayStr:monthCells[0].date;
  const rangeEnd=view==='week'?weekDays[6]:monthCells[monthCells.length-1].date;
  const jobsInRange=filtJobs.filter(j=>{
    if(!j.startDate||!j.daysAllocated)return false;
    /* Use actual jobDates so includeWeekends=false jobs get the real end */
    const jds=jobDates(j);
    const end=jds.length?jds[jds.length-1]:j.startDate;
    /* overlap test */
    return !(end<rangeStart||j.startDate>rangeEnd);
  });
  const totalSheep=jobsInRange.reduce((s,j)=>s+(j.totalSheep||0),0);
  const totalCrew=new Set(jobsInRange.flatMap(j=>j.crew||[])).size;
  const draftsInRange=jobsInRange.filter(j=>j.status==='Draft').length;

  const prev=()=>{
    if(view==='week')setAnchor(addDays(mondayStr,-7));
    else{
      const d=new Date(ay,am-1,1);d.setMonth(d.getMonth()-1);
      setAnchor(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`);
    }
  };
  const next=()=>{
    if(view==='week')setAnchor(addDays(mondayStr,7));
    else{
      const d=new Date(ay,am-1,1);d.setMonth(d.getMonth()+1);
      setAnchor(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`);
    }
  };
  const goToday=()=>setAnchor(today);

  /* Tile click — open job detail */
  const onTileClick=(job)=>{
    if(job.jobPin&&role!=='admin'){
      onJob(job.id); /* parent will handle PIN gate */
    } else {
      onJob(job.id);
    }
  };

  /* Month cell click: switch to week view anchored on that date */
  const onMonthCellClick=(date)=>{
    setAnchor(date);
    setView('week');
  };

  /* Tile render helper */
  const Tile=({job,isStart,dayIdx,compact})=>{
    const farm=gf(job.farmId);
    const name=job.jobName||(farm?farm.name:'Unknown');
    const p=calcProg(job);
    const isDraft=job.status==='Draft';
    const isCont=!isStart; /* continuation day */
    const type=job.type==='Crutching'?'cr':'sh';
    return e('div',{className:`wk-tile ${statusClass(job.status)}${isCont?' cont':''}`,onClick:()=>onTileClick(job)},
      e('div',{className:'wk-tile-name'},(isCont?'→ ':'')+name),
      isDraft&&e('div',{className:'wk-tile-draft-tag'},'◌ Draft'),
      !compact&&e('div',{className:'wk-tile-meta'},
        e('span',null,'🐑 '+(job.totalSheep||0).toLocaleString()),
        e('span',null,'👥 '+(job.crew?.length||0))
      ),
      !compact&&e('span',{className:'wk-tile-type '+type},job.type),
      !compact&&!isDraft&&job.status==='Active'&&p.daysWorked>0&&e('div',null,
        e('div',{className:'wk-tile-prog'},
          e('span',null,p.shorn.toLocaleString()+' / '+(job.totalSheep||0).toLocaleString()),
          e('span',null,Math.round(p.pct)+'%')
        ),
        e('div',{className:'wk-tile-pbar'},e('div',{className:'wk-tile-pbarf',style:{width:p.pct+'%'}}))
      )
    );
  };

  const weekRange=fmtWeekRange(mondayStr);
  const monthTitle=fmtMonthYear(ay,am);

  return e('div',null,
    e(TopBar,{role,setRole,onBack,backLabel:'Home'}),
    e('div',{className:'sched-wrap'},

      /* Controls */
      e('div',{className:'sched-controls'},
        e('div',{className:'sched-hdr-row'},
          e('div',null,
            e('div',{className:'sched-range'},view==='week'?weekRange:monthTitle),
            e('div',{className:'sched-range-sub'},view==='week'?'Week view — Mon to Sun':'Month view — tap a day for that week')
          ),
          e('div',{className:'sched-view-toggle'},
            e('button',{className:`svt-btn${view==='week'?' on':''}`,onClick:()=>setView('week')},'Week'),
            e('button',{className:`svt-btn${view==='month'?' on':''}`,onClick:()=>setView('month')},'Month')
          )
        ),
        e('div',{className:'sched-nav-row'},
          e('button',{className:'sched-nav-btn',onClick:prev},'‹ Prev'),
          e('button',{className:'sched-nav-btn today',onClick:goToday},'Today'),
          e('button',{className:'sched-nav-btn',onClick:next},'Next ›')
        ),
        /* v4.6.10 - filter bar + month jump */
        e('div',{style:{display:'flex',gap:8,flexWrap:'wrap',paddingTop:8,alignItems:'center'}},
          e('select',{value:fStatus,onChange:ev=>setFStatus(ev.target.value),className:'pay-day-sel',style:{flex:'0 0 auto'}},['All','Active','Draft','Completed','Charged Out','Dispatched'].map(s=>e('option',{key:s,value:s},s==='All'?'All statuses':s))),
          e('select',{value:fType,onChange:ev=>setFType(ev.target.value),className:'pay-day-sel',style:{flex:'0 0 auto'}},['All','Shearing','Crutching'].map(s=>e('option',{key:s,value:s},s==='All'?'All types':s))),
          e('input',{type:'text',placeholder:'Search farm…',value:fFarm,onChange:ev=>setFFarm(ev.target.value),className:'fi',style:{flex:'1 1 120px',minWidth:110,padding:'8px 10px'}}),
          view==='month'&&e('select',{value:ay+'-'+String(am).padStart(2,'0'),onChange:ev=>setAnchor(ev.target.value+'-01'),className:'pay-day-sel',style:{flex:'0 0 auto'}},(function(){const o=[];const n=new Date();n.setDate(1);n.setMonth(n.getMonth()-6);for(let i=0;i<19;i++){const v=n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0');o.push(e('option',{key:v,value:v},n.toLocaleDateString('en-AU',{month:'short',year:'numeric'})));n.setMonth(n.getMonth()+1);}return o;})())
        )
      ),

      /* Stats strip */
      e('div',{className:'sched-stats'},
        e('div',{className:'ss-cell'},e('div',{className:'ss-num'},jobsInRange.length),e('div',{className:'ss-lbl'},'Jobs')),
        e('div',{className:'ss-cell'},e('div',{className:'ss-num'},totalSheep.toLocaleString()),e('div',{className:'ss-lbl'},'Sheep')),
        e('div',{className:'ss-cell'},e('div',{className:'ss-num',style:draftsInRange>0?{color:'var(--red)'}:{}},draftsInRange),e('div',{className:'ss-lbl'},'Drafts'))
      ),

      /* Legend */
      e('div',{className:'sched-legend'},
        e('div',{className:'sl-item'},e('span',{className:'sl-dot a'}),'Active'),
        e('div',{className:'sl-item'},e('span',{className:'sl-dot d'}),'Draft'),
        e('div',{className:'sl-item'},e('span',{className:'sl-dot c'}),'Completed'),
        e('div',{className:'sl-item'},e('span',{className:'sl-dot ch'}),'Charged'),
        e('div',{className:'sl-item'},e('span',{className:'sl-dot di'}),'Dispatched')
      ),
      /* v4.6.10 - drafts are date-independent */
      role!=='read_only'&&(function(){
        const dr=visJobs.filter(j=>j.status==='Draft');
        if(!dr.length)return null;
        return e('div',{style:{margin:'10px 12px 0',background:'var(--card)',border:'1px dashed var(--border)',borderRadius:10,padding:'10px 12px'}},
          e('div',{style:{fontWeight:800,fontSize:13,marginBottom:4}},'◌ Drafts ('+dr.length+') — tap to open & publish'),
          dr.map(j=>{const f=gf(j.farmId);
            return e('div',{key:j.id,onClick:()=>onJob(j.id),style:{display:'flex',justifyContent:'space-between',padding:'8px 4px',borderTop:'1px solid var(--border)',cursor:'pointer',fontSize:13}},
              e('span',null,(j.jobName||(f?f.name:'Unnamed'))+' · '+(j.type||'')),
              e('span',{style:{color:'var(--muted)'}},fmtDate(j.startDate)));})
        );
      })(),

      /* WEEK VIEW */
      view==='week'&&e('div',{className:'week-board'},
        e('div',{className:'week-scroll'},
          e('div',{className:'week-grid'},
            weekDays.map(d=>{
              const [wy,wm,wd]=d.split('-').map(Number);
              const dt=new Date(wy,wm-1,wd);
              const dayName=dt.toLocaleDateString('en-AU',{weekday:'short'}).toUpperCase();
              const isToday=d===today;
              const dow=dt.getDay();
              const isWeekend=dow===0||dow===6;
              const dayJobs=jobsByDate[d]||[];
              /* Sort: starts first, then continuations */
              const sortedJobs=[...dayJobs].sort((a,b)=>{
                if(a.isStart!==b.isStart)return a.isStart?-1:1;
                return (a.job.startDate||'').localeCompare(b.job.startDate||'');
              });
              return e('div',{key:d,className:`wk-col${isToday?' today':''}${isWeekend&&!isToday?' weekend':''}`},
                e('div',{className:'wk-col-hdr'},
                  e('div',{className:'wk-day'},dayName),
                  e('div',{className:'wk-dnum'},wd)
                ),
                e('div',{className:'wk-body'},
                  sortedJobs.length===0
                    ?e('div',{className:'wk-empty'},'—')
                    :sortedJobs.map(({job,isStart,dayIdx})=>
                        e(Tile,{key:job.id+'_'+d,job,isStart,dayIdx,compact:false})
                      )
                )
              );
            })
          )
        ),
        jobsInRange.length===0&&e('div',{className:'sched-empty'},
          e('div',{className:'sched-empty-ic'},'📅'),
          e('div',{className:'sched-empty-title'},'No jobs this week'),
          e('div',{className:'sched-empty-sub'},'Tap + below to plan a shed, or use Prev / Next to browse other weeks.')
        )
      ),

      /* MONTH VIEW */
      view==='month'&&e('div',{className:'month-board'},
        e('div',{className:'month-grid'},
          ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map(d=>
            e('div',{key:d,className:'month-day-hdr'},d)
          ),
          monthCells.map(({date,inMonth})=>{
            const [,,cd]=date.split('-').map(Number);
            const dayEntries=jobsByDate[date]||[];
            /* Starts first, then continuations — show up to 3, "+N more" for overflow */
            const starts=dayEntries.filter(x=>x.isStart);
            const continuations=dayEntries.filter(x=>!x.isStart);
            const combined=[...starts,...continuations];
            const MAX_VISIBLE=3;
            const visible=combined.slice(0,MAX_VISIBLE);
            const hiddenCount=combined.length-visible.length;
            const isToday=date===today;
            return e('div',{key:date,className:`month-cell${!inMonth?' out-month':''}${isToday?' today':''}`,onClick:()=>onMonthCellClick(date)},
              e('div',{className:'month-cell-num'},
                e('span',null,cd),
                isToday&&e('span',{className:'month-cell-today-dot'})
              ),
              visible.map(({job,isStart})=>{
                const farm=gf(job.farmId);
                const nm=job.jobName||(farm?farm.name:'?');
                return e('div',{key:job.id+(isStart?'_s':'_c'),className:`month-chip ${statusClass(job.status)}`,
                  style:!isStart?{opacity:.55,fontStyle:'italic'}:{},
                  onClick:ev=>{ev.stopPropagation();onTileClick(job);}
                },(isStart?'':'→ ')+nm);
              }),
              hiddenCount>0&&e('div',{className:'month-more'},'+'+hiddenCount+' more')
            );
          })
        )
      )
    ),
    /* New-draft FAB — admin/lead only */
    (role==='admin'||role==='shed_lead')&&onNewDraft&&e('button',{className:'fab',onClick:onNewDraft,title:'Plan a new job'},'+')
  );
}

/* ── ACCESS GATE (v4.6.3d) ── */
function AccessGate({onSuccess}){
  const [entry,setEntry]=useState('');
  const [err,setErr]=useState('');
  const [busy,setBusy]=useState(false);
  const handleSubmit=async()=>{
    if(busy||!entry)return;
    setBusy(true);setErr('');
    try{
      const ok=await checkAccess(entry);
      if(ok){markAccessVerified();onSuccess();}
      else{setErr('Incorrect password');setBusy(false);}
    }catch(e){setErr('Verification error — try again');setBusy(false);}
  };
  return e('div',{style:{position:'fixed',inset:0,background:'var(--bg)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:9999,padding:'20px'}},
    e('div',{style:{maxWidth:'380px',width:'100%',background:'var(--card)',borderRadius:12,padding:'32px 24px',border:'1px solid var(--border)',textAlign:'center'}},
      e('div',{style:{fontSize:36,marginBottom:12}},'🔒'),
      e('div',{style:{fontSize:20,fontWeight:700,marginBottom:6}},CONTRACTOR_NAME),
      e('div',{style:{fontSize:13,color:'var(--muted)',marginBottom:24}},'Enter access password to continue'),
      e('input',{type:'password',value:entry,autoFocus:true,
        onChange:ev=>{setEntry(ev.target.value);setErr('');},
        onKeyDown:ev=>{if(ev.key==='Enter')handleSubmit();},
        style:{width:'100%',padding:'12px',fontSize:16,borderRadius:8,border:'1px solid '+(err?'#ef4444':'var(--border)'),background:'var(--card2)',color:'var(--text)',marginBottom:8,boxSizing:'border-box'},
        placeholder:'Password',
        autoCapitalize:'none',
        autoCorrect:'off'}),
      err&&e('div',{style:{color:'#ef4444',fontSize:13,marginBottom:8}},err),
      e('button',{className:'btn-p',disabled:busy||!entry,onClick:handleSubmit,style:{width:'100%',padding:'12px',fontSize:15,marginTop:8,opacity:busy||!entry?0.5:1}},busy?'Verifying…':'Continue'),
      e('div',{style:{fontSize:11,color:'var(--muted)',marginTop:20}},'Contact your contractor if you don\'t have the password.')
    )
  );
}

function App(){
  const [appUnlocked,setAppUnlocked]=useState(true);
  const [loading,setLoading]=useState(true);
  /* v4.6.3d: access gate. accessReady=false means we're still checking; 
     showGate=true means a hash is set and this device isn't verified yet. */
  const [accessReady,setAccessReady]=useState(false);
  const [showGate,setShowGate]=useState(false);
  const [saveStatus,setSaveStatus]=useState('');
  const [isOnline,setIsOnline]=useState(navigator.onLine);
  const [pendingCount,setPendingCount]=useState(0);
  const [loadedFromCache,setLoadedFromCache]=useState(false);
  /* Restore role from localStorage if within timeout */
  const [role,setRole]=useState(()=>{
    const saved=lsGet(LS_ROLE);
    const ts=lsGet(LS_ROLE_TS)||0;
    const hours=(Date.now()-ts)/(1000*60*60);
    if(saved==='farmer')return lsGet(LS_FARMER_ID)?'farmer':'read_only'; /* v4.6.11 - farmer binding persists (read-only scope, no timeout); never restore farmer without a farm bound */
    if(saved&&saved!=='read_only'&&hours<ROLE_TIMEOUT_HOURS)return saved;
    return 'read_only';
  });
  const [screen,setScreen]=useState('home');
  const [deepLinkTab,setDeepLinkTab]=useState(null);
  const persistRole=r=>{setRole(r);lsSet(LS_ROLE,r);lsSet(LS_ROLE_TS,Date.now());};
  const [selJobId,setSelJobId]=useState(null);
  const [jobs,setJobs]=useState([]);
  const [farmList,setFarmList]=useState([]);
  const [crewList,setCrewList]=useState([]);
  const [showSMS,setShowSMS]=useState(false);
  const [showBroadcast,setShowBroadcast]=useState(false);
  const [showNew,setShowNew]=useState(false); /* now renders as full screen */
  const [showDatabase,setShowDatabase]=useState(false);
  const [showEdit,setShowEdit]=useState(false);
  const [previewId,setPreviewId]=useState(null);
  const saveTimer=useRef(null);
  const isLoaded=useRef(false);
  /* dirtyRef tracks whether React state has user changes not yet saved to BOTH localStorage AND Supabase.
     dbLoad refuses to overwrite local state while dirty — prevents races losing tallies. */
  const dirtyRef=useRef(false);
  /* jobsRef holds the latest jobs state so that event handlers (goOnline, beforeunload, visibilitychange)
     can read current React state synchronously. Updated whenever jobs state changes via the effect below. */
  const jobsRef=useRef([]);
  /* isFreshRef tracks whether current React jobs state came from a successful Supabase round-trip.
     - false initially and after cache fallback (means: we don't trust this state enough to write it back)
     - true after successful dbLoad with fromCache=false
     - true after a user-initiated edit within this session (their input is the new truth)
     ALL save paths gate on this. If !isFresh, save paths become no-ops to prevent stale state from
     overwriting Supabase. This is the primary fix for the multi-contractor data wipe bug. */
  const isFreshRef=useRef(false);
  /* isFreshState mirrors isFreshRef but as React state, so UI components can react to changes. */
  const [isFreshState,setIsFreshState]=useState(false);
  /* Helper to update both ref and state in sync */
  const setFresh=(v,why)=>{
    const prev=isFreshRef.current;
    isFreshRef.current=v;
    setIsFreshState(v);
    /* TELEMETRY v4.5.1: Log every flip with reason. If fresh→stale unexpectedly, this catches it. */
    try{logSaveFailure('diag_setfresh',(why||'unknown'),'prev='+prev+';new='+v);}catch(e){}
  };
  /* lastVisibleRef tracks the timestamp of the last time the tab was visible.
     Used by the visibilitychange handler to decide if a long-hidden tab needs a fresh dbLoad on resume. */
  const lastVisibleRef=useRef(Date.now());
  /* suppressNextSaveRef: when system code (mountLoad, dbLoad refresh, visibility revalidate, goOnline)
     calls setJobs to install state FROM Supabase (or cache fallback), it sets this flag. The auto-save
     effect respects the flag — it does NOT mark dirty and does NOT push to Supabase, then clears the
     flag. This prevents two specific bugs:
       a) Mount-load auto-save echo (writing Supabase data straight back to Supabase, wasted I/O)
       b) Mount-load false dirty (causing goOnline to skip future refresh because "we have unsaved work") */
  const suppressNextSaveRef=useRef(false);
  /* PATCH v4.5.4: Per-job baseline. Maps job.id → the job reference we last saved.
     The autosave effect compares each job's current reference to this baseline; only
     jobs whose reference has changed are saved. Because setSelJob (and all other
     setJobs callers) use prev.map(...), unchanged jobs keep their old reference and
     are correctly identified as not-dirty. This stops one device from uploading its
     stale view of every other job and overwriting concurrent edits made elsewhere. */
  const lastSavedRef=useRef(new Map());

  /* Load on mount */
  useEffect(()=>{
    loadPins(); /* load PIN hashes from Supabase on mount */
    /* v4.6.3d: load access password hash, then decide if gate is needed.
       If we can't load (offline/missing column), and localStorage already has
       a verified flag from a prior session, we proceed; otherwise gate is
       skipped (graceful for pre-migration or offline-first-load). */
    loadAccessHash().then(()=>{
      if(!isAccessVerified())setShowGate(true);
      setAccessReady(true);
    });
    loadDefaultRates(); /* v4.6.11 - refresh contractor default rates cache (fire-and-forget) */
    const pendingOnMount=lsGet(LS_QUEUE)||[];
    const mountLoad=()=>dbLoad().then(({jobs:j,farms:f,crew:c,fromCache})=>{
      syncLookups(f,c);
      /* Migrate legacy jobs — backfill crewDetails.role for any crew member
         that doesn't yet have a per-job role snapshot. Prevents global role
         changes from retroactively rewriting past pay summaries. */
      const migratedJobs=j.map(job=>migrateJobRoles(job,c));
      /* Mark this state set as system-driven so auto-save doesn't fire on it */
      suppressNextSaveRef.current=true;
      setJobs(migratedJobs);setFarmList(f);setCrewList(c);
      setLoadedFromCache(fromCache);
      setLoading(false);isLoaded.current=true;
      /* PATCH v4.5.0: Mark data fresh ONLY if we got a real Supabase response.
         If fromCache=true (network failure, fell through to localStorage), we cannot
         trust this state. Save paths gate on isFreshRef and become no-ops until a
         successful Supabase load promotes us to fresh. */
      if(!fromCache){
        setFresh(true,'mountLoad_fresh_supabase');
        logSaveFailure('diag_load','mountLoad','fresh_from_supabase;jobs='+j.length);
      }else{
        setFresh(false,'mountLoad_from_cache');
        logSaveFailure('diag_load','mountLoad','stale_from_cache;jobs='+j.length+';online='+navigator.onLine);
      }
      setPendingCount((lsGet(LS_QUEUE)||[]).length+(lsGet(LS_TALLY_QUEUE)||[]).length);
      /* Deep link: #job=JOB_ID&crew=CREW_ID opens that job on Overview tab and logs view.
         FIX v4.5.2: Wrapped in try/catch because on iOS Safari, the Supabase client's
         .upsert() method has been observed to return a non-Promise value in some code
         paths, causing .catch() to throw "is not a function". That synchronous throw
         used to poison mountLoad's .then() and silently flip isFresh back to false in
         the .catch handler — which was the root cause of the multi-contractor data
         wipe bug. Wrapping everything in try/catch ensures any error here can't escape
         this block, and the deep-link logging is non-essential anyway. */
      try{
        const hash=window.location.hash;
        const jobMatch=hash.match(/[#&]job=([^&]+)/);
        const crewMatch=hash.match(/[#&]crew=([^&]+)/);
        if(jobMatch){
          const jid=jobMatch[1];
          const cid=crewMatch?crewMatch[1]:null;
          const found=j.find(x=>x.id===jid);
          if(found){setSelJobId(jid);setScreen('job');setDeepLinkTab('overview');}
          if(jid&&cid){
            /* Wrap in Promise.resolve to handle the case where .upsert() returns
               a non-thenable value on iOS Safari. The fire-and-forget chain still
               works in Chrome where .upsert() returns a proper promise. */
            try{
              const upsertResult=sb.from('job_views').upsert({
                id:jid+'_'+cid,
                contractor_slug:CONTRACTOR_SLUG,
                job_id:jid,
                crew_id:cid,
                viewed_at:new Date().toISOString()
              },{onConflict:'id'});
              Promise.resolve(upsertResult).catch(()=>{});
            }catch(viewErr){
              /* swallow — deep-link tracking is best-effort, never block app boot */
              try{logSaveFailure('diag_load','job_views_swallowed','err='+(viewErr&&viewErr.message||'unknown'));}catch(e){}
            }
          }
          window.location.hash='';
        }
      }catch(deepLinkErr){
        /* Final safety net: deep-link processing must never break the app. */
        try{logSaveFailure('diag_load','deeplink_swallowed','err='+(deepLinkErr&&deepLinkErr.message||'unknown'));}catch(e){}
      }
    }).catch(err=>{
      /* TELEMETRY v4.5.1: Capture WHY mountLoad's .then threw. Previously this catch had no log,
         which meant if anything inside .then synchronously threw AFTER the fresh log already wrote,
         we'd silently flip isFresh back to false with no diag trail. */
      try{logSaveFailure('diag_load','mountLoad_catch','err='+(err&&err.message||err&&err.toString&&err.toString()||'unknown'));}catch(e){}
      setLoading(false);
      isLoaded.current=true;
      setFresh(false,'mountLoad_catch');
    });

    /* PATCH v4.5.0: Data version check.
       On boot, compare stored DATA_VERSION against the version this code build expects.
       If different, we know stale local state is at risk of being pushed to Supabase. We:
         1. Try to flush any pending offline queue first (preserves unsynced user work)
         2. If queue is fully flushed (or was empty), wipe local caches so mountLoad must
            pull fresh from Supabase. Cannot serve stale cache.
         3. If queue still has items after flush attempt (offline), DO NOT wipe — the
            user has unsynced work we'd destroy. Defer the wipe and proceed with mountLoad
            as normal; next successful online session will trigger the wipe.
       This is a one-time event per device per DATA_VERSION change. */
    const proceedWithLoad=()=>{
      /* v4.6.3g — dead-letter replay. On boot, move any quarantined cells back
         into the live queue for one more attempt. If the server-side blocker
         that quarantined them has since been fixed (e.g. the missing 'mess'
         kind constraint, widened 15 Jun), they flush cleanly now; if it's
         still broken they quarantine again on the same pass. This is what lets
         a fixed-server-side issue self-recover without the user re-entering. */
      const dead=lsGet(LS_TALLY_DEAD)||[];
      if(dead.length>0){
        const q=lsGet(LS_TALLY_QUEUE)||[];
        const stillDead=[];
        dead.forEach(d=>{
          if(!d||!d.row){return;}
          /* v4.6.3g — replay up to 3 times. A since-fixed server blocker (the
             common case) clears on the first replay. A genuinely malformed row
             stops cycling after 3 attempts but is PRESERVED in dead-letter for
             inspection — never silently dropped. */
          const tries=(d.tries||0)+1;
          if(tries<=3){q.push({...d.row,_dead_tries:tries});}
          else{stillDead.push({...d,tries,giveUp:true});}
        });
        lsSet(LS_TALLY_QUEUE,q);
        if(stillDead.length>0){lsSet(LS_TALLY_DEAD,stillDead);logSaveFailure('error','dead_letter_giveup','count='+stillDead.length);}
        else{lsRemove(LS_TALLY_DEAD);}
        logSaveFailure('diag_save','dead_letter_replay','replayed='+(dead.length-stillDead.length)+';held='+stillDead.length);
      }
      const pendingTally=lsGet(LS_TALLY_QUEUE)||[];
      if((pendingOnMount.length>0||pendingTally.length>0)&&navigator.onLine){
        Promise.all([flushQueue().catch(()=>0),flushTallyQueue().catch(()=>0),flushTallyMetaQueue().catch(()=>0)])
          .then(()=>mountLoad()).catch(()=>mountLoad());
      } else {
        mountLoad();
      }
    };
    const storedDataVersion=lsGet(LS_DATA_VERSION);
    if(storedDataVersion!==DATA_VERSION){
      logSaveFailure('diag_dataversion','mismatch','stored='+storedDataVersion+';expected='+DATA_VERSION);
      const performWipe=()=>{
        const remainingQ=lsGet(LS_QUEUE)||[];
        const remainingTallyQ=lsGet(LS_TALLY_QUEUE)||[];
        if(remainingQ.length===0&&remainingTallyQ.length===0){
          lsRemove(LS_JOBS);
          lsRemove(LS_FARMS);
          lsRemove(LS_CREW);
          /* Do NOT remove LS_TALLY_QUEUE here — already confirmed empty above.
             Never delete unsynced tally writes; they are the only copy. */
          lsSet(LS_DATA_VERSION,DATA_VERSION);
          logSaveFailure('diag_dataversion','wiped_caches','queue_empty');
        }else{
          /* Defer: queue still has items, don't destroy them */
          logSaveFailure('diag_dataversion','wipe_deferred','queue_has='+remainingQ.length+';tally_q='+remainingTallyQ.length);
        }
        proceedWithLoad();
      };
      const pendingTallyOnMount=lsGet(LS_TALLY_QUEUE)||[];
      if((pendingOnMount.length>0||pendingTallyOnMount.length>0)&&navigator.onLine){
        /* Try queue flushes first */
        Promise.all([flushQueue().catch(()=>0),flushTallyQueue().catch(()=>0),flushTallyMetaQueue().catch(()=>0)])
          .then(()=>performWipe()).catch(()=>performWipe());
      }else if(pendingOnMount.length>0||pendingTallyOnMount.length>0){
        /* Have queue but offline — defer wipe, just proceed */
        logSaveFailure('diag_dataversion','wipe_deferred','offline_with_queue');
        proceedWithLoad();
      }else{
        /* Queue empty, just wipe and proceed */
        performWipe();
      }
    }else{
      proceedWithLoad();
    }
  },[]);

  /* Sync global lookups whenever lists update */
  useEffect(()=>{syncLookups(farmList,crewList);},[farmList,crewList]);

  /* Online/offline detection + auto-sync queue */
  useEffect(()=>{
    const goOnline=async()=>{
      setIsOnline(true);
      /* v4-3 FIX: Don't run sync logic until mountLoad has completed.
         Before this guard, an early 'online' event could fire goOnline
         while jobsRef.current was still []. The fallback to lsGet(LS_JOBS)
         then queued and uploaded stale localStorage from a previous session,
         overwriting good Supabase data. (Caused Lachie's perceived data loss
         after v4-2 deploy on 2026-04-29.) Skipping sync until isLoaded.current
         is safe — once mountLoad finishes, dbLoad has populated React state
         from Supabase, and any subsequent online events will have valid
         jobsRef.current to work from. */
      if(!isLoaded.current){
        setSaveStatus('');
        return;
      }
      setSaveStatus('syncing');
      /* PATCH v4.5.0: Only queue+upload from React state if we KNOW that state is fresh.
         If isFresh is false, our React state came from cache fallback and could be stale.
         Pushing it would cause the multi-contractor wipe bug. Instead, try a fresh dbLoad
         to upgrade ourselves to fresh, then queue legitimately-fresh state. */
      if(isFreshRef.current){
        /* PATCH v4.5.4: Only queue jobs that have changed since last save.
           The old behaviour queued ALL jobs from React state on every online event,
           which was a key vector for the multi-device overwrite bug — coming back
           online would re-upload this device's stale view of every job, even ones
           another device had just edited. */
        const currentJobs=jobsRef.current;
        let queued=0;
        currentJobs.forEach(job=>{
          if(lastSavedRef.current.get(job.id)!==job){
            queueWrite('job',job.id,job);
            queued++;
          }
        });
        logSaveFailure('diag_save','goOnline_queued','total='+currentJobs.length+';queued='+queued);
      }else{
        logSaveFailure('diag_save','goOnline_skipped_queue','not_fresh;jobs='+jobsRef.current.length);
      }
      /* Flush queue to Supabase */
      const n=await flushQueue().catch(()=>0);
      /* v4.6.0 — also flush the per-cell tally queue. Independent of whole-job
         queue. Any cells typed while offline land in Supabase now. */
      const nTally=await flushTallyQueue().catch(()=>0);
      await flushTallyMetaQueue().catch(()=>0); /* v4.6.4 — propagate any queued mob type/desc edits */
      if(nTally>0)logSaveFailure('diag_save','goOnline_tally_flushed','count='+nTally);
      const remaining=(lsGet(LS_QUEUE)||[]).length+(lsGet(LS_TALLY_QUEUE)||[]).length;
      setPendingCount(remaining);
      if(n>0||nTally>0){setSaveStatus('saved');setTimeout(()=>setSaveStatus(''),2500);}
      else setSaveStatus('');
      /* Re-fetch from Supabase if:
         (a) queue is fully clear (otherwise local has unsynced writes), AND
         (b) either we're in stale mode (we MUST recover to fresh, even if user typed
             something while stale — those local edits are unreliable anyway since they
             were typed against incomplete state), OR we have no dirty React state. */
      const shouldRefetch=remaining===0 && (!isFreshRef.current || !dirtyRef.current);
      if(shouldRefetch){
        if(!isFreshRef.current){
          logSaveFailure('diag_load','goOnline_stale_recovery','attempting_dbLoad');
        }
        dbLoad().then(({jobs:j,farms:f,crew:c,fromCache})=>{
          /* If we're already fresh, respect dirty check (don't overwrite user edits).
             If we're stale, prioritise recovery — overwrite anyway. */
          if(isFreshRef.current && dirtyRef.current)return;
          /* CRITICAL: sync globals BEFORE setting state so gf()/gc() return correct
             values during the next render. Otherwise jobs render as "Unknown". */
          syncLookups(f,c);
          /* Migrate legacy jobs — backfill crewDetails.role for any crew without snapshot */
          const migratedJobs=j.map(job=>migrateJobRoles(job,c));
          /* Mark this state set as system-driven so auto-save doesn't fire on it */
          suppressNextSaveRef.current=true;
          setJobs(migratedJobs);setFarmList(f);setCrewList(c);
          /* PATCH v4.5.0: Promote to fresh if this dbLoad succeeded against Supabase */
          if(!fromCache){
            setFresh(true,'goOnline_refetch');
            dirtyRef.current=false; /* state is now fresh from Supabase, not dirty */
            logSaveFailure('diag_load','goOnline_dbLoad','promoted_to_fresh');
          }
        });
      }else{
        /* v4.6.1 — even when full dbLoad refetch is skipped (queue still has
           items OR React state is fresh+dirty), tally cells are always safe
           to refresh from tally_entries. They live in their own table and
           the user's own per-cell writes have already gone through (queue
           was flushed above). Pulls in any cells written by OTHER devices
           since this device went online — critical for the
           one-lead-handover-at-smoko scenario where Sandra hands off to
           someone else mid-shed. */
        const jobIds=jobsRef.current.map(j=>j.id);
        if(jobIds.length>0){
          loadTalliesForJobs(jobIds).then(freshTallies=>{
            const byJob={};
            (freshTallies||[]).forEach(r=>{(byJob[r.job_id]||(byJob[r.job_id]=[])).push(r);});
            suppressNextSaveRef.current=true;
            setJobs(prev=>prev.map(j=>hydrateTallies({...j},byJob[j.id]||[])));
            logSaveFailure('diag_load','goOnline_tally_refresh','jobs='+jobIds.length+';rows='+(freshTallies||[]).length);
          }).catch(()=>{});
        }
      }
    };
    const goOffline=()=>{setIsOnline(false);setSaveStatus('');};
    window.addEventListener('online',goOnline);
    window.addEventListener('offline',goOffline);
    return()=>{window.removeEventListener('online',goOnline);window.removeEventListener('offline',goOffline);};
  },[]);

  /* v4.6.3g — periodic background drain. The browser 'online' event only fires
     on a true offline→online transition. A connection that degrades to flaky
     (requests time out) and then silently recovers never fires 'online', so a
     queued cell could sit unflushed until the next manual reopen — exactly the
     Darby/Chloe case (banner stuck while signal was fine). This timer attempts
     a drain every 20s whenever we're online, fresh, and the queue is non-empty.
     Cheap (no-op when queue empty), and the only thing that makes the queue
     self-healing without user action. */
  useEffect(()=>{
    let running=false; /* v4.6.3g — re-entrancy guard: never let a slow flush overlap the next tick */
    const tick=async()=>{
      if(running)return;
      if(!navigator.onLine||!isFreshRef.current)return;
      /* Only drain the per-CELL tally queue here. The whole-job queue (LS_QUEUE)
         pushes a stripped job BLOB, and a background push of a stale blob is the
         cross-device structure-overwrite hazard from the 6 Jun pilot contractor incident.
         Whole-job flush stays on the explicit goOnline/boot paths where freshness
         is already reconciled. Tally cells are per-cell last-write-wins and safe. */
      const qLen=(lsGet(LS_TALLY_QUEUE)||[]).length;
      if(qLen===0)return;
      running=true;
      try{
        const before=qLen;
        const nt=await flushTallyQueue().catch(()=>0);
        await flushTallyMetaQueue().catch(()=>0); /* v4.6.4 — drain queued mob metadata edits on the same timer */
        const after=(lsGet(LS_TALLY_QUEUE)||[]).length;
        const pend=after+(lsGet(LS_QUEUE)||[]).length;
        setPendingCount(pend);
        if(after<before){
          logSaveFailure('diag_save','bg_drain','flushed='+nt+';tally_remaining='+after);
          if(pend===0){setSaveStatus('saved');setTimeout(()=>setSaveStatus(s=>s==='saved'?'':s),2500);}
        }
      }finally{running=false;}
    };
    const id=setInterval(tick,20000);
    return()=>clearInterval(id);
  },[]);

  /* Keep jobsRef in sync so async handlers can read current state synchronously */
  useEffect(()=>{jobsRef.current=jobs;},[jobs]);

  /* Auto-save jobs debounced 400ms — always saves to local cache, queues if offline.
     Sets dirtyRef=true on every state change; clears only after successful save of ALL jobs.
     This dirty flag is checked by goOnline → dbLoad to prevent overwriting unsaved local edits.

     PATCH v4.5.0: Two changes to fix the multi-contractor wipe bug:
     1. Gated on isFreshRef. If state isn't fresh (came from cache fallback), refuse to save.
        Without this gate, mountLoad's cache fallback was triggering immediate auto-save with
        stale state, overwriting good Supabase data.
     2. Removed isOnline from dependency array. Previously, isOnline flipping (e.g. wifi blip,
        screen wake) would re-fire this effect with whatever React state was active — possibly
        stale. Now the effect only fires when jobs actually change. */
  useEffect(()=>{
    if(!isLoaded.current)return;
    /* TELEMETRY v4.5.1: log every auto-save entry so we can correlate isFresh state with timing.
       This will reveal exactly when isFreshRef became false relative to mountLoad. */
    try{
      logSaveFailure('diag_autosave_enter','effect',
        'jobs='+jobs.length+
        ';isFresh='+isFreshRef.current+
        ';dirty='+dirtyRef.current+
        ';suppressNext='+suppressNextSaveRef.current+
        ';online='+navigator.onLine
      );
    }catch(e){}
    /* If the most recent state change was from system code (mountLoad, dbLoad, etc),
       don't treat it as user input. Don't mark dirty, don't push to Supabase. */
    if(suppressNextSaveRef.current){
      suppressNextSaveRef.current=false;
      /* PATCH v4.5.4: System-driven setJobs (mountLoad / goOnline refetch / visibility
         revalidate) installs Supabase's view as the new baseline. After this point, any
         job whose reference differs from this baseline is genuinely user-edited. */
      const m=new Map();
      jobs.forEach(j=>m.set(j.id,j));
      lastSavedRef.current=m;
      return;
    }
    /* PATCH v4.5.4: Identify ONLY the jobs whose reference has changed since last save.
       setSelJob etc. return new arrays via .map but only the touched job has a new
       reference. Saving every job on every keystroke (the old behaviour) overwrote
       concurrent edits made on other devices to OTHER jobs. */
    const changedJobs=jobs.filter(job=>lastSavedRef.current.get(job.id)!==job);
    /* Mark dirty FIRST — before the isFresh gate. We need this set even when blocking
       Supabase saves so that any subsequent dbLoad refresh won't overwrite user input. */
    dirtyRef.current=true;
    /* Always update local cache with current state — survives page close even
       when we can't push to Supabase. This is the user's own work; it should
       never be lost just because the cloud is stale. */
    try{lsSet(LS_JOBS,jobs);}catch(e){}
    if(changedJobs.length===0){
      /* Nothing actually changed (jobs array reference shifted but every job is
         reference-equal to the baseline). Bail out — saving would just upload stale
         state that someone else may have moved past in Supabase. */
      logSaveFailure('diag_save','autosave_nothing_changed','jobs='+jobs.length);
      dirtyRef.current=false;
      return;
    }
    if(!isFreshRef.current){
      logSaveFailure('diag_save','autosave_blocked_stale','jobs='+jobs.length+';changed='+changedJobs.length+';local_cached');
      return;
    }
    clearTimeout(saveTimer.current);
    setSaveStatus(isOnline?'saving':'offline');
    /* Capture the IDs we're committing to save in this pass. The actual job object
       we send is read fresh from jobsRef at save time — state may have moved on
       during the 400ms debounce, and we want the latest. */
    const idsToSave=changedJobs.map(j=>j.id);
    saveTimer.current=setTimeout(async()=>{
      try{
        const latest=jobsRef.current;
        const toSave=latest.filter(j=>idsToSave.includes(j.id));
        logSaveFailure('diag_save','autosave_firing','total='+latest.length+';saving='+toSave.length+';ids='+idsToSave.join(','));
        await Promise.all(toSave.map(job=>dbSaveJob(job)));
        /* Update baseline for jobs we just saved */
        toSave.forEach(j=>lastSavedRef.current.set(j.id,j));
        /* Re-check dirty — state may have changed during the await */
        const stillDirty=jobsRef.current.some(j=>lastSavedRef.current.get(j.id)!==j);
        if(!stillDirty)dirtyRef.current=false;
        if(isOnline){
          setSaveStatus('saved');
          setPendingCount((lsGet(LS_TALLY_QUEUE)||[]).length);
          setTimeout(()=>setSaveStatus(''),2000);
        } else {
          setSaveStatus('offline');
          setPendingCount((lsGet(LS_QUEUE)||[]).length+(lsGet(LS_TALLY_QUEUE)||[]).length);
        }
      }catch(err){
        /* Save failed — keep dirty so we don't risk overwriting local with stale Supabase */
        setSaveStatus('offline');
        setPendingCount((lsGet(LS_QUEUE)||[]).length+(lsGet(LS_TALLY_QUEUE)||[]).length);
      }
    },400);
  },[jobs]);

  /* PATCH v4.5.0: Status indicator update moved out of auto-save effect.
     Originally the auto-save effect listened to isOnline so the UI could update on network changes.
     Now isolated here — UI updates without triggering save logic. */
  useEffect(()=>{
    if(!isLoaded.current)return;
    if(saveTimer.current)return; /* an active save is already updating status */
    setSaveStatus(isOnline?'':'offline');
    if(!isOnline)setPendingCount((lsGet(LS_QUEUE)||[]).length+(lsGet(LS_TALLY_QUEUE)||[]).length);
  },[isOnline]);

  /* CRITICAL: Save immediately on tab hide / before unload.
     If user types a tally and then locks phone or backgrounds the app within the 400ms
     debounce, the save would never fire. This handler flushes pending changes synchronously.
     localStorage is synchronous and survives unload; Supabase upserts are fire-and-forget
     (they queue via the offline path if they don't complete in time). */
  useEffect(()=>{
    /* PATCH v4.5.5: Removed `if(!isLoaded.current)return;` gate. With [] deps, the effect
       only runs once on mount, and isLoaded.current is still false at that moment
       (mountLoad's setting of true happens in an async .then). The gate ALWAYS triggered,
       the effect returned, and no listeners were ever installed. flushNow / onVis self-check
       isFreshRef internally so they're safe to install before mountLoad finishes. */
    const flushNow=()=>{
      /* Cancel any pending debounce — we're saving now */
      clearTimeout(saveTimer.current);
      /* PATCH v4.5.0: Don't push state we can't trust to Supabase.
         If !isFresh, we'll skip the Supabase upsert path. localStorage write still
         happens synchronously (harmless — it's only a local cache). */
      if(!isFreshRef.current){
        logSaveFailure('diag_save','flushNow_blocked_stale','jobs='+(jobsRef.current||[]).length);
        return;
      }
      const currentJobs=jobsRef.current;
      if(!currentJobs||currentJobs.length===0)return;
      /* PATCH v4.5.4: Only flush jobs that have changed since last save.
         Otherwise an unrelated visibility-hide (phone lock during normal use) would
         re-upload this device's view of every job — same multi-device overwrite vector
         as the autosave bug. */
      currentJobs.forEach(job=>{
        if(lastSavedRef.current.get(job.id)!==job){
          try{dbSaveJob(job);}catch(e){}
        }
      });
    };
    /* PATCH v4.5.0: On visibility change, also handle the resume case.
       If the tab was hidden for >10 minutes, force a fresh dbLoad before allowing
       any saves to fire. This catches the wakeup-from-pocket scenario where a stale
       device's React state would otherwise auto-save and overwrite Supabase. */
    const VISIBILITY_REVALIDATE_MS=10*60*1000; /* 10 minutes */
    const onVis=()=>{
      /* TELEMETRY v4.5.1: Log every visibility change so we can correlate with save blocks. */
      try{logSaveFailure('diag_visibility','change','state='+document.visibilityState+';lastVis_ago_ms='+(Date.now()-lastVisibleRef.current));}catch(e){}
      if(document.visibilityState==='hidden'){
        lastVisibleRef.current=Date.now();
        flushNow();
      }else{
        const hiddenFor=Date.now()-lastVisibleRef.current;
        if(hiddenFor>VISIBILITY_REVALIDATE_MS){
          /* Long hidden — invalidate freshness and force a fresh dbLoad */
          logSaveFailure('diag_visibility','revalidate_required','hidden_ms='+hiddenFor);
          setFresh(false,'visibility_revalidate_invalidate');
          if(navigator.onLine){
            dbLoad().then(({jobs:j,farms:f,crew:c,fromCache})=>{
              if(dirtyRef.current)return;
              syncLookups(f,c);
              const migratedJobs=j.map(job=>migrateJobRoles(job,c));
              /* Mark this state set as system-driven so auto-save doesn't fire on it */
              suppressNextSaveRef.current=true;
              setJobs(migratedJobs);setFarmList(f);setCrewList(c);
              if(!fromCache){
                setFresh(true,'visibility_revalidate_recovered');
                logSaveFailure('diag_load','visibility_revalidate','fresh_after_revalidate');
              }
            }).catch(()=>{});
          }
        }
        lastVisibleRef.current=Date.now();
      }
    };
    window.addEventListener('beforeunload',flushNow);
    window.addEventListener('pagehide',flushNow);
    document.addEventListener('visibilitychange',onVis);
    /* TELEMETRY v4.5.1: pageshow fires on every page display, including BFCache restore.
       BFCache restores skip the normal mount cycle entirely — refs and state survive,
       but a long time may have passed. If event.persisted=true, this is a BFCache restore. */
    const onPageShow=ev=>{
      try{logSaveFailure('diag_pageshow','event','persisted='+(ev.persisted?'true':'false')+';isFresh='+isFreshRef.current+';isLoaded='+isLoaded.current);}catch(e){}
    };
    window.addEventListener('pageshow',onPageShow);
    /* TELEMETRY v4.5.1: Also log pagehide separately so we can pair with pageshow. */
    const onPageHide=ev=>{
      try{logSaveFailure('diag_pagehide','event','persisted='+(ev.persisted?'true':'false')+';isFresh='+isFreshRef.current);}catch(e){}
    };
    window.addEventListener('pagehide',onPageHide);
    return()=>{
      window.removeEventListener('beforeunload',flushNow);
      window.removeEventListener('pagehide',flushNow);
      window.removeEventListener('pagehide',onPageHide);
      window.removeEventListener('pageshow',onPageShow);
      document.removeEventListener('visibilitychange',onVis);
    };
  },[]);

  const addFarm=async f=>{setFarmList(p=>{const n=[...p,f];syncLookups(n,CREW);return n;});await dbSaveFarm(f).catch(()=>{});};
  const addCrew=async c=>{setCrewList(p=>{const n=[...p,c];syncLookups(FARMS,n);return n;});await dbSaveCrew(c).catch(()=>{});};
  const gfl=id=>farmList.find(f=>f.id===id);
  const gcl=id=>crewList.find(c=>c.id===id);
  const selJob=jobs.find(j=>j.id===selJobId);
  const setSelJob=fn=>setJobs(prev=>prev.map(j=>j.id===selJobId?fn(j):j));
  const [jobPinPending,setJobPinPending]=useState(null); /* job id awaiting PIN */
  const goJob=id=>{
    /* Save current job immediately before switching */
    if(selJobId&&selJobId!==id){
      const current=jobs.find(j=>j.id===selJobId);
      if(current){
        /* v4.6.3 — diag log so every direct save is traceable. The
           Woolaway incident had a save at 10:55:27 with no diag trail
           because goJob's direct dbSaveJob never logged. */
        try{
          const runIds=[];
          Object.values((current.runs||{})).forEach(d=>(d||[]).forEach(r=>{if(r&&r.id)runIds.push(r.id);}));
          logSaveFailure('diag_save','goJob_direct','job='+current.id+';from='+selJobId+';to='+id+';run_ids='+runIds.join(','));
        }catch(e){}
        dbSaveJob(current).catch(()=>{});
      }
    }
    const job=jobs.find(j=>j.id===id);
    if(job?.jobPin&&role!=='admin'){
      setJobPinPending(id);
    }else{
      setSelJobId(id);setScreen('job');
    }
  };
  const goHome=()=>{
    /* Save current job immediately before going home */
    if(selJobId){const current=jobs.find(j=>j.id===selJobId);if(current)dbSaveJob(current).catch(()=>{});}
    setScreen('home');setSelJobId(null);setShowSMS(false);setPreviewId(null);setJobPinPending(null);
  };
  const doCreate=async job=>{
    syncLookups(farmList,crewList);
    lsSet(LS_LAST_RATES,job.rates); /* save rates for next job */
    setJobs(p=>[job,...p]);
    setShowNew(false);
    /* If it's a draft, go to Schedule to see it in the plan; else open the job */
    if(job.status==='Draft'){
      setScreen('schedule');
    } else {
      setSelJobId(job.id);
      setScreen('job');
    }
    await dbSaveJob(job).catch(()=>{});
  };
  const goSchedule=()=>{
    if(selJobId){const current=jobs.find(j=>j.id===selJobId);if(current)dbSaveJob(current).catch(()=>{});}
    setScreen('schedule');setSelJobId(null);
  };
  /* Publish a draft: status→Active, save, open Send Cards modal on the job */
  const publishJob=async()=>{
    if(!selJob)return;
    const updated={...selJob,status:'Active'};
    setJobs(p=>p.map(j=>j.id===updated.id?updated:j));
    await dbSaveJob(updated).catch(()=>{});
    /* If crew exists, open SMS modal straight away so user can send cards */
    if(updated.crew&&updated.crew.length>0){
      setShowSMS(true);
    }
  };

  /* v4.6.3d: access gate before anything else. Shows while we're still checking
     (accessReady=false) and stays up if a password is set and not yet verified. */
  if(!accessReady)return e('div',{style:{height:'100dvh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:16,background:'var(--hdr)'}},
    e('div',{style:{fontFamily:'var(--h)',fontSize:36,fontWeight:800,color:'var(--amber)'}},'my',e('span',{style:{color:'rgba(255,255,255,.4)',fontWeight:500}},'Gang')),
    e('div',{style:{width:40,height:40,border:'3px solid rgba(255,255,255,.15)',borderTopColor:'var(--amber)',borderRadius:'50%',animation:'spin 0.8s linear infinite'}}),
    e('style',null,'@keyframes spin{to{transform:rotate(360deg)}}')
  );
  if(showGate)return e(AccessGate,{onSuccess:()=>setShowGate(false)});

  /* Loading screen */
  if(loading)return e('div',{style:{height:'100dvh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:16,background:'var(--hdr)'}},
    e('div',{style:{fontFamily:'var(--h)',fontSize:36,fontWeight:800,color:'var(--amber)'}},'my',e('span',{style:{color:'rgba(255,255,255,.4)',fontWeight:500}},'Gang')),
    e('div',{style:{width:40,height:40,border:'3px solid rgba(255,255,255,.15)',borderTopColor:'var(--amber)',borderRadius:'50%',animation:'spin 0.8s linear infinite'}}),
    e('style',null,'@keyframes spin{to{transform:rotate(360deg)}}'),
    e('div',{style:{fontSize:13,color:'rgba(255,255,255,.4)'}},CONTRACTOR_NAME||'Loading...')
  );

  /* Status indicator */
  const statusCfg={
    saving:{bg:'var(--amber)',txt:'Saving...'},
    saved:{bg:'var(--green)',txt:'✓ Saved'},
    syncing:{bg:'var(--blue)',txt:'↑ Syncing...'},
    offline:{bg:'#64748b',txt:`✈ Offline${pendingCount>0?' — '+pendingCount+' pending':''}` },
    error:{bg:'var(--red)',txt:'⚠ Error'},
  };
  const sc=statusCfg[saveStatus];
  const StatusBar=()=>e('div',null,
    !isOnline&&e('div',{style:{position:'fixed',top:0,left:0,right:0,zIndex:200,background:'#1e293b',color:'rgba(255,255,255,.7)',fontSize:11,fontWeight:700,textAlign:'center',padding:'4px',letterSpacing:.5}},
      pendingCount>0?`✈ Offline — ${pendingCount} change${pendingCount>1?'s':''} will sync when signal returns`:'✈ Offline — changes saved to device'
    ),
    isOnline&&!isFreshState&&isLoaded.current&&e('div',{style:{position:'fixed',top:0,left:0,right:0,zIndex:200,background:'#7c2d12',color:'#fff',fontSize:11,fontWeight:700,textAlign:'center',padding:'4px',letterSpacing:.5}},
      '⟳ Reconnecting to server — changes will save once connected'
    ),
    /* v4.6.3e: the dangerous silent state — browser says online, but queued
       entries never reached the server (weak signal / failed flush). User saw
       nothing and panic-cleared site data, destroying the only copy. Make it
       visible + tappable to retry. */
    isOnline&&isFreshState&&isLoaded.current&&pendingCount>0&&e('div',{
      onClick:async()=>{
        try{await flushQueue();}catch(err){}
        try{await flushTallyQueue();}catch(err){}
        setPendingCount((lsGet(LS_QUEUE)||[]).length+(lsGet(LS_TALLY_QUEUE)||[]).length);
      },
      style:{position:'fixed',top:0,left:0,right:0,zIndex:200,background:'#92400e',color:'#fff',fontSize:11,fontWeight:700,textAlign:'center',padding:'4px',letterSpacing:.5,cursor:'pointer'}},
      `⚠ ${pendingCount} entr${pendingCount>1?'ies':'y'} not yet on server — tap to retry. Don't clear app data.`
    ),
    sc&&e('div',{style:{position:'fixed',bottom:80,right:18,padding:'5px 12px',borderRadius:20,fontSize:11,fontWeight:700,zIndex:100,background:sc.bg,color:'#fff',boxShadow:'0 2px 8px rgba(0,0,0,.2)'}},sc.txt)
  );

  return e('div',{style:{paddingTop:(!isOnline||(isOnline&&!isFreshState&&isLoaded.current)||(isOnline&&isFreshState&&isLoaded.current&&pendingCount>0))?20:0}},
    e(StatusBar),
    screen==='home'&&e(HomeScreen,{jobs,role,setRole:persistRole,onJob:goJob,onNew:()=>setShowNew(true),onDatabase:()=>setShowDatabase(true),onSchedule:goSchedule,contractorName:CONTRACTOR_NAME}),
    screen==='schedule'&&role!=='read_only'&&e(ScheduleScreen,{jobs,role,setRole:persistRole,onBack:goHome,onJob:goJob,onNew:()=>setShowNew(true),onNewDraft:()=>setShowNew(true)}),
    screen==='job'&&selJob&&e(JobDetailScreen,{job:selJob,setJob:setSelJob,role,setRole:persistRole,onBack:goHome,onSend:()=>setShowSMS(true),onBroadcast:()=>setShowBroadcast(true),gfl,gcl,onEdit:()=>setShowEdit(true),onPublish:publishJob,onDeleteJob:async()=>{const id=selJob.id;setSelJobId(null);await dbDeleteJob(id);setJobs(p=>p.filter(j=>j.id!==id));setScreen('home');setShowSMS(false);setPreviewId(null);setJobPinPending(null);},initialTab:deepLinkTab,key:selJobId+(deepLinkTab||'')}),
    showSMS&&selJob&&e(SMSModal,{job:selJob,onClose:()=>{setShowSMS(false);setPreviewId(null);},onPreview:id=>setPreviewId(id),farmList,crewList}),
    showBroadcast&&selJob&&e(BroadcastModal,{job:selJob,onClose:()=>setShowBroadcast(false),farmList,crewList}),
    previewId&&selJob&&e(JobCardView,{job:selJob,crewId:previewId,onClose:()=>setPreviewId(null),gfl,gcl}),
    showDatabase&&e(DatabaseScreen,{farmList,crewList,addFarm,addCrew,setFarmList,setCrewList,onClose:()=>setShowDatabase(false)}),
    showNew&&e('div',{style:{position:'fixed',inset:0,background:'var(--bg)',zIndex:200,overflowY:'auto',WebkitOverflowScrolling:'touch'}},e(NewJobModal,{onClose:()=>setShowNew(false),onCreate:doCreate,farmList,crewList,addFarm,addCrew,jobs})),
    showEdit&&selJob&&e('div',{style:{position:'fixed',inset:0,background:'var(--bg)',zIndex:200,overflowY:'auto',WebkitOverflowScrolling:'touch'}},e(EditJobScreen,{job:selJob,onClose:()=>setShowEdit(false),onSave:async updated=>{setJobs(p=>p.map(j=>j.id===updated.id?updated:j));await dbSaveJob(updated).catch(()=>{});setShowEdit(false);},farmList,addFarm,crewList,addCrew})),
    /* Job PIN gate */
    jobPinPending&&e('div',{className:'pin-modal'},
      e('div',{className:'pin-modal-box'},
        e('div',{className:'pmb-title'},gfl(jobs.find(j=>j.id===jobPinPending)?.farmId)?.name||'Job'),
        e('div',{className:'pmb-sub'},'This job is PIN protected'),
        e(PinPad,{
          label:'Job PIN',
          subtitle:'Enter job PIN to open',
          onSuccess:()=>{setSelJobId(jobPinPending);setScreen('job');setJobPinPending(null);},
          onCancel:()=>setJobPinPending(null),
          allowChange:false,
          _overridePin:jobs.find(j=>j.id===jobPinPending)?.jobPin,
        })
      )
    )
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(e(App));
/* ── SERVICE WORKER REGISTRATION ── */
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('/sw.js').then(reg=>{
      console.log('SW registered:',reg.scope);
    }).catch(err=>console.warn('SW registration failed:',err));
  });
}
</script>
</body>
</html>
