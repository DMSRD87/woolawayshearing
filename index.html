<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#1e2a3a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="myGang">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%231e2a3a'/><text y='.9em' font-size='72' x='50%' text-anchor='middle' font-family='sans-serif' fill='%23f59e0b'>m</text></svg>">
<link rel="manifest" href="data:application/manifest+json,{%22name%22:%22myGang%22,%22short_name%22:%22myGang%22,%22start_url%22:%22/%22,%22display%22:%22standalone%22,%22background_color%22:%22%231e2a3a%22,%22theme_color%22:%22%231e2a3a%22,%22icons%22:[{%22src%22:%22data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%231e2a3a'/><text y='.9em' font-size='60' x='50%25' text-anchor='middle' font-family='sans-serif' fill='%23f59e0b'>m</text></svg>%22,%22sizes%22:%22192x192%22,%22type%22:%22image/svg+xml%22}]}">
<title>myGang — Digital Tally Book</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#f2f4f8;--card:#ffffff;--card2:#eceef5;--border:#dde0ea;--border2:#e8eaf2;--amber:#f59e0b;--amberD:rgba(245,158,11,.13);--amberB:rgba(245,158,11,.3);--green:#16a34a;--greenD:rgba(22,163,74,.12);--red:#dc2626;--redD:rgba(220,38,38,.1);--redB:rgba(220,38,38,.35);--blue:#1a73e8;--blueD:rgba(26,115,232,.1);--purple:#7c3aed;--purpleD:rgba(124,58,237,.1);--text:#1a1e2e;--muted:#64748b;--dim:#94a3b8;--h:'Barlow Condensed',sans-serif;--b:'DM Sans',sans-serif;--m:'JetBrains Mono',monospace;--r:12px;--hdr:#1e2a3a}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:var(--b);min-height:100dvh;font-size:15px;overscroll-behavior:none}
#root{max-width:960px;margin:0 auto;min-height:100dvh;position:relative}
.screen{overflow-y:auto;height:calc(100dvh - 58px);padding-bottom:88px}
/* TOPBAR — always dark navy */
.topbar{position:sticky;top:0;z-index:50;height:58px;background:var(--hdr);padding:0 16px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.logo{font-family:var(--h);font-size:26px;font-weight:800;letter-spacing:-.5px;color:var(--amber);line-height:1}
.logo em{color:#fff;font-style:normal;opacity:.4;font-weight:500}
.back-btn{display:flex;align-items:center;gap:5px;font-size:14px;color:rgba(255,255,255,.75);cursor:pointer;background:none;border:none;padding:4px 0;flex-shrink:0}
.back-arr{font-size:18px;line-height:1}
.back-label{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
.role-toggle{display:flex;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:8px;overflow:hidden;flex-shrink:0}
.rt-btn{padding:5px 8px;font-size:10px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;cursor:pointer;border:none;background:none;color:rgba(255,255,255,.5);transition:.15s;white-space:nowrap}
.rt-btn.active{background:var(--amber);color:#000}
.sched-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:6px 10px;color:rgba(255,255,255,.85);font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap;flex-shrink:0;transition:.12s}
.sched-btn:active{background:rgba(255,255,255,.22)}
.sched-btn-ic{font-size:15px;line-height:1}
/* PIN SCREEN */
.pin-screen{position:fixed;inset:0;background:var(--hdr);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:500;gap:0}
.pin-logo{font-family:var(--h);font-size:42px;font-weight:800;color:var(--amber);margin-bottom:4px}
.pin-logo em{color:rgba(255,255,255,.35);font-style:normal;font-weight:500}
.pin-subtitle{font-size:13px;color:rgba(255,255,255,.4);margin-bottom:36px}
.pin-label{font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:14px}
.pin-dots{display:flex;gap:14px;margin-bottom:32px}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,.25);background:transparent;transition:.15s}
.pin-dot.filled{background:var(--amber);border-color:var(--amber)}
.pin-dot.error{background:var(--red);border-color:var(--red)}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:260px;margin-bottom:16px}
.pin-key{height:72px;border-radius:14px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);color:#fff;font-family:var(--h);font-size:28px;font-weight:700;cursor:pointer;transition:.12s;display:flex;align-items:center;justify-content:center}
.pin-key:active{background:var(--amber);color:#000;border-color:var(--amber)}
.pin-key.del{font-size:22px}
.pin-key.empty{background:none;border:none;cursor:default}
.pin-error{font-size:13px;color:var(--red);font-weight:600;height:20px;text-align:center;margin-bottom:8px}
.pin-change-btn{font-size:12px;color:rgba(255,255,255,.3);background:none;border:none;cursor:pointer;margin-top:8px;padding:8px}
/* ADMIN PIN MODAL */
.pin-modal{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);z-index:400;display:flex;align-items:center;justify-content:center}
.pin-modal-box{background:var(--hdr);border-radius:20px;padding:32px 24px;display:flex;flex-direction:column;align-items:center;gap:0;min-width:300px}
.pmb-title{font-family:var(--h);font-size:20px;font-weight:800;color:#fff;margin-bottom:4px;text-align:center}
.pmb-sub{font-size:12px;color:rgba(255,255,255,.4);margin-bottom:24px;text-align:center}
.fab{position:fixed;bottom:22px;right:calc(50% - 466px);width:52px;height:52px;border-radius:50%;background:var(--amber);border:none;cursor:pointer;font-size:26px;color:#000;font-weight:700;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 24px rgba(245,158,11,.4);z-index:40;transition:transform .15s}
.fab:active{transform:scale(.91)}
@media(max-width:960px){.fab{right:18px}}
/* WEEK BANNER */
.week-banner{margin:16px 16px 0;padding:18px;background:linear-gradient(135deg,rgba(245,158,11,.12),rgba(245,158,11,.04));border:1px solid rgba(245,158,11,.3);border-radius:var(--r)}
.wb-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px}
.wb-title{font-family:var(--h);font-size:12px;font-weight:700;color:var(--amber);letter-spacing:1.2px;text-transform:uppercase}
.wb-date{font-size:12px;color:var(--dim)}
.wb-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.wb-stat{text-align:center;padding:10px 4px;background:rgba(255,255,255,.6);border-radius:8px;border:1px solid var(--border)}
.wb-num{font-family:var(--h);font-size:28px;font-weight:800;color:var(--text);line-height:1}
.wb-lbl{font-size:10px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.4px}
.slbl{font-family:var(--h);font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--dim);padding:0 16px;margin:18px 0 8px}
/* JOB LIST */
.jlc{margin:0 16px 10px;padding:16px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;transition:.12s;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.jlc:active{background:var(--card2)}
.jlc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px}
.jlc-name{font-family:var(--h);font-size:22px;font-weight:700;line-height:1.1;flex:1}
.jlc-num{font-family:var(--m);font-size:11px;color:var(--dim);margin-top:2px}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;flex-shrink:0}
.b-active{background:#dcfce7;color:#16a34a}.b-completed{background:var(--blueD);color:var(--blue)}.b-charged{background:var(--purpleD);color:var(--purple)}.b-dispatched{background:var(--amberD);color:var(--amber)}.b-draft{background:var(--redD);color:var(--red);border:1px dashed var(--redB)}
.jlc-meta{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:8px;align-items:center}
.pill{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;background:var(--card2);color:var(--muted);border:1px solid var(--border)}
.jlc-pr{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:5px}
.pct-lbl{font-family:var(--m);font-weight:600;color:var(--text)}
.pbar{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.pbar-f{height:100%;border-radius:3px;transition:width .5s}
.fg{background:var(--green)}.fa{background:var(--amber)}.fr{background:var(--red)}.fb{background:var(--blue)}
/* JOB DETAIL */
.jd-hero{padding:16px 16px 12px;background:var(--hdr)}
.jd-farm{font-family:var(--h);font-size:32px;font-weight:800;line-height:1.1;margin-bottom:8px;color:#fff}
.jd-sub{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.status-btn{background:none;border:none;cursor:pointer;padding:0;display:inline-flex}
.status-hint{font-size:10px;color:rgba(255,255,255,.4);margin-left:2px;align-self:center}
.tabs{display:flex;border-bottom:2px solid var(--border);padding:0 16px;position:sticky;top:58px;z-index:40;background:var(--card);overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab-btn{padding:11px 14px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:.15s;background:none;border-top:none;border-left:none;border-right:none;white-space:nowrap;flex-shrink:0}
.tab-btn.on{color:var(--amber);border-bottom-color:var(--amber)}
/* DATE STRIP */
.date-strip{display:flex;overflow-x:auto;scrollbar-width:none;padding:10px 12px;gap:7px;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:100px;z-index:35}
.date-strip::-webkit-scrollbar{display:none}
.ds-chip{flex-shrink:0;padding:8px 12px;border-radius:10px;cursor:pointer;border:1px solid var(--border);background:var(--card2);text-align:center;min-width:56px;transition:.12s}
.ds-chip.act{background:var(--amber);border-color:var(--amber)}
.ds-chip.act .ds-day,.ds-chip.act .ds-num{color:#000}
.ds-chip.no-data{opacity:.4}
.ds-day{font-family:var(--h);font-size:15px;font-weight:800;text-transform:uppercase;color:var(--muted);line-height:1}
.ds-num{font-family:var(--m);font-size:11px;color:var(--dim);margin-top:2px}
/* DAY TOTALS */
.day-totals{display:flex;border-bottom:1px solid var(--border)}
.dt-cell{flex:1;padding:13px 16px;border-right:1px solid var(--border)}
.dt-cell:last-child{border-right:none}
.dt-lbl{font-family:var(--h);font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--amber);margin-bottom:4px}
.dt-val{font-family:var(--h);font-size:36px;font-weight:800;color:var(--text);line-height:1}
.dt-sub{font-size:13px;color:var(--muted);margin-top:3px;font-weight:500}
/* RUN CARD */
.run-card{margin:12px 16px 0;background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.run-hdr{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:var(--hdr);border-bottom:1px solid rgba(255,255,255,.08)}
.run-hdr-l{display:flex;align-items:center;gap:10px}
.run-num{width:30px;height:30px;border-radius:8px;background:var(--amber);color:#000;font-family:var(--h);font-size:17px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.run-title{font-family:var(--h);font-size:19px;font-weight:700;color:#fff}
.run-hdr-r{display:flex;align-items:center;gap:10px}
.run-total-lbl{font-size:11px;color:rgba(255,255,255,.5);text-align:right}
.run-total-val{font-family:var(--h);font-size:22px;font-weight:800;color:var(--amber);line-height:1}
.run-del{background:none;border:none;color:rgba(255,255,255,.35);font-size:22px;cursor:pointer;padding:0 4px;line-height:1}
/* MOB ENTRY */
.mob-entry{padding:10px 14px 0;border-top:1px solid var(--border2)}
.mob-entry:first-child{border-top:none}
.mob-type-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.mob-type-btn{padding:5px 12px;border-radius:6px;font-size:12px;font-weight:700;border:1px solid;background:none;cursor:default}
.mob-type-btn.sh{background:var(--blueD);border-color:rgba(26,115,232,.3);color:var(--blue)}
.mob-type-btn.cr{background:var(--amberD);border-color:var(--amberB);color:var(--amber)}
.mob-desc{flex:1;background:none;border:none;border-bottom:1px solid var(--border);padding:4px 0;font-size:13px;color:var(--muted);outline:none;font-family:var(--b)}
.mob-desc::placeholder{color:var(--border2)}
.mob-desc:focus{border-bottom-color:var(--amber);color:var(--text)}
.mob-del-btn{background:none;border:none;color:var(--dim);font-size:16px;cursor:pointer;padding:0 2px;line-height:1;flex-shrink:0}
.rate-override-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.ro-lbl{font-size:11px;color:var(--dim);flex-shrink:0}
.ro-inp{width:64px;background:none;border:none;border-bottom:1px solid var(--border);padding:2px 4px;font-family:var(--m);font-size:13px;font-weight:600;color:var(--text);outline:none;-moz-appearance:textfield}
.ro-inp::-webkit-inner-spin-button,.ro-inp::-webkit-outer-spin-button{-webkit-appearance:none}
.ro-inp:focus{border-bottom-color:var(--amber)}
.ro-eff{font-size:11px;color:var(--amber);font-family:var(--m);font-weight:700}
.sh-grid{overflow-x:auto;scrollbar-width:none;padding-bottom:14px}
.sh-grid::-webkit-scrollbar{display:none}
.sh-grid-inner{display:flex;gap:0;min-width:max-content}
.sh-col{display:flex;flex-direction:column;align-items:center;min-width:72px;padding:0 6px}
.sh-col-name{font-size:11px;font-weight:600;color:var(--muted);text-align:center;margin-bottom:7px;white-space:nowrap}
.sh-col-inp{width:58px;height:58px;background:var(--card2);border:2px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--m);font-size:22px;font-weight:700;text-align:center;outline:none;transition:.15s;-moz-appearance:textfield}
.sh-col-inp::-webkit-inner-spin-button,.sh-col-inp::-webkit-outer-spin-button{-webkit-appearance:none}
.sh-col-inp:focus{border-color:var(--amber);background:rgba(245,158,11,.06)}
.sh-col-inp:disabled{opacity:.35;background:var(--bg)}
.sh-col-inp::placeholder{color:var(--border2);font-size:18px}
.sh-col-tot{display:flex;flex-direction:column;align-items:center;min-width:72px;padding:0 6px}
.sh-col-tot-lbl{font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.4px;margin-bottom:7px;text-align:center}
.sh-col-tot-val{width:58px;height:58px;background:var(--hdr);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:var(--m);font-size:20px;font-weight:800;color:var(--amber)}
.add-mob-row{display:flex;gap:8px;padding:8px 14px;border-top:1px solid var(--border2)}
.amsh{flex:1;padding:9px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;text-align:center;transition:.12s;background:var(--blueD);border:1px solid rgba(26,115,232,.25);color:var(--blue)}
.amcr{flex:1;padding:9px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;text-align:center;transition:.12s;background:var(--amberD);border:1px solid var(--amberB);color:var(--amber)}
.amsh:active,.amcr:active{opacity:.7}
.add-run-wrap{padding:12px 16px 0}
.add-run-btn{width:100%;padding:14px;background:none;border:2px dashed var(--border);border-radius:var(--r);color:var(--muted);font-size:14px;font-weight:600;cursor:pointer;transition:.12s;font-family:var(--b)}
.add-run-btn:active,.add-run-btn:hover{background:var(--card);color:var(--text)}
.read-hint{margin:10px 16px 0;padding:9px 12px;background:var(--card2);border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--dim);text-align:center}
/* MOB TOTALS */
.mob-totals{margin:12px 16px 0;background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.mt-hdr{padding:8px 14px;background:var(--card2);border-bottom:1px solid var(--border);font-family:var(--h);font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--dim)}
.mt-col-row{display:flex;padding:5px 12px 3px;border-bottom:1px solid var(--border)}
.mt-dh{flex:1;font-size:10px;color:var(--dim);font-weight:700;text-transform:uppercase}
.mt-vh{width:58px;text-align:right;font-size:10px;font-weight:700;text-transform:uppercase;color:var(--muted);letter-spacing:.3px}
.mt-vh.today{color:var(--blue)}.mt-vh.tot{color:var(--text)}
.mt-row{display:flex;align-items:center;padding:8px 12px;border-bottom:1px solid var(--border2)}
.mt-row:last-child{border-bottom:none}
.mt-desc{flex:1;display:flex;align-items:center;gap:7px;min-width:0}
.mt-badge{padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;flex-shrink:0}
.mt-badge.sh{background:var(--blueD);color:var(--blue)}
.mt-badge.cr{background:var(--amberD);color:var(--amber)}
.mt-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mt-v{width:58px;text-align:right;font-family:var(--m);font-size:12px;font-weight:600;color:var(--text)}
.mt-v.today{color:var(--blue)}.mt-v.tot{font-weight:800}
.mt-v.nil{color:var(--border2)}
/* SHEARER TOTALS */
.sh-totals{margin:12px 16px 0;background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.sht-hdr{padding:8px 14px;background:var(--card2);border-bottom:1px solid var(--border);font-family:var(--h);font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--dim)}
.sht-col-hdr-row{display:flex;padding:5px 10px 3px;border-bottom:1px solid var(--border)}
.sht-nc{flex:0 0 80px;font-size:10px;color:var(--dim);font-weight:700;text-transform:uppercase}
.sht-ch{flex:1;text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:var(--muted)}
.sht-ch.sh{color:var(--blue)}.sht-ch.cr{color:var(--amber)}
.sht-row{display:flex;align-items:center;padding:8px 10px;border-bottom:1px solid var(--border2)}
.sht-row:last-child{border-bottom:none}
.sht-name{flex:0 0 80px;font-size:12px;font-weight:600;color:var(--text)}
.sht-v{flex:1;text-align:center;font-family:var(--m);font-size:12px;font-weight:600;color:var(--text)}
.sht-v.today{color:var(--blue)}.sht-v.tot{font-weight:800}.sht-v.nil{color:var(--border2)}
/* SHED STAFF */
.shed-section{margin:14px 16px 0;background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.shed-hdr{padding:10px 14px;background:var(--hdr);border-bottom:1px solid rgba(255,255,255,.08);font-family:var(--h);font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.7)}
.role-grp-lbl{padding:8px 14px 4px;font-family:var(--h);font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--amber);background:rgba(245,158,11,.05);border-bottom:1px solid var(--border2)}
.staff-row{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border)}
.staff-row:last-child{border-bottom:none}
.staff-info{flex:1;min-width:0}
.staff-name{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.staff-rate-lbl{font-size:11px;color:var(--amber);margin-top:1px;font-weight:600}
.staff-stats{display:flex;align-items:center;gap:10px;flex-shrink:0}
.s-grp{display:flex;flex-direction:column;align-items:center;gap:1px}
.s-lbl{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.3px;white-space:nowrap}
.s-val{font-family:var(--m);font-size:14px;font-weight:700;color:var(--text)}
.s-val.hi{color:var(--amber)}
.s-div{width:1px;height:28px;background:var(--border);flex-shrink:0}
.rs{display:flex;align-items:center;gap:2px}
.rs-btn{width:30px;height:30px;border-radius:7px;background:var(--card2);border:1px solid var(--border);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;flex-shrink:0}

.rs-btn:not(:disabled):active{background:var(--border)}
.rs-val{font-family:var(--m);font-size:16px;font-weight:700;width:30px;text-align:center}
.notes-wrap{margin:10px 16px 0}
.notes-lbl{font-family:var(--h);font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--dim);margin-bottom:6px}
.notes-ta{width:100%;padding:11px 12px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--b);font-size:14px;outline:none;resize:none;line-height:1.5}
.notes-ta:focus{border-color:var(--amber)}.notes-ta::placeholder{color:var(--dim)}
/* ADMIN */
.admin-wrap{padding:12px 16px 0}
.admin-section{background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin-bottom:12px;overflow:hidden}
.admin-sec-hdr{padding:10px 14px;background:var(--card2);border-bottom:1px solid var(--border)}
.admin-sec-title{font-family:var(--h);font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
.admin-sec-sub{font-size:11px;color:var(--dim);margin-top:2px}
.rate-grid{display:grid;grid-template-columns:1fr 1fr;gap:0}
.rate-cell{padding:12px 14px;border-right:1px solid var(--border);border-bottom:1px solid var(--border)}
.rate-cell:nth-child(even){border-right:none}
.rate-cell:nth-last-child(-n+2){border-bottom:none}
.rate-cell.amber-bg{background:rgba(245,158,11,.06)}
.rate-lbl{font-size:11px;color:var(--dim);margin-bottom:6px;font-weight:500}
.rate-lbl.hi{color:var(--amber)}
.rate-inp-row{display:flex;align-items:baseline;gap:2px}
.rate-prefix{font-family:var(--m);font-size:14px;color:var(--dim)}
.rate-inp{background:none;border:none;border-bottom:1px solid var(--border2);padding:2px 2px 3px;font-family:var(--m);font-size:20px;font-weight:700;color:var(--text);outline:none;width:100%;-moz-appearance:textfield}
.rate-inp::-webkit-inner-spin-button,.rate-inp::-webkit-outer-spin-button{-webkit-appearance:none}
.rate-inp:focus{border-bottom-color:var(--amber)}
.rate-inp.hi{color:var(--amber)}
.loading-row{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(--border)}
.loading-row:last-child{border-bottom:none}
.lr-l{display:flex;align-items:center;gap:9px}
.lr-name{font-weight:600;font-size:14px}
.lr-role{font-size:12px;color:var(--muted)}
.lr-r{display:flex;align-items:center;gap:6px}
.lr-prefix{font-family:var(--m);font-size:12px;color:var(--dim)}
.lr-inp{width:70px;background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:6px 8px;font-family:var(--m);font-size:14px;font-weight:700;color:var(--text);text-align:right;outline:none;-moz-appearance:textfield}
.lr-inp::-webkit-inner-spin-button,.lr-inp::-webkit-outer-spin-button{-webkit-appearance:none}
.lr-inp:focus{border-color:var(--amber)}
.lr-unit{font-size:11px;color:var(--dim);white-space:nowrap}
.tr-inp{width:46px;background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:5px 6px;font-family:var(--m);font-size:14px;font-weight:700;color:var(--text);text-align:right;outline:none;-moz-appearance:textfield}
.tr-inp::-webkit-inner-spin-button,.tr-inp::-webkit-outer-spin-button{-webkit-appearance:none}
.tr-inp:focus{border-color:var(--amber)}
.tr-unit{font-size:11px;color:var(--dim);white-space:nowrap}
/* SUMMARY */
.summary-wrap{padding:14px 16px 0}
.period-nav{background:var(--hdr);border-radius:var(--r);padding:16px 18px;margin-bottom:14px}
.period-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.period-label{display:flex;flex-direction:column;gap:3px}
.period-title{font-family:var(--h);font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.4)}
.period-dates{font-family:var(--h);font-size:22px;font-weight:800;color:#fff;line-height:1.1}
.period-badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;background:var(--amber);color:#000;margin-top:4px;align-self:flex-start}
.period-stats{display:flex;gap:16px;flex-wrap:wrap}
.ps-item{display:flex;flex-direction:column;align-items:center;padding:8px 12px;background:rgba(255,255,255,.07);border-radius:8px;min-width:70px}
.ps-num{font-family:var(--h);font-size:24px;font-weight:800;color:var(--amber);line-height:1}
.ps-lbl{font-size:10px;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.4px;margin-top:2px}
.ps-pay{font-family:var(--h);font-size:22px;font-weight:800;color:var(--green);line-height:1}
.period-btns{display:flex;align-items:center;gap:8px;margin-top:2px}
.period-btn{padding:7px 14px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:7px;color:rgba(255,255,255,.8);font-size:12px;font-weight:700;cursor:pointer;font-family:var(--b);transition:.12s;white-space:nowrap}
.period-btn:active{background:rgba(255,255,255,.2)}
.period-btn:disabled{opacity:.3;cursor:default}
.period-btn.current{background:var(--amber);border-color:var(--amber);color:#000;cursor:default}
.summary-actions{margin-bottom:10px}
.btn-copy{padding:10px 18px;background:var(--green);border:none;color:#fff;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--b)}
.btn-copy:active{opacity:.85}
.summary-pre{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;font-family:var(--m);font-size:11.5px;line-height:1.75;color:var(--text);overflow-x:auto;white-space:pre;margin-bottom:16px}
.pay-day-sel{width:100%;padding:10px 12px;background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--b);font-size:15px;font-weight:600;outline:none;cursor:pointer}
.pay-day-sel:focus{border-color:var(--amber)}
.sum-toggle{display:flex;background:var(--card2);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:14px}
.sum-tab{flex:1;padding:11px;text-align:center;font-size:13px;font-weight:700;cursor:pointer;color:var(--muted);border:none;background:none;transition:.15s;font-family:var(--b)}
.sum-tab.on{background:var(--hdr);color:#fff}
.invoice-hdr{background:var(--hdr);border-radius:var(--r);padding:16px 18px;margin-bottom:14px}
.inv-title{font-family:var(--h);font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:4px}
.inv-farm{font-family:var(--h);font-size:22px;font-weight:800;color:#fff;line-height:1.1;margin-bottom:8px}
.inv-stats{display:flex;gap:12px;flex-wrap:wrap}
.inv-stat{display:flex;flex-direction:column;padding:8px 12px;background:rgba(255,255,255,.07);border-radius:8px;min-width:80px}
.inv-stat-num{font-family:var(--h);font-size:26px;font-weight:800;color:var(--green);line-height:1}
.inv-stat-lbl{font-size:10px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.4px;margin-top:2px}
.freq-btns{display:flex;gap:0;background:var(--card2);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.freq-btn{flex:1;padding:9px;text-align:center;font-size:12px;font-weight:700;cursor:pointer;color:var(--muted);border:none;background:none;transition:.15s;font-family:var(--b);white-space:nowrap}
.freq-btn.on{background:var(--amber);color:#000}
.crew-detail-row{padding:14px;border-bottom:1px solid var(--border)}
.crew-detail-row:last-child{border-bottom:none}
.cd-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.cd-name{font-weight:700;font-size:15px;flex:1}
.cd-car-btn{padding:5px 10px;border-radius:6px;font-size:13px;cursor:pointer;border:1px solid var(--border);background:var(--card2);transition:.12s}
.cd-car-btn.on{background:var(--amberD);border-color:var(--amberB)}
.cd-fields{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.cd-field{display:flex;flex-direction:column;gap:4px}
.cd-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--dim)}
.cd-inp{background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:7px 9px;font-family:var(--b);font-size:13px;font-weight:600;color:var(--text);outline:none;width:100%;-moz-appearance:textfield}
.cd-inp::-webkit-inner-spin-button,.cd-inp::-webkit-outer-spin-button{-webkit-appearance:none}
.cd-inp:focus{border-color:var(--amber)}
.cd-role-sel{background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:7px 9px;font-family:var(--b);font-size:13px;font-weight:600;color:var(--text);outline:none;width:100%;cursor:pointer}
.cd-role-sel:focus{border-color:var(--amber)}
.tax-note{font-size:11px;color:var(--muted);margin-top:3px}
/* PROGRESS */
.prog-wrap{padding:12px 16px}
.pc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:12px}
.pc-lbl{font-family:var(--h);font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--dim);margin-bottom:12px}
.prog-big{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:8px}
.prog-count{font-family:var(--h);font-size:48px;font-weight:800;line-height:1}
.prog-of{font-family:var(--m);font-size:12px;color:var(--muted);margin-top:3px}
.prog-pct{font-family:var(--h);font-size:44px;font-weight:800;line-height:1;color:var(--amber)}
.prog-day{font-size:12px;color:var(--muted);margin-top:2px;text-align:right}
.pbar-lg{height:8px;background:var(--border);border-radius:4px;overflow:hidden;margin-bottom:4px}
.pbar-lf{height:100%;border-radius:4px;transition:width .6s}
.spr{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.spr:last-child{border-bottom:none}
.spr-name{font-size:13px;font-weight:600;flex:1}
.spr-bar{flex:2;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.spr-bar-f{height:100%;border-radius:3px;background:var(--amber)}
.spr-tot{font-family:var(--m);font-size:12px;font-weight:600;color:var(--text);width:58px;text-align:right;flex-shrink:0}
.spr-avg{font-family:var(--m);font-size:11px;color:var(--muted);width:52px;text-align:right;flex-shrink:0}
/* OVERVIEW */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 16px;margin-bottom:10px}
.ic{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px}
.ic-l{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.ic-v{font-size:14px;font-weight:600;color:var(--text)}
.full-ic{grid-column:span 2}
.crew-hdr{display:flex;justify-content:space-between;align-items:center;font-family:var(--h);font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--dim);padding:0 16px;margin:10px 0 6px}
.crew-row{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-bottom:1px solid var(--border);background:var(--card)}
.crew-row:last-child{border-bottom:none}
.cr-l{display:flex;align-items:center;gap:10px}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--h);font-weight:700;flex-shrink:0}
.cr-name{font-weight:600;font-size:14px}
.cr-role{font-size:12px;color:var(--muted)}
.car-tag{font-size:10px;padding:2px 6px;border-radius:4px;background:var(--amberD);color:var(--amber);font-weight:700;margin-left:6px;border:1px solid var(--amberB)}
.map-link{display:inline-flex;align-items:center;gap:6px;margin-top:7px;padding:7px 12px;background:var(--blueD);border:1px solid rgba(26,115,232,.2);color:var(--blue);border-radius:8px;font-size:12px;font-weight:600;text-decoration:none}
/* SEND BUTTON (in overview) */
.send-bar{padding:16px 16px 0}
.send-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--green),#15803d);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--b);display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 16px rgba(22,163,74,.3);transition:.12s}
.send-btn:active{opacity:.85}
/* MODALS */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);z-index:200;display:flex;flex-direction:column;justify-content:flex-end;animation:fadeIn .18s ease;overscroll-behavior:contain}
.overlay2{z-index:300}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.sheet{background:var(--card);border-top:1px solid var(--border);border-radius:20px 20px 0 0;max-height:90vh;display:flex;flex-direction:column;animation:slideUp .22s ease}
@keyframes slideUp{from{transform:translateY(40px);opacity:.5}to{transform:none;opacity:1}}
.sheet-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:12px auto 0;flex-shrink:0}
.sheet-title{font-family:var(--h);font-size:22px;font-weight:700;padding:10px 16px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.sheet-scroll{overflow-y:auto;flex:1}
.sheet-footer{border-top:1px solid var(--border);padding:12px 16px;display:flex;gap:8px;flex-shrink:0;background:var(--card)}
.btn-p{flex:1;padding:13px;background:var(--amber);color:#000;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--b);transition:.12s}
.btn-p:active{opacity:.82}.btn-p:disabled{opacity:.4;cursor:default}
.btn-g{padding:13px 16px;background:none;color:var(--muted);border:1px solid var(--border);border-radius:10px;font-size:14px;cursor:pointer;font-family:var(--b);white-space:nowrap}
.sms-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border)}
.sms-l{display:flex;align-items:center;gap:10px}
.sms-name{font-weight:600;font-size:14px}.sms-role{font-size:12px;color:var(--muted)}.sms-ph{font-family:var(--m);font-size:11px;color:var(--dim);margin-top:1px}
.prev-btn{padding:6px 12px;border-radius:6px;background:var(--amberD);border:1px solid var(--amberB);color:var(--amber);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
.sent-state{padding:40px 20px;text-align:center}
.sent-icon{font-size:56px;margin-bottom:14px}
.sent-title{font-family:var(--h);font-size:24px;font-weight:800;color:var(--green);margin-bottom:6px}
.sent-sub{font-size:14px;color:var(--muted)}
.jc-white{background:#fff;color:#111;border-radius:20px 20px 0 0;max-height:90vh;display:flex;flex-direction:column;animation:slideUp .22s ease}
.jcw-hdr{background:var(--hdr);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-radius:20px 20px 0 0;flex-shrink:0}
.jcw-logo{font-family:var(--h);font-size:20px;font-weight:800;color:var(--amber)}.jcw-sub{font-size:12px;color:rgba(255,255,255,.5)}
.jcw-x{background:none;border:none;color:rgba(255,255,255,.5);font-size:22px;cursor:pointer;padding:0 4px}
.jcw-body{padding:20px 16px;overflow-y:auto;flex:1}
.jcw-greet{font-size:15px;color:#444;margin-bottom:4px}
.jcw-alloc{font-size:13px;color:#666;margin-bottom:20px;line-height:1.5;white-space:pre-line}
.jcw-title{font-family:var(--h);font-size:24px;font-weight:800;text-transform:uppercase;border-bottom:2px solid #111;padding-bottom:12px;margin-bottom:20px}
.jcw-f{margin-bottom:16px}
.jcw-fl{font-family:var(--h);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#333;margin-bottom:3px}
.jcw-fv{font-size:15px;color:#111;font-weight:500;line-height:1.4}
.map-btn{display:inline-flex;align-items:center;gap:6px;margin-top:7px;padding:8px 14px;background:#1a73e8;color:#fff;border-radius:8px;font-size:13px;font-weight:600;text-decoration:none;border:none;cursor:pointer}
.team-item{display:flex;align-items:center;gap:10px;padding:10px;background:#f4f4f4;border-radius:8px;margin-bottom:6px}
.ti-name{font-weight:600;font-size:14px;color:#111}.ti-role{font-size:12px;color:#555}.ti-car{font-size:11px;color:#1a73e8;font-weight:700;margin-top:2px}
.ff{padding:0 16px;margin-bottom:14px}
.fl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.fi{width:100%;padding:11px 12px;background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--b);font-size:16px;outline:none;transition:.15s}
.fi:focus{border-color:var(--amber)}.fi::placeholder{color:var(--dim)}
textarea.fi{resize:none;line-height:1.5}

.tog-opt{flex:1;padding:10px;text-align:center;font-size:14px;font-weight:600;cursor:pointer;color:var(--muted);transition:.15s;border:none;background:none}
.tog-opt.on{background:var(--amber);color:#000}
.farm-list{background:var(--card2);border:1px solid var(--border);border-radius:8px;max-height:180px;overflow-y:auto}
.farm-opt{padding:11px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:.12s}
.farm-opt:last-child{border-bottom:none}
.farm-opt.sel,.farm-opt:active{background:var(--amberD)}
.fo-name{font-weight:600;font-size:14px}.fo-addr{font-size:12px;color:var(--muted);margin-top:2px}
.chip-wrap{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:6px 10px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;background:var(--card2);border:1px solid var(--border);color:var(--muted);transition:.15s}

.crew-group-lbl{font-family:var(--h);font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--amber);margin:12px 0 6px;padding-left:2px}

.add-inline-btn{width:100%;padding:9px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;background:none;border:2px dashed var(--border);color:var(--muted);margin-top:8px;font-family:var(--b);transition:.12s}
.add-inline-btn:hover{border-color:var(--amber);color:var(--amber)}
.inline-form{background:var(--card2);border:1px solid var(--amberB);border-radius:10px;padding:12px;margin-top:8px}
.inline-form-title{font-family:var(--h);font-size:13px;font-weight:700;color:var(--amber);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}

.inline-form-full{grid-column:span 2}
.if-lbl{font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.if-inp{width:100%;padding:8px 10px;background:var(--card);border:1px solid var(--border);border-radius:6px;font-family:var(--b);font-size:13px;color:var(--text);outline:none}
.if-inp:focus{border-color:var(--amber)}
.if-sel{width:100%;padding:8px 10px;background:var(--card);border:1px solid var(--border);border-radius:6px;font-family:var(--b);font-size:13px;color:var(--text);outline:none;cursor:pointer}
.if-sel:focus{border-color:var(--amber)}
.if-btns{display:flex;gap:6px}
.if-save{flex:1;padding:9px;background:var(--amber);border:none;border-radius:7px;font-size:13px;font-weight:700;color:#000;cursor:pointer;font-family:var(--b)}
.if-cancel{padding:9px 14px;background:none;border:1px solid var(--border);border-radius:7px;font-size:13px;cursor:pointer;color:var(--muted);font-family:var(--b)}

function queueWrite(type,id,data){
  const q=lsGet(LS_QUEUE)||[];
  const filtered=q.filter(x=>!(x.type===type&&x.id===id));
  filtered.push({type,id,data,ts:Date.now()});
  lsSet(LS_QUEUE,filtered);
}
function dequeue(type,id){
  const q=lsGet(LS_QUEUE)||[];
  lsSet(LS_QUEUE,q.filter(x=>!(x.type===type&&x.id===id)));
}
async function flushQueue(){
  const q=lsGet(LS_QUEUE)||[];
  if(!q.length)return 0;
  let flushed=0;
  const failed=[];
  for(const item of q){
    try{
      let res;
      if(item.type==='job')res=await sb.from('jobs').upsert({id:item.id,contractor_slug:CONTRACTOR_SLUG,data:item.data,updated_at:new Date().toISOString()},{onConflict:'id'});
      else if(item.type==='farm')res=await sb.from('farms').upsert({id:item.id,contractor_slug:CONTRACTOR_SLUG,data:item.data},{onConflict:'id'});
      else if(item.type==='crew')res=await sb.from('crew_members').upsert({id:item.id,contractor_slug:CONTRACTOR_SLUG,data:item.data},{onConflict:'id'});
      /* Check for Supabase error in response body — don't count as flushed if error */
      if(res&&res.error){failed.push(item);}
      else{flushed++;}
    }catch(e){failed.push(item);}
  }
  lsSet(LS_QUEUE,failed);
  return flushed;
}

/* ── DB HELPERS ── */
async function dbLoad(){
  try{
    const [jr,fr,cr]=await Promise.all([
      sb.from('jobs').select('id,data').eq('contractor_slug',CONTRACTOR_SLUG).order('updated_at',{ascending:false}),
      sb.from('farms').select('id,data').eq('contractor_slug',CONTRACTOR_SLUG),
      sb.from('crew_members').select('id,data').eq('contractor_slug',CONTRACTOR_SLUG),
    ]);
    const result={
      jobs:(jr.data||[]).map(r=>r.data),
      farms:(fr.data||[]).map(r=>r.data),
      crew:(cr.data||[]).map(r=>r.data),
      fromCache:false,
    };
    /* Only overwrite local cache if no pending offline writes — 
       if queue has items, local data is newer than Supabase */
    const pendingQ=lsGet(LS_QUEUE)||[];
    if(pendingQ.length===0){
      lsSet(LS_JOBS,result.jobs);
      lsSet(LS_FARMS,result.farms);
      lsSet(LS_CREW,result.crew);
    } else {
      /* Merge: use local cache for jobs in queue, Supabase for others */
      const qJobIds=new Set(pendingQ.filter(x=>x.type==='job').map(x=>x.id));
      const localJobs=lsGet(LS_JOBS)||[];
      const merged=result.jobs.map(j=>qJobIds.has(j.id)?localJobs.find(lj=>lj.id===j.id)||j:j);
      result.jobs=merged;
      lsSet(LS_JOBS,merged);
      lsSet(LS_FARMS,result.farms);
      lsSet(LS_CREW,result.crew);
    }
    return result;
  }catch(e){
    /* Offline — serve from cache */
    return{
      jobs:lsGet(LS_JOBS)||[],
      farms:lsGet(LS_FARMS)||[],
      crew:lsGet(LS_CREW)||[],
      fromCache:true,
    };
  }
}
async function dbSaveJob(job){
  /* Always write to local cache first — this survives page close */
  const jobs=lsGet(LS_JOBS)||[];
  const updated=jobs.find(j=>j.id===job.id)?jobs.map(j=>j.id===job.id?job:j):[job,...jobs];
  lsSet(LS_JOBS,updated);
  /* Skip Supabase entirely if offline — avoids SW stub returning fake 200 */
  if(!navigator.onLine){
    queueWrite('job',job.id,job);
    return;
  }
  try{
    const {error}=await sb.from('jobs').upsert({id:job.id,contractor_slug:CONTRACTOR_SLUG,data:job,updated_at:new Date().toISOString()},{onConflict:'id'});
    if(error)throw new Error(error.message);
    dequeue('job',job.id);
  }catch(e){
    queueWrite('job',job.id,job);
  }
}
async function dbDeleteJob(jobId){
  const jobs=lsGet(LS_JOBS)||[];

}

  const farms=lsGet(LS_FARMS)||[];

  lsSet(LS_FARMS,updated);
  if(!navigator.onLine){queueWrite('farm',farm.id,farm);return;}

}

/* getJobRole — returns the role this crew member had ON THIS JOB.
   Once a crew member is added to a job, their role is snapshotted in
   job.rates.crewDetails[id].role. Reads should always go through this so
   global role changes (e.g. promote a Wool Handler to Wool Classer) don't
   retroactively rewrite past pay summaries. Falls back to live role for
   crew added before this snapshot system existed. */
const getJobRole=(job,id)=>{
  const det=((job?.rates?.crewDetails)||{})[id]||{};
  if(det.role)return det.role;
  const c=gc(id);
  return c?c.role:null;

/* migrateJobRoles — backfills crewDetails.role from the LIVE crew record for
   any crew member on this job that doesn't yet have a per-job role snapshot.
   Runs on load. Without this migration, legacy jobs (created before the
   snapshot system) still leak global role changes into past pay summaries. */
function migrateJobRoles(job,crewArr){
  const cd={...(job?.rates?.crewDetails||{})};
  let changed=false;
  (job.crew||[]).forEach(id=>{
    if(!cd[id]?.role){
      const c=(crewArr||CREW).find(x=>x.id===id);
      if(c){
        cd[id]={...(cd[id]||{}),role:c.role};

      }
    }
  });

  return {...job,rates:{...(job.rates||{}),crewDetails:cd}};

function localToday(){const n=new Date();return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;}
function jobDates(j){
  const ds=[];
  /* Legacy jobs (no includeWeekends field) default to true for backward compatibility.
     If includeWeekends===false, skip Sat (dow=6) and Sun (dow=0) when iterating. */
  const includeWeekends=j.includeWeekends!==false;
  if(includeWeekends){
    for(let i=0;i<j.daysAllocated;i++)ds.push(addDays(j.startDate,i));
  } else {
    let i=0,added=0;
    while(added<j.daysAllocated&&i<j.daysAllocated*3){ /* safety cap */
      const d=addDays(j.startDate,i);
      const [y,mo,dy]=d.split('-').map(Number);
      const dow=new Date(y,mo-1,dy).getDay();
      if(dow!==0&&dow!==6){ds.push(d);added++;}
      i++;
    }
  }
  return ds;
}
/* Monday-start week helpers */
function mondayOfWeek(dStr){const [y,mo,dy]=dStr.split('-').map(Number);const dt=new Date(y,mo-1,dy);const dow=dt.getDay();const diff=dow===0?-6:1-dow;dt.setDate(dt.getDate()+diff);return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;}
function weekDatesFromMonday(mondayStr){const out=[];for(let i=0;i<7;i++)out.push(addDays(mondayStr,i));return out;}
function monthCellsFor(year,month){
  /* month is 1-indexed */
  const first=new Date(year,month-1,1);
  const firstDow=first.getDay(); /* 0=Sun..6=Sat */
  const leading=firstDow===0?6:firstDow-1; /* Monday-start offset */
  const cells=[];
  for(let i=leading;i>0;i--){
    const dt=new Date(year,month-1,1-i);
    cells.push({date:`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`,inMonth:false});
  }
  const daysInMonth=new Date(year,month,0).getDate();
  for(let d=1;d<=daysInMonth;d++){
    cells.push({date:`${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`,inMonth:true});
  }
  /* Pad to complete final week (multiple of 7) */
  while(cells.length%7!==0){
    const last=cells[cells.length-1].date;
    const [ly,lm,ld]=last.split('-').map(Number);
    const dt=new Date(ly,lm-1,ld+1);
    cells.push({date:`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`,inMonth:false});
  }
  return cells;
}
function fmtMonthYear(y,m){return new Date(y,m-1,1).toLocaleDateString('en-AU',{month:'long',year:'numeric'});}
function fmtWeekRange(mondayStr){const [y1,m1,d1]=mondayStr.split('-').map(Number);const start=new Date(y1,m1-1,d1);const end=new Date(y1,m1-1,d1+6);const s=start.toLocaleDateString('en-AU',{day:'numeric',month:'short'});const eL=end.toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'});return s+' — '+eL;}
function statusClass(s){return s==='Draft'?'draft':s==='Completed'?'completed':s==='Charged Out'?'charged':s==='Dispatched'?'dispatched':'active';}
const mobsOf=run=>run.mobs||[];
function calcProg(job){

  Object.entries(job.runs||{}).forEach(([,rs])=>{if(rs&&rs.length){daysWorked++;rs.forEach(run=>{mobsOf(run).forEach(mob=>{shIds.forEach(id=>{shorn+=mob.counts[id]||0;});});});}});

function shearerStats(job,viewDate,shIds){
  const r={};shIds.forEach(id=>{r[id]={shBF:0,shDay:0,crBF:0,crDay:0};});
  Object.entries(job.runs||{}).forEach(([date,runs])=>{
    const isBefore=date<viewDate,isToday=date===viewDate;
    if(!isBefore&&!isToday)return;
    runs.forEach(run=>{mobsOf(run).forEach(mob=>{shIds.forEach(id=>{const cnt=mob.counts[id]||0;if(!cnt)return;if(mob.type==='Shearing'){if(isBefore)r[id].shBF+=cnt;if(isToday)r[id].shDay+=cnt;}else{if(isBefore)r[id].crBF+=cnt;if(isToday)r[id].crDay+=cnt;}});});});
  });return r;
}
function mobTotals(job,viewDate,shearers){
  const all={};
  const add=(mob,isToday)=>{
    const key=(mob.type+'|'+(mob.desc||'').trim().toLowerCase());
    const cnt=shearers.reduce((s,id)=>s+(mob.counts[id]||0),0);
    if(!cnt)return;
    if(!all[key])all[key]={type:mob.type,desc:mob.desc||'Unspecified',bf:0,today:0};
    if(isToday)all[key].today+=cnt;else all[key].bf+=cnt;
  };
  Object.entries(job.runs||{}).forEach(([date,runs])=>{
    const isBefore=date<viewDate,isToday=date===viewDate;
    if(!isBefore&&!isToday)return;
    runs.forEach(run=>mobsOf(run).forEach(mob=>add(mob,isToday)));
  });
  return Object.entries(all).filter(([,v])=>v.bf+v.today>0);
}
/* PAY PERIOD HELPERS */
const DAY_FULL=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
function getPeriodForDate(dateStr,payDayOfWeek){
  const [y,m,d]=dateStr.split('-').map(Number);
  const dt=new Date(y,m-1,d);
  const daysFromStart=(dt.getDay()-payDayOfWeek+7)%7;
  const startStr=addDays(dateStr,-daysFromStart);
  const endStr=addDays(startStr,6);
  return{start:startStr,end:endStr};
}
function getPeriodByOffset(todayStr,payDayOfWeek,offset,frequency){
  if(frequency==='shed')return null;
  const len=frequency==='fortnightly'?14:7;
  const base=getPeriodForDate(todayStr,payDayOfWeek);
  if(frequency==='fortnightly'){
    // For fortnightly: find which 14-day period we're in by using the base weekly period
    // and adjusting. Odd/even offset from base determines which fortnight.
    return{start:addDays(base.start,len*offset),end:addDays(base.end+(len-7),len*offset)};
  }
  return{start:addDays(base.start,7*offset),end:addDays(base.end,7*offset)};
}
function fmtPeriodLabel(start,end){
  const [sy,sm,sd]=start.split('-').map(Number);
  const [ey,em,ed]=end.split('-').map(Number);
  const sdt=new Date(sy,sm-1,sd),edt=new Date(ey,em-1,ed);
  const dn=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return dn[sdt.getDay()]+' '+sd+' '+mo[sm-1]+' \u2013 '+dn[edt.getDay()]+' '+ed+' '+mo[em-1];
}
function calcPeriodStats(job,period){
  const shIds=job.crew.filter(id=>{const r=getJobRole(job,id);return r==='Shearer'||r==='Crutcher';});
  const rates=job.rates||{};
  let shorn=0,totalEarn=0;
  const inP=date=>date>=period.start&&date<=period.end;
  Object.entries(job.runs||{}).forEach(([date,rs])=>{if(!inP(date))return;rs.forEach(run=>{mobsOf(run).forEach(mob=>{const br=mob.rateOverride!=null?mob.rateOverride:(mob.type==='Shearing'?rates.shearingPerHead:rates.crutchingPerHead)||0;shIds.forEach(id=>{const cnt=mob.counts[id]||0;if(!cnt)return;shorn+=cnt;const load=(rates.shearerLoadings||{})[id]||0;totalEarn+=cnt*(br+load);});});});});
  // Shed staff
  job.crew.filter(id=>{const r=getJobRole(job,id);return r&&r!=='Shearer'&&r!=='Crutcher';}).forEach(id=>{
    const ov=(rates.crewOverrides||{})[id];const c=gc(id);if(!c)return;
    const role=getJobRole(job,id);
    const defR=role==='Wool Classer'?rates.classerPerRun:role==='Penner'?rates.pennerPerRun:role==='Presser'?rates.presserPerRun:rates.woolHandlerPerRun;
    const rpr=ov||defR||80;
    if(role==='Presser'){Object.entries(job.shedTallies[id]||{}).forEach(([date,runs])=>{if(!inP(date))return;const bales=(job.baleTallies[id]||{})[date]||0;totalEarn+=bales>(rates.baleThreshold||13)?bales*(rates.presserPerBale||14.20):runs*rpr;});}
    else{Object.entries(job.shedTallies[id]||{}).forEach(([date,runs])=>{if(!inP(date))return;totalEarn+=runs*rpr;});}
    const tr2=rates.travelRate||{};
    totalEarn+=Object.values((job.travelTallies||{})[id]||{}).reduce((a,b)=>a+(b?1:0),0)*(tr2[id]||0);
  });
  // Shearer travel
  shIds.forEach(id=>{const tr2=rates.travelRate||{};totalEarn+=Object.values((job.travelTallies||{})[id]||{}).reduce((a,b)=>a+(b?1:0),0)*(tr2[id]||0);});
  return{shorn,totalEarn};
}

/* ── PIN CONFIG ── */
const DEFAULT_LEAD_PIN='123456';
const DEFAULT_ADMIN_PIN='987654';
const MASTER_PIN='SRD2026'; /* SRD override — never share */

/* SHA-256 hash — PINs never stored in plain text */
async function hashPin(pin){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(pin+CONTRACTOR_SLUG));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

/* PIN cache — loaded from Supabase, persisted to localStorage as offline fallback */
const LS_PINS='mg_pins_'+CONTRACTOR_SLUG;
let _pinCache={lead:null,admin:null};
let _pinLoaded=false;

async function loadPins(){
  if(_pinLoaded)return;
  /* Load from localStorage first so PINs work immediately offline */
  const cached=lsGet(LS_PINS);
  if(cached){_pinCache.lead=cached.lead||null;_pinCache.admin=cached.admin||null;}
  try{
    const {data}=await sb.from('contractor_settings').select('lead_pin_hash,admin_pin_hash').eq('contractor_slug',CONTRACTOR_SLUG).single();
    if(data){
      _pinCache.lead=data.lead_pin_hash;
      _pinCache.admin=data.admin_pin_hash;
      /* Keep localStorage in sync */
      lsSet(LS_PINS,{lead:_pinCache.lead,admin:_pinCache.admin});
    }
  }catch(e){}
  _pinLoaded=true;
}

async function checkPin(type,entered){
  if(entered===MASTER_PIN)return true;
  /* Plain text fallback for first login before any PIN has been set */
  const def=type==='admin'?DEFAULT_ADMIN_PIN:DEFAULT_LEAD_PIN;
  if(!_pinCache[type]){
    /* No hash stored yet — accept plain text default OR master */
    return entered===def;
  }
  const hash=await hashPin(entered);
  return hash===_pinCache[type];
}

async function savePin(type,newVal){
  const hash=await hashPin(newVal);
  _pinCache[type]=hash;
  /* Always persist to localStorage so offline access works */
  lsSet(LS_PINS,{lead:_pinCache.lead,admin:_pinCache.admin});
  const update={contractor_slug:CONTRACTOR_SLUG,updated_at:new Date().toISOString()};
  update[type==='admin'?'admin_pin_hash':'lead_pin_hash']=hash;
  await sb.from('contractor_settings').upsert(update,{onConflict:'contractor_slug'});
}

/* ── PIN PAD (reusable) ── */
function PinPad({onSuccess,onCancel,label,subtitle,allowChange,changeLabel,_overridePin,_startInChangeMode,_pinType,_onChanged}){
  const [entry,setEntry]=useState('');
  const [err,setErr]=useState('');
  const [changing,setChanging]=useState(!!_startInChangeMode);
  const [newPin,setNewPin]=useState('');
  const [step,setStep]=useState(_startInChangeMode?'new1':'enter'); /* enter | verify_current | new1 | new2 */

  const type=label==='Admin PIN'?'admin':'lead';

  const tryPin=async p=>{
    /* If an override PIN is supplied (e.g. a per-job PIN), verify against
       it directly rather than going to Supabase for the role PIN. */
    if(_overridePin!=null){
      if(String(p)===String(_overridePin)){setErr('');onSuccess();}
      else{setErr('Incorrect PIN');setEntry('');setTimeout(()=>setErr(''),1500);}
      return;
    }
    const ok=await checkPin(type,p);
    if(ok){setErr('');onSuccess();}
    else{setErr('Incorrect PIN');setEntry('');setTimeout(()=>setErr(''),1500);}
  };

  const press=n=>{
    if(changing){
      if(step==='verify_current'){
        const cur=entry+n;
        setEntry(cur);
        if(cur.length===6){
          checkPin(type,cur).then(ok=>{
            if(ok){setStep('new1');setEntry('');setErr('');}
            else{setErr('Incorrect current PIN');setEntry('');setTimeout(()=>setErr(''),1500);}
          });
        }
      } else if(step==='new1'){
        const np=newPin+n;
        if(np.length>6)return; /* cap at 6 digits */
        setNewPin(np);setEntry(np);
      } else {
        const conf=entry+n;
        if(conf.length>6)return; /* cap at 6 digits */
        setEntry(conf);
      }
      return;
    }
    const next=entry+n;
    if(next.length>6)return; /* cap at 6 digits */
    setEntry(next);
    /* Auto-submit ONLY at 6 digits when no override (back-compat with role PINs).
       For shorter PINs (4-5), user taps Submit. With override (job PINs), auto-submit
       at the override's exact length. */
    if(_overridePin!=null){
      if(next.length===String(_overridePin).length)tryPin(next);
    } else if(next.length===6){
      tryPin(next);
    }
  };

  const del=()=>{
    if(changing){
      if(step==='new2'&&entry.length===0){setStep('new1');setNewPin('');}
      else setEntry(e=>e.slice(0,-1));
    } else setEntry(e=>e.slice(0,-1));
  };

  const startChange=()=>{setChanging(true);setStep('verify_current');setEntry('');setNewPin('');setErr('');};

  /* Submit handler for variable-length PINs. Used when user has typed 4-5
     digits and needs to commit (since auto-submit only fires at 6). */
  const submitEntry=()=>{
    if(changing){
      if(step==='new1'){
        if(newPin.length<4){setErr('PIN must be at least 4 digits');setTimeout(()=>setErr(''),1500);return;}
        setStep('new2');setEntry('');
      } else if(step==='new2'){
        if(entry===newPin){
          const pinType=_pinType||type;
          savePin(pinType,newPin).then(()=>{
            setChanging(false);setStep('enter');setNewPin('');setEntry('');setErr('✓ PIN changed — all devices updated!');
            if(_onChanged)setTimeout(_onChanged,1500);
            /* Reset role on PIN change for security */
            lsSet(LS_ROLE,'read_only');lsSet(LS_ROLE_TS,0);
          });
        } else{setErr('PINs do not match');setEntry('');setNewPin('');setStep('new1');setTimeout(()=>setErr(''),1500);}
      }
      return;
    }
    if(entry.length<4){setErr('PIN must be at least 4 digits');setTimeout(()=>setErr(''),1500);return;}
    tryPin(entry);
  };

  const displayEntry=changing?(step==='new1'?newPin:entry):entry;
  const displayLabel=changing?(
    step==='verify_current'?'Enter Current PIN':
    step==='new1'?'Enter New PIN':'Confirm New PIN'
  ):label;
  const displaySub=changing?(
    step==='verify_current'?'Verify your current PIN before changing':
    step==='new1'?'Choose a 4-6 digit PIN':'Re-enter to confirm'
  ):subtitle;

  /* Show a Submit button when:
     - User is verifying a job-override PIN of any length (waits for full PIN)
     - User is changing a PIN (new1/new2 steps need explicit submit since
       length is variable)
     - Always available as a "tap when ready" once 4+ digits typed */
  const canSubmit=displayEntry.length>=4&&!err.includes('changed');

  return e('div',{className:'pin-screen'},
    e('div',{className:'pin-logo'},'my',e('em',null,'Gang')),
    e('div',{className:'pin-subtitle'},displaySub||'Enter your PIN to continue'),
    e('div',{className:'pin-label'},displayLabel||'Enter PIN'),
    e('div',{className:'pin-dots'},
      [0,1,2,3,4,5].map(i=>e('div',{key:i,className:`pin-dot${displayEntry.length>i?' filled':''}${err&&!err.includes('changed')?err?' error':'':''}`}))
    ),
    e('div',{className:'pin-error'},err),
    e('div',{className:'pin-grid'},
      [1,2,3,4,5,6,7,8,9,'',0,'⌫'].map((k,i)=>
        k===''?e('div',{key:i,className:'pin-key empty'}):
        k==='⌫'?e('button',{key:i,className:'pin-key del',onClick:del},'⌫'):
        e('button',{key:i,className:'pin-key',onClick:()=>press(String(k))},k)
      )
    ),
    /* Submit button — visible when 4+ digits typed. Auto-submit at 6 still works for back-compat. */
    canSubmit&&e('button',{
      className:'pin-change-btn',
      style:{background:'var(--green)',color:'#fff',fontWeight:700,marginTop:8},
      onClick:submitEntry
    },'✓ Submit '+displayEntry.length+'-digit PIN'),
    allowChange&&!changing&&e('button',{className:'pin-change-btn',onClick:startChange},changeLabel||'Change PIN'),
    onCancel&&!changing&&e('button',{className:'pin-change-btn',onClick:onCancel},'Cancel'),
    changing&&e('button',{className:'pin-change-btn',onClick:()=>{setChanging(false);setStep('enter');setEntry('');setNewPin('');}}, 'Cancel')
  );
}

function SummaryTab({job,role}){
  const rates=job.rates||{};
  const payDayOfWeek=rates.payDayOfWeek!=null?rates.payDayOfWeek:4;
  const payFrequency=rates.payFrequency||'weekly';
  const todayStr=localToday();
  const periodLen=payFrequency==='fortnightly'?14:7;
  const canSeePay=role==='admin';
  const canShare=role==='admin'||role==='shed_lead';

  /* Find the offset of the most recent period that actually has data */
  function findBestOffset(){
    if(payFrequency==='shed')return 0;
    const dateDates=Object.keys(job.runs||{}).filter(d=>(job.runs[d]||[]).length>0).sort();
    if(!dateDates.length)return 0;
    const latestDate=dateDates[dateDates.length-1];
    const latestPeriod=getPeriodForDate(latestDate,payDayOfWeek);
    const basePeriod=getPeriodForDate(todayStr,payDayOfWeek);
    const diffDays=(new Date(latestPeriod.start+'T00:00:00')-new Date(basePeriod.start+'T00:00:00'))/(1000*60*60*24);
    return Math.round(diffDays/periodLen);
  }

  const [offset,setOffset]=useState(()=>findBestOffset());
  const [view,setView]=useState(canSeePay?'crew':'record');
  const [copied,setCopied]=useState(false);
  const [copiedRec,setCopiedRec]=useState(false);
  const [shared,setShared]=useState(false);

  const period=payFrequency==='shed'?null:getPeriodByOffset(todayStr,payDayOfWeek,offset,payFrequency);
  const isCurrentPeriod=offset===0;
  const isFuture=period&&period.start>todayStr;
  const stats=period?calcPeriodStats(job,period):{shorn:0,totalEarn:0};
  const crewText=canSeePay?generateSummary(job,period):'';
  const recordText=generateFarmRecord(job);
  const copy=(txt,set)=>{navigator.clipboard.writeText(txt).then(()=>{set(true);setTimeout(()=>set(false),2000);}).catch(()=>{});};
  const farmName=gf(job.farmId)?gf(job.farmId).name:'Job';
  const printText=(text,title)=>{
    const w=window.open('','_blank','width=800,height=900');
    if(!w){alert('Pop-up blocked. Please allow pop-ups to print.');return;}
    const safe=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    w.document.write('<!DOCTYPE html><html><head><title>'+title+'</title>'+
      '<style>body{font-family:"Courier New","Lucida Console",monospace;font-size:13px;padding:30px;max-width:640px;margin:0 auto;line-height:1.55;color:#1a1e2e;background:#fff}'+
      'pre{white-space:pre-wrap;word-wrap:break-word;margin:0;font-family:inherit}'+
      '@media print{body{padding:15px}}</style>'+
      '</head><body><pre>'+safe+'</pre></body></html>');
    w.document.close();
    setTimeout(()=>{try{w.focus();w.print();}catch(e){}},300);
  };
  const printRecord=()=>printText(recordText,'Farm Record \u2014 '+farmName);
  const shareRecord=async()=>{
    if(navigator.share){
      try{await navigator.share({title:'Farm Record \u2014 '+farmName,text:recordText});setShared(true);setTimeout(()=>setShared(false),2000);}
      catch(e){/* user cancelled */}
    }else{
      copy(recordText,setShared);
    }
  };
  const freqLabel=payFrequency==='weekly'?'Weekly':payFrequency==='fortnightly'?'Fortnightly':'End of Shed';
  const prevStart=period?addDays(period.start,-periodLen):null;
  const nextStart=period?addDays(period.start,periodLen):null;
  const btnLabel=d=>{const [,mo,dy]=d.split('-').map(Number);const dt=new Date(d.split('-')[0],mo-1,dy);const dn=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];return dn[dt.getDay()]+' '+String(dy).padStart(2,'0')+'/'+String(mo).padStart(2,'0');};
  const shIds=job.crew.filter(id=>{const r=getJobRole(job,id);return r==='Shearer'||r==='Crutcher';});
  const totalJobShorn=Object.values(job.runs||{}).flat().flatMap(r=>mobsOf(r)).reduce((s,mob)=>s+shIds.reduce((a,id)=>a+(mob.counts[id]||0),0),0);

  return e('div',{className:'summary-wrap'},
    /* View toggle — Crew Pays only visible to admin */
    e('div',{className:'sum-toggle'},
      canSeePay&&e('button',{className:`sum-tab${view==='crew'?' on':''}`,onClick:()=>setView('crew')},'💰 Crew Pays'),
      e('button',{className:`sum-tab${view==='record'?' on':''}`,onClick:()=>setView('record')},'📄 Farm Record')
    ),

    /* ── CREW PAYS VIEW (admin only) ── */
    canSeePay&&view==='crew'&&e('div',null,
      /* Period navigator */
      e('div',{className:'period-nav'},
        e('div',{className:'period-top'},
          e('div',{className:'period-label'},
            e('div',{className:'period-title'},'Crew Pay — '+freqLabel+(payFrequency!=='shed'?' · '+DAY_FULL[payDayOfWeek]+' pays':'')),
            payFrequency==='shed'
              ?e('div',{className:'period-dates'},'Full Job — '+fmtDateLong(job.startDate)+' onwards')
              :e('div',{className:'period-dates'},fmtPeriodLabel(period.start,period.end)),
            (isCurrentPeriod||payFrequency==='shed')&&e('span',{className:'period-badge'},payFrequency==='shed'?'Whole job':'Current period')
          ),
          stats.shorn>0&&!isFuture&&e('div',{className:'period-stats'},
            e('div',{className:'ps-item'},e('div',{className:'ps-num'},stats.shorn.toLocaleString()),e('div',{className:'ps-lbl'},'Sheep')),
            e('div',{className:'ps-item'},e('div',{className:'ps-pay'},'$'+Math.round(stats.totalEarn).toLocaleString()),e('div',{className:'ps-lbl'},'Est. Payroll'))
          )
        ),
        payFrequency!=='shed'&&e('div',{className:'period-btns'},
          e('button',{className:'period-btn',onClick:()=>setOffset(o=>o-1)},'← '+btnLabel(prevStart)),
          isCurrentPeriod?e('span',{className:'period-btn current'},'Current'):e('button',{className:'period-btn',onClick:()=>setOffset(0)},'Jump to Current'),
          e('button',{className:'period-btn',onClick:()=>setOffset(o=>o+1)},btnLabel(nextStart)+' →')
        )
      ),
      isFuture
        ?e('div',{style:{padding:'32px 0',textAlign:'center',color:'var(--dim)'}},e('div',{style:{fontSize:32,marginBottom:8}},'📅'),e('div',null,'Future period — no data yet'))
        :e('div',null,
            e('div',{className:'summary-actions',style:{display:'flex',gap:8,flexWrap:'wrap'}},
              e('button',{className:'btn-copy',onClick:()=>copy(crewText,setCopied)},copied?'✓ Copied!':'📋 Copy Crew Pay Summary'),
              e('button',{className:'btn-copy',style:{background:'#0ea5e9'},onClick:()=>printText(crewText,'Crew Pay Summary \u2014 '+farmName+(period?' \u2014 '+fmtPeriodLabel(period.start,period.end):''))},'🖨️ Print / PDF')
            ),
            e('pre',{className:'summary-pre'},crewText)
          )
    ),

    /* ── FARM RECORD VIEW (visible to all roles) ── */
    view==='record'&&e('div',null,
      e('div',{className:'invoice-hdr'},
        e('div',{className:'inv-title'},'Farm Record — Full Job'),
        e('div',{className:'inv-farm'},farmName),
        e('div',{style:{fontSize:'12px',color:'rgba(255,255,255,.5)',marginBottom:10}},
          'Covers entire job '+fmtDate(job.startDate)+' — '+job.daysAllocated+' days allocated'
        ),
        e('div',{className:'inv-stats'},
          e('div',{className:'inv-stat'},e('div',{className:'inv-stat-num'},totalJobShorn.toLocaleString()),e('div',{className:'inv-stat-lbl'},'Total Sheep')),
          e('div',{className:'inv-stat'},e('div',{className:'inv-stat-num'},job.crew.length),e('div',{className:'inv-stat-lbl'},'Crew Members'))
        )
      ),
      e('div',{style:{fontSize:'12px',color:'var(--muted)',marginBottom:10,padding:'0 2px'}},
        '✓ Factual record of work completed — no dollar amounts. Share with the farmer for their records.'
      ),
      canShare&&e('div',{className:'summary-actions',style:{display:'flex',gap:8,flexWrap:'wrap'}},
        e('button',{className:'btn-copy',onClick:()=>copy(recordText,setCopiedRec)},copiedRec?'✓ Copied!':'📋 Copy'),
        e('button',{className:'btn-copy',style:{background:'#0ea5e9'},onClick:printRecord},'🖨️ Print / PDF'),
        e('button',{className:'btn-copy',style:{background:'#16a34a'},onClick:shareRecord},shared?'✓ Done!':(navigator.share?'📤 Share':'📤 Copy & Share'))
      ),
      !canShare&&e('div',{style:{fontSize:'11px',color:'var(--dim)',marginBottom:10,padding:'8px 12px',background:'rgba(255,255,255,.03)',borderRadius:'8px',border:'1px dashed rgba(255,255,255,.08)'}},

      ),

/* ── WHITEBOARD TAB ── */
function WhiteboardTab({job,role}){
  const [entries,setEntries]=useState([]);
  const [loading,setLoading]=useState(true);
  const [text,setText]=useState('');
  const [authorRole,setAuthorRole]=useState('Shearer');
  const [saving,setSaving]=useState(false);
  const ROLES=['Farmer','Lead','Shearer','Staff'];

  const load=async()=>{
    try{
      const {data}=await sb.from('job_whiteboard')
        .select('*')
        .eq('job_id',job.id)
        .eq('contractor_slug',CONTRACTOR_SLUG)
        .order('created_at',{ascending:false});
      if(data)setEntries(data);
    }catch(e){}
    setLoading(false);
  };

  useEffect(()=>{load();},[job.id]);

  const doAdd=async()=>{
    if(!text.trim())return;
    setSaving(true);
    const entry={
      id:'wb'+Date.now(),
      contractor_slug:CONTRACTOR_SLUG,
      job_id:job.id,
      author_role:authorRole,
      note:text.trim(),
      created_at:new Date().toISOString()
    };
    try{
      await sb.from('job_whiteboard').insert(entry);
      setEntries(p=>[entry,...p]);
      setText('');
    }catch(e){}
    setSaving(false);
  };

  const doDelete=async(id)=>{
    try{
      await sb.from('job_whiteboard').delete().eq('id',id).eq('contractor_slug',CONTRACTOR_SLUG);
      setEntries(p=>p.filter(e=>e.id!==id));
    }catch(e){}
  };

  const fmtTs=ts=>{
    const d=new Date(ts);
    return d.toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short'})+' · '+d.toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit',hour12:true});
  };

  const ROLE_COLORS={Farmer:'#0ea5e9',Lead:'var(--amber)',Shearer:'var(--green)',Staff:'#8b5cf6'};

  return e('div',{style:{padding:'0 0 100px 0'}},
    /* Add note box — visible to all roles */
    e('div',{style:{margin:'12px 16px',background:'var(--card)',borderRadius:12,padding:16,border:'1px solid var(--border)'}},
      e('div',{style:{fontFamily:'var(--h)',fontSize:16,fontWeight:800,marginBottom:10}},'📋 Add to Whiteboard'),
      e('div',{style:{display:'flex',gap:6,flexWrap:'wrap',marginBottom:10}},
        ROLES.map(r=>e('button',{key:r,type:'button',
          onClick:()=>setAuthorRole(r),
          style:{padding:'4px 12px',borderRadius:20,fontSize:12,fontWeight:700,cursor:'pointer',border:'none',
            background:authorRole===r?ROLE_COLORS[r]:'var(--card2)',
            color:authorRole===r?'#fff':'var(--muted)'}
        },r))
      ),
      e('textarea',{
        rows:3,
        placeholder:'Add a note visible to everyone on this job...',
        value:text,
        onChange:ev=>setText(ev.target.value),
        style:{width:'100%',padding:'10px 12px',border:'1.5px solid var(--border)',borderRadius:8,
          fontSize:14,lineHeight:1.6,background:'var(--bg)',color:'var(--text)',resize:'none',outline:'none',
          boxSizing:'border-box'}
      }),
      e('button',{
        type:'button',
        onClick:doAdd,
        disabled:saving||!text.trim(),
        style:{marginTop:8,width:'100%',padding:'11px',background:text.trim()?ROLE_COLORS[authorRole]:'var(--card2)',
          border:'none',borderRadius:8,color:text.trim()?'#fff':'var(--muted)',fontWeight:700,fontSize:14,cursor:'pointer',
          transition:'.15s',opacity:saving?0.6:1}
      },saving?'Saving...':'Post Note')
    ),

    /* Entries */
    loading&&e('div',{style:{textAlign:'center',padding:'40px',color:'var(--muted)'}},'Loading...'),
    !loading&&entries.length===0&&e('div',{style:{textAlign:'center',padding:'40px 24px',color:'var(--muted)'}},
      e('div',{style:{fontSize:36,marginBottom:8}},'📋'),
      e('div',{style:{fontWeight:700,marginBottom:4}},'Whiteboard is empty'),
      e('div',{style:{fontSize:13}},'Add notes, observations or instructions above — visible to everyone on this job')
    ),
    !loading&&entries.map(entry=>e('div',{key:entry.id,
      style:{margin:'0 16px 10px',background:'var(--card)',borderRadius:12,padding:14,
        border:'1px solid var(--border)',borderLeft:'3px solid '+(ROLE_COLORS[entry.author_role]||'var(--border)')}},
      e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}},
        e('div',{style:{display:'flex',alignItems:'center',gap:8}},
          e('span',{style:{fontSize:11,fontWeight:700,padding:'2px 8px',borderRadius:10,
            background:ROLE_COLORS[entry.author_role]||'var(--muted)',color:'#fff'}},
            entry.author_role),
          e('span',{style:{fontSize:11,color:'var(--muted)'}},fmtTs(entry.created_at))
        ),
        (role==='admin'||role==='shed_lead')&&e('button',{
          type:'button',
          onClick:()=>doDelete(entry.id),
          style:{background:'none',border:'none',color:'var(--muted)',cursor:'pointer',fontSize:16,padding:'0 4px',lineHeight:1}
        },'×')
      ),
      e('div',{style:{fontSize:14,lineHeight:1.7,whiteSpace:'pre-wrap',color:'var(--text)'}},entry.note)
    ))
  );
}

function fmtViewed(ts){
  const diff=Math.floor((Date.now()-new Date(ts))/1000);
  if(diff<60)return 'just now';
  if(diff<3600)return Math.floor(diff/60)+'m ago';
  if(diff<86400)return Math.floor(diff/3600)+'h ago';
  return Math.floor(diff/86400)+'d ago';
}
